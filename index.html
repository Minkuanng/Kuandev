<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        :root { --bg-body: #f0f7ff; --bg-card: #fff; --bg-header: #fff; --text-primary: #2c5a7a; --text-secondary: #5a8fb5; --text-muted: #8ab3d4; --border-color: #e3eef9; --shadow: 0 2px 10px rgba(0,0,0,0.05); --shadow-popup: 0 8px 30px rgba(0,0,0,0.15); --wallet-bg: #f0f7ff; --hover-bg: #f0f7ff; --accent: #3b8fd6; }
        .theme-galaxy { --bg-body: #0a0a1a; --bg-card: #12122a; --bg-header: #1a1a3e; --text-primary: #c8b8ff; --text-secondary: #8a7aff; --text-muted: #6a5a9a; --border-color: #2a2a5a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #1a1a3e; --hover-bg: #2a2a5a; --accent: #8a7aff; }
        .theme-ocean { --bg-body: #0a1628; --bg-card: #0f2a4a; --bg-header: #0d2847; --text-primary: #7fc8ff; --text-secondary: #4a9aff; --text-muted: #3a6a8a; --border-color: #1a3a6a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #0d2847; --hover-bg: #1a3a6a; --accent: #4a9aff; }
        .theme-forest { --bg-body: #0a1a0a; --bg-card: #0f2a0f; --bg-header: #0d2a0d; --text-primary: #7fdf7f; --text-secondary: #4abf4a; --text-muted: #3a7a3a; --border-color: #1a4a1a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #0d2a0d; --hover-bg: #1a4a1a; --accent: #4abf4a; }
        .theme-sunset { --bg-body: #1a0a0a; --bg-card: #2a120a; --bg-header: #3e1a0a; --text-primary: #ffb87f; --text-secondary: #ff8a4a; --text-muted: #9a6a3a; --border-color: #5a2a1a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #3e1a0a; --hover-bg: #5a2a1a; --accent: #ff8a4a; }
        .theme-cherry { --bg-body: #1a0a12; --bg-card: #2a0a16; --bg-header: #3e0a1a; --text-primary: #ff7fa8; --text-secondary: #ff4a7a; --text-muted: #9a3a5a; --border-color: #5a1a2a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #3e1a0a; --hover-bg: #5a1a2a; --accent: #ff4a7a; }
        .theme-neon { --bg-body: #0a0a0a; --bg-card: #121212; --bg-header: #1a1a1a; --text-primary: #00ff88; --text-secondary: #00ccff; --text-muted: #666; --border-color: #333; --shadow: 0 2px 10px rgba(0,0,0,0.6); --shadow-popup: 0 8px 30px rgba(0,0,0,0.8); --wallet-bg: #1a1a1a; --hover-bg: #2a2a2a; --accent: #00ccff; }
        .theme-lavender { --bg-body: #1a0a2a; --bg-card: #221a3a; --bg-header: #2a1a3e; --text-primary: #d4a8ff; --text-secondary: #b87aff; --text-muted: #7a5a9a; --border-color: #3a2a5a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #2a1a3e; --hover-bg: #3a2a5a; --accent: #b87aff; }
        .theme-mint { --bg-body: #0a1a12; --bg-card: #0f2a1a; --bg-header: #0d2a1a; --text-primary: #7fffd4; --text-secondary: #4abfa0; --text-muted: #3a7a6a; --border-color: #1a4a3a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #0d2a1a; --hover-bg: #1a4a3a; --accent: #4abfa0; }
        .theme-coffee { --bg-body: #1a0f0a; --bg-card: #221a12; --bg-header: #2a1a12; --text-primary: #d4b896; --text-secondary: #b8987a; --text-muted: #7a6a5a; --border-color: #3a2a1a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #2a1a12; --hover-bg: #3a2a1a; --accent: #b8987a; }
        body.dark-mode { --bg-body: #1a1a2e; --bg-card: #1a1a2e; --bg-header: #16213e; --text-primary: #e8e8e8; --text-secondary: #8fc1e0; --text-muted: #6a8a9a; --border-color: #2a3a5a; --shadow: 0 2px 10px rgba(0,0,0,0.3); --shadow-popup: 0 8px 30px rgba(0,0,0,0.5); --wallet-bg: #1a2a4a; --hover-bg: #1a2a4a; --accent: #8fc1e0; }
        body { background: var(--bg-body); min-height: 100vh; transition: 0.3s; }
        .header { background: var(--bg-header); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; transition: 0.3s; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo { font-size: 20px; font-weight: 700; color: var(--text-primary); transition: 0.3s; }
        .logo span { color: var(--text-secondary); }
        
        .menu-icon { 
            cursor: pointer; 
            padding: 8px 12px; 
            border-radius: 8px; 
            background: var(--wallet-bg); 
            border: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            gap: 5px; 
            transition: 0.3s; 
            width: 40px;
            height: 40px;
            justify-content: center;
        }
        .menu-icon:hover { background: var(--hover-bg); }
        .menu-icon .bar { 
            display: block; 
            width: 22px; 
            height: 2.5px; 
            background: var(--text-secondary); 
            border-radius: 4px; 
            transition: 0.3s;
        }
        .menu-icon .bar:nth-child(1) { transform: translateY(4px); }
        .menu-icon .bar:nth-child(3) { transform: translateY(-4px); }
        .menu-icon:hover .bar { background: var(--text-primary); }
        
        .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

        .wallet-container {
            background: var(--wallet-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 6px 16px 6px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            cursor: default;
            min-height: 44px;
        }
        .wallet-container:hover { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,143,214,0.1); }
        .wallet-icon-box { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .wallet-icon-box svg { width: 18px; height: 18px; fill: #fff; }
        .wallet-info { display: flex; flex-direction: column; line-height: 1.3; }
        .wallet-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .wallet-balance { font-size: 15px; font-weight: 700; color: var(--text-primary); }
        .wallet-balance span { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-left: 2px; }

        .bell-icon { width: 32px; height: 32px; cursor: pointer; border-radius: 50%; background: var(--wallet-bg); border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; transition: 0.3s; position: relative; font-size: 16px; }
        .bell-icon:hover { background: var(--hover-bg); }
        .bell-icon .bell-dot { width: 8px; height: 8px; background: #e74c6f; border-radius: 50%; position: absolute; top: 2px; right: 4px; border: 2px solid var(--bg-header); display: none; }
        .bell-icon .bell-dot.show { display: block; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        .dot-menu { width: 36px; height: 36px; cursor: pointer; border-radius: 50%; background: var(--wallet-bg); border: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; transition: 0.3s; padding: 6px; }
        .dot-menu:hover { background: var(--hover-bg); }
        .dot-menu .dot { width: 4px; height: 4px; background: var(--text-secondary); border-radius: 50%; }
        .popup { position: absolute; top: 48px; right: 0; background: var(--bg-card); border-radius: 12px; box-shadow: var(--shadow-popup); min-width: 180px; padding: 6px 0; border: 1px solid var(--border-color); opacity: 0; visibility: hidden; transform: translateY(-10px); transition: 0.3s; z-index: 200; }
        .popup.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .popup-item { padding: 10px 18px; color: var(--text-primary); font-size: 13px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; border: none; background: none; width: 100%; font-weight: 500; }
        .popup-item:hover { background: var(--hover-bg); }
        .popup-divider { height: 1px; background: var(--border-color); margin: 4px 12px; }
        .popup-item.logout { color: #e74c6f; }
        .settings-wrapper { position: relative; }
        .notif-popup { position: fixed; top: 60px; right: 16px; background: var(--bg-card); border-radius: 12px; box-shadow: var(--shadow-popup); min-width: 280px; max-width: 360px; max-height: 350px; overflow-y: auto; padding: 12px 0; border: 1px solid var(--border-color); z-index: 300; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: 0.3s; }
        .notif-popup.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .notif-popup .notif-header { padding: 0 14px 10px; border-bottom: 1px solid var(--border-color); font-weight: 700; color: var(--text-primary); display: flex; justify-content: space-between; font-size: 14px; }
        .notif-popup .notif-header .close { cursor: pointer; }
        .notif-popup .notif-item { padding: 10px 14px; border-bottom: 1px solid var(--border-color); color: var(--text-primary); font-size: 13px; }
        .notif-popup .notif-item .time { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
        .notif-popup .notif-item.unread { background: var(--wallet-bg); border-left: 3px solid #e74c6f; }
        .notif-popup .empty { padding: 16px; text-align: center; color: var(--text-muted); font-size: 13px; }
        .side-menu { position: fixed; top: 0; left: -280px; width: 260px; height: 100vh; background: var(--bg-card); box-shadow: var(--shadow-popup); z-index: 300; transition: 0.3s; padding: 16px 0; border-right: 1px solid var(--border-color); overflow-y: auto; }
        .side-menu.active { left: 0; }
        .side-menu .menu-header { padding: 12px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .side-menu .menu-header .close { cursor: pointer; font-size: 20px; color: var(--text-muted); }
        .side-menu .menu-item { display: flex; align-items: center; gap: 14px; padding: 12px 20px; cursor: pointer; transition: 0.3s; color: var(--text-primary); border: none; background: none; width: 100%; font-size: 14px; font-weight: 500; }
        .side-menu .menu-item:hover { background: var(--hover-bg); padding-left: 26px; }
        .side-menu .menu-item .icon { font-size: 18px; width: 28px; text-align: center; }
        .side-menu .menu-divider { height: 1px; background: var(--border-color); margin: 6px 16px; }
        .menu-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 299; opacity: 0; visibility: hidden; transition: 0.3s; }
        .menu-overlay.active { opacity: 1; visibility: visible; }
        .content { padding: 40px 24px; max-width: 1200px; margin: 0 auto; }

        .intro-card { background: var(--bg-card); border-radius: 16px; padding: 20px 22px; box-shadow: var(--shadow); border: 1px solid var(--border-color); margin-bottom: 16px; transition: 0.3s; overflow: hidden; }
        .intro-top { display: flex; align-items: center; gap: 10px; }
        .intro-top-left { display: flex; align-items: center; gap: 10px; }
        .intro-top-left .intro-icon { width: 34px; height: 34px; border-radius: 10px; background: var(--wallet-bg); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
        .intro-title { font-size: 14.5px; font-weight: 700; color: var(--text-primary); }
        .intro-sub { font-size: 11.5px; color: var(--text-muted); margin-top: 1px; }
        .intro-body { margin-top: 16px; }
        .intro-lead { font-size: 12.5px; color: var(--text-secondary); line-height: 1.6; padding-bottom: 12px; border-bottom: 1px dashed var(--border-color); }
        .intro-section { padding-top: 12px; }
        .intro-section + .intro-section { margin-top: 4px; }
        .intro-section-title { display: flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
        .intro-list { list-style: none; }
        .intro-list li { position: relative; padding-left: 16px; font-size: 12px; color: var(--text-muted); line-height: 1.6; margin-bottom: 4px; }
        .intro-list li::before { content: "›"; position: absolute; left: 0; color: var(--text-secondary); font-weight: 700; }
        .intro-footer { text-align: center; font-size: 12px; font-weight: 700; color: var(--text-primary); padding-top: 12px; margin-top: 4px; border-top: 1px dashed var(--border-color); }
        .intro-footer span { color: var(--accent); }

        /* ===== BRAND / CATEGORY SECTION ===== */
        .brand-section { 
            background: var(--bg-card); 
            border-radius: 16px; 
            padding: 20px 22px; 
            box-shadow: var(--shadow); 
            border: 1px solid var(--border-color); 
            margin-bottom: 16px; 
            transition: 0.3s; 
        }
        .brand-section-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 16px; 
            flex-wrap: wrap; 
            gap: 10px; 
        }
        .brand-section-header h2 { 
            font-size: 18px; 
            color: var(--text-primary); 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        .brand-section-header h2 span { 
            color: var(--text-secondary); 
            font-size: 14px; 
            font-weight: 400; 
        }

        /* Brand Grid - hình chữ nhật vuông */
        .brand-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 16px; 
            margin-bottom: 20px;
        }
        .brand-card { 
            background: var(--wallet-bg); 
            border-radius: 12px; 
            padding: 16px 12px; 
            border: 2px solid var(--border-color); 
            transition: 0.3s; 
            text-align: center; 
            cursor: pointer;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 120px;
        }
        .brand-card:hover { 
            transform: translateY(-4px); 
            box-shadow: var(--shadow-popup); 
            border-color: var(--accent); 
        }
        .brand-card.active { 
            border-color: var(--accent); 
            background: var(--accent); 
            color: #fff;
        }
        .brand-card.active .brand-name { color: #fff; }
        .brand-card.active .brand-count { color: rgba(255,255,255,0.8); }
        .brand-card .brand-image { 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            object-fit: cover; 
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .brand-card .brand-image img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .brand-card .brand-name { 
            font-weight: 600; 
            color: var(--text-primary); 
            font-size: 13px; 
            transition: 0.3s;
        }
        .brand-card .brand-count { 
            font-size: 11px; 
            color: var(--text-muted); 
            margin-top: 2px; 
        }

        /* Product grid khi chọn brand */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 16px; 
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px solid var(--border-color);
        }
        .product-card { 
            background: var(--wallet-bg); 
            border-radius: 12px; 
            padding: 14px; 
            border: 1px solid var(--border-color); 
            transition: 0.3s; 
            text-align: center; 
        }
        .product-card:hover { 
            transform: translateY(-4px); 
            box-shadow: var(--shadow-popup); 
            border-color: var(--accent); 
        }
        .product-card .product-image { 
            width: 80px; 
            height: 80px; 
            border-radius: 10px; 
            object-fit: cover; 
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 8px;
            border: 1px solid var(--border-color);
        }
        .product-card .product-image img { width: 100%; height: 100%; border-radius: 10px; object-fit: cover; }
        .product-card .product-name { font-weight: 700; color: var(--text-primary); font-size: 14px; }
        .product-card .product-price { color: var(--accent); font-weight: 600; font-size: 16px; margin: 4px 0; }
        .product-card .product-desc { font-size: 11px; color: var(--text-muted); margin: 4px 0; line-height: 1.4; }
        .product-card .btn-buy { 
            margin-top: 10px; 
            padding: 6px 20px; 
            background: var(--accent); 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 13px; 
            width: 100%; 
        }
        .product-card .btn-buy:hover { transform: scale(1.03); box-shadow: 0 4px 15px rgba(59,143,214,0.3); }
        .product-card .btn-buy:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .product-empty { 
            text-align: center; 
            padding: 40px 20px; 
            color: var(--text-muted); 
            grid-column: 1/-1;
        }
        .product-empty .big-icon { font-size: 48px; display: block; margin-bottom: 12px; }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-body);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            transition: 0.5s;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
            display: none !important;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border-color);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 500;
        }

        @media (max-width: 600px) { 
            .header { padding: 10px 12px; } 
            .logo { font-size: 16px; } 
            .wallet-container { padding: 4px 12px 4px 8px; min-height: 38px; }
            .wallet-icon-box { width: 28px; height: 28px; }
            .wallet-icon-box svg { width: 15px; height: 15px; }
            .wallet-balance { font-size: 13px; }
            .wallet-label { font-size: 9px; }
            .content { padding: 16px; } 
            .notif-popup { right: 8px; left: 8px; min-width: auto; } 
            .intro-card { padding: 16px; }
            .menu-icon { width: 34px; height: 34px; padding: 6px 8px; }
            .menu-icon .bar { width: 18px; height: 2px; }
            .menu-icon .bar:nth-child(1) { transform: translateY(3px); }
            .menu-icon .bar:nth-child(3) { transform: translateY(-3px); }
            .brand-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
            .product-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .brand-card { min-height: 90px; padding: 12px 8px; }
            .brand-card .brand-image { width: 45px; height: 45px; font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">⏳ Đang tải dữ liệu...</div>
    </div>

    <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>
    <div class="side-menu" id="sideMenu">
        <div class="menu-header"><span style="font-weight:700;color:var(--text-primary);">📋 Menu</span><span class="close" onclick="closeMenu()">✕</span></div>
        <button class="menu-item" onclick="goHome()"><span class="icon">🏠</span><span data-key="home">Trang chủ</span></button>
        <button class="menu-item" onclick="goHistory()"><span class="icon">⏳</span><span data-key="history">Lịch sử</span></button>
        <button class="menu-item" onclick="goTopup()"><span class="icon">💰</span><span data-key="topup">Nạp tiền</span></button>
        <div class="menu-divider"></div>
        <button class="menu-item" onclick="goSupport()"><span class="icon">🆘</span><span data-key="support">Hỗ trợ</span></button>
    </div>

    <header class="header">
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <div class="logo"></div>
        </div>
        <div class="header-right">
            <div class="wallet-container">
                <div class="wallet-icon-box">
                    <svg viewBox="0 0 24 24">
                        <path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
                    </svg>
                </div>
                <div class="wallet-info">
                    <span class="wallet-label">Số dư</span>
                    <span class="wallet-balance"><span id="balanceAmount">0</span> <span>VND</span></span>
                </div>
            </div>

            <div class="bell-icon" onclick="toggleNotif()">
                <div class="bell-dot" id="notifDot"></div>
                🔔
            </div>
            <div class="settings-wrapper">
                <div class="dot-menu" onclick="togglePopup(event)">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
                <div class="popup" id="settingsPopup">
                    <button class="popup-item" onclick="goToProfile()">👤 <span data-key="profile">Thông tin</span></button>
                    <button class="popup-item" onclick="goToSecurity()">🛡️ <span data-key="security">Bảo mật</span></button>
                    <button class="popup-item" onclick="goToSettings()">⚙️ <span data-key="settings">Cài đặt</span></button>
                    <div class="popup-divider"></div>
                    <button class="popup-item logout" onclick="logout()">🚪 <span data-key="logout">Đăng xuất</span></button>
                </div>
            </div>
        </div>
    </header>

    <div class="notif-popup" id="notifPopup">
        <div class="notif-header"><span data-key="notif_title">📢 Thông báo</span><span class="close" onclick="toggleNotif()">✕</span></div>
        <div id="notifList"><div class="empty" data-key="notif_empty">Chưa có thông báo</div></div>
    </div>

    <div class="content">

        <div class="intro-card">
            <div class="intro-top">
                <div class="intro-top-left">
                    <div class="intro-icon">🎮</div>
                    <div>
                        <div class="intro-title">Chào mừng bạn đến với trang chủ</div>
                        <div class="intro-sub">Chọn hãng để xem sản phẩm</div>
                    </div>
                </div>
            </div>
            <div class="intro-body">
                <p class="intro-lead">Chọn một hãng bên dưới để xem danh sách sản phẩm.</p>
            </div>
        </div>

        <!-- ===== BRAND / CATEGORY SECTION ===== -->
        <div class="brand-section" id="brandSection">
            <div class="brand-section-header">
                <h2>🏷️ Hãng sản phẩm <span id="brandCount"></span></h2>
            </div>
            <div class="brand-grid" id="brandGrid">
                <div class="product-empty">
                    <span class="big-icon">📦</span>
                    <p>Đang tải danh sách hãng...</p>
                </div>
            </div>

            <!-- Product list -->
            <div id="productContainer">
                <div class="product-grid" id="productGrid">
                    <div class="product-empty">
                        <span class="big-icon">📦</span>
                        <p>Chọn một hãng để xem sản phẩm</p>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCPDDRt520fSynXCGrr2aF-KvpnS_ZuIm8",
            authDomain: "shop-c6777.firebaseapp.com",
            databaseURL: "https://shop-c6777-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "shop-c6777",
            storageBucket: "shop-c6777.firebasestorage.app",
            messagingSenderId: "43186563268",
            appId: "1:43186563268:web:0d392ba57039a919670191"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const translations = {
            vi: { 
                home: 'Trang chủ', history: 'Lịch sử', topup: 'Nạp tiền', support: 'Hỗ trợ', 
                profile: 'Thông tin', security: 'Bảo mật', settings: 'Cài đặt', logout: 'Đăng xuất', 
                notif_title: '📢 Thông báo', notif_empty: 'Chưa có thông báo',
                no_products: 'Chưa có sản phẩm nào',
                buy: 'Mua ngay',
                out_of_stock: 'Hết hàng',
                all_brands: '📦 Tất cả'
            },
            en: { 
                home: 'Home', history: 'History', topup: 'Top up', support: 'Support', 
                profile: 'Profile', security: 'Security', settings: 'Settings', logout: 'Logout', 
                notif_title: '📢 Notifications', notif_empty: 'No notifications',
                no_products: 'No products available',
                buy: 'Buy now',
                out_of_stock: 'Out of stock',
                all_brands: '📦 All'
            }
        };

        let lang = localStorage.getItem('lang') || 'vi';
        let isDataLoaded = false;
        let currentUser = null;
        let selectedBrand = 'all';
        let brandsData = {};
        let productsData = {};

        function applyLang() {
            const data = translations[lang] || translations.vi;
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (data[key] !== undefined) el.textContent = data[key];
            });
            // Cập nhật "Tất cả" trong brand grid
            renderBrands();
        }

        function applyTheme() {
            const isDark = localStorage.getItem('theme') === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            const theme = localStorage.getItem('theme_name') || 'default';
            document.body.className = document.body.className.replace(/theme-\w+/g, '');
            if (theme !== 'default') document.body.classList.add('theme-' + theme);
        }
        applyTheme();
        applyLang();

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        function showLoading() {
            document.getElementById('loadingOverlay').classList.remove('hidden');
        }

        function checkQuickLogin() {
            const quickUid = localStorage.getItem('quickLoginUid');
            const quickToken = localStorage.getItem('quickLoginToken');
            const quickPending = localStorage.getItem('quickLoginPending');
            return !!(quickUid && quickToken && quickPending === 'true');
        }

        async function autoLoginWithQuickToken() {
            const quickUid = localStorage.getItem('quickLoginUid');
            const quickToken = localStorage.getItem('quickLoginToken');
            
            if (!quickUid || !quickToken) return false;
            
            try {
                const snap = await db.ref('users/' + quickUid).once('value');
                const userData = snap.val();
                
                if (!userData || userData.blocked === true) {
                    localStorage.removeItem('quickLoginUid');
                    localStorage.removeItem('quickLoginToken');
                    localStorage.removeItem('quickLoginPending');
                    return false;
                }
                
                await db.ref('presence/' + quickUid).set(true);
                db.ref('presence/' + quickUid).onDisconnect().set(false);
                
                document.getElementById('balanceAmount').textContent = (userData.balance || 0).toLocaleString('vi-VN');
                currentUser = { uid: quickUid, ...userData };
                
                db.ref('notifications').on('value', snap => {
                    const notifs = snap.val();
                    const list = document.getElementById('notifList');
                    const dot = document.getElementById('notifDot');
                    if (notifs) {
                        const keys = Object.keys(notifs).reverse();
                        let html = '',
                            hasUnread = false;
                        keys.forEach(key => {
                            const n = notifs[key];
                            const isUnread = !n.readBy || !n.readBy[quickUid];
                            if (isUnread) hasUnread = true;
                            html += `<div class="notif-item ${isUnread?'unread':''}">${n.message}<div class="time">${new Date(n.timestamp).toLocaleString('vi-VN')}</div></div>`;
                        });
                        list.innerHTML = html;
                        dot.classList.toggle('show', hasUnread && localStorage.getItem('notifEnabled') !== 'false');
                    } else { 
                        list.innerHTML = `<div class="empty">${lang === 'vi' ? 'Chưa có thông báo' : 'No notifications'}</div>`;
                        dot.classList.remove('show'); 
                    }
                });
                
                loadData();
                isDataLoaded = true;
                hideLoading();
                return true;
            } catch (error) {
                console.error('Lỗi auto login:', error);
                return false;
            }
        }

        // ===== LOAD DATA =====
        function loadData() {
            // Load brands (categories)
            db.ref('categories').on('value', (snapshot) => {
                brandsData = snapshot.val() || {};
                renderBrands();
                renderProducts();
            });
            
            // Load products
            db.ref('products').on('value', (snapshot) => {
                productsData = snapshot.val() || {};
                renderProducts();
            });
        }

        // ===== RENDER BRANDS =====
        function renderBrands() {
            const grid = document.getElementById('brandGrid');
            const countEl = document.getElementById('brandCount');
            
            const keys = Object.keys(brandsData);
            const total = keys.length;
            countEl.textContent = `(${total} hãng)`;
            
            const allLabel = lang === 'vi' ? '📦 Tất cả' : '📦 All';
            
            let html = `
                <div class="brand-card ${selectedBrand === 'all' ? 'active' : ''}" onclick="selectBrand('all')">
                    <div class="brand-image" style="font-size:32px;">📦</div>
                    <div class="brand-name">${allLabel}</div>
                    <div class="brand-count">${Object.keys(productsData).length} sản phẩm</div>
                </div>
            `;
            
            keys.forEach(key => {
                const brand = brandsData[key];
                const productCount = Object.keys(productsData).filter(pid => productsData[pid].category === key).length;
                const isActive = selectedBrand === key ? 'active' : '';
                const imageUrl = brand.image || '';
                const icon = brand.icon || '🏷️';
                
                html += `
                    <div class="brand-card ${isActive}" onclick="selectBrand('${key}')">
                        <div class="brand-image">
                            ${imageUrl ? `<img src="${imageUrl}" alt="${brand.name}" onerror="this.style.display='none';this.parentElement.textContent='${icon}'" />` : icon}
                        </div>
                        <div class="brand-name">${brand.name || 'Chưa đặt tên'}</div>
                        <div class="brand-count">${productCount} sản phẩm</div>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }

        // ===== SELECT BRAND =====
        function selectBrand(brandId) {
            selectedBrand = brandId;
            renderBrands();
            renderProducts();
        }

        // ===== RENDER PRODUCTS =====
        function renderProducts() {
            const grid = document.getElementById('productGrid');
            
            let filtered = [];
            if (selectedBrand === 'all') {
                Object.keys(productsData).forEach(key => {
                    filtered.push({ id: key, ...productsData[key] });
                });
            } else {
                Object.keys(productsData).forEach(key => {
                    if (productsData[key].category === selectedBrand) {
                        filtered.push({ id: key, ...productsData[key] });
                    }
                });
            }
            
            if (filtered.length === 0) {
                const msg = selectedBrand === 'all' 
                    ? (lang === 'vi' ? 'Chưa có sản phẩm nào' : 'No products available')
                    : (lang === 'vi' ? 'Hãng này chưa có sản phẩm' : 'This brand has no products');
                grid.innerHTML = `
                    <div class="product-empty">
                        <span class="big-icon">📦</span>
                        <p>${msg}</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            filtered.forEach(product => {
                const isOutOfStock = product.stock <= 0;
                const price = product.price ? product.price.toLocaleString('vi-VN') : '0';
                const image = product.image || '';
                const icon = product.icon || '📦';
                const desc = product.description || '';
                
                html += `
                    <div class="product-card">
                        <div class="product-image">
                            ${image ? `<img src="${image}" alt="${product.name}" onerror="this.style.display='none';this.parentElement.textContent='${icon}'" />` : icon}
                        </div>
                        <div class="product-name">${product.name || 'Sản phẩm'}</div>
                        <div class="product-price">${price} VND</div>
                        ${desc ? `<div class="product-desc">${desc}</div>` : ''}
                        <button class="btn-buy" ${isOutOfStock ? 'disabled' : ''} onclick="buyProduct('${product.id}')">
                            ${isOutOfStock ? (lang === 'vi' ? 'Hết hàng' : 'Out of stock') : (lang === 'vi' ? 'Mua ngay' : 'Buy now')}
                        </button>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }

        // ===== BUY PRODUCT =====
        function buyProduct(productId) {
            if (!currentUser) {
                alert(lang === 'vi' ? 'Vui lòng đăng nhập!' : 'Please login!');
                return;
            }
            
            const product = productsData[productId];
            if (!product) {
                alert(lang === 'vi' ? 'Sản phẩm không tồn tại!' : 'Product not found!');
                return;
            }
            
            if (product.stock <= 0) {
                alert(lang === 'vi' ? 'Sản phẩm đã hết hàng!' : 'Product out of stock!');
                return;
            }
            
            const price = product.price || 0;
            if (currentUser.balance < price) {
                alert(lang === 'vi' ? 'Số dư không đủ để mua sản phẩm này!' : 'Insufficient balance!');
                return;
            }
            
            if (confirm(lang === 'vi' ? `Bạn có chắc muốn mua "${product.name}" với giá ${price.toLocaleString('vi-VN')} VND?` : `Buy "${product.name}" for ${price.toLocaleString('vi-VN')} VND?`)) {
                showLoading();
                
                const updates = {};
                updates[`users/${currentUser.uid}/balance`] = currentUser.balance - price;
                updates[`products/${productId}/stock`] = (product.stock || 1) - 1;
                
                const historyRef = db.ref('history/' + currentUser.uid).push();
                updates[historyRef.toString().replace('https://shop-c6777-default-rtdb.asia-southeast1.firebasedatabase.app/', '')] = {
                    productId: productId,
                    productName: product.name,
                    price: price,
                    timestamp: Date.now(),
                    type: 'purchase'
                };
                
                db.ref().update(updates).then(() => {
                    hideLoading();
                    alert(lang === 'vi' ? '✅ Mua hàng thành công!' : '✅ Purchase successful!');
                    db.ref('users/' + currentUser.uid + '/balance').once('value', snap => {
                        const bal = snap.val() || 0;
                        document.getElementById('balanceAmount').textContent = bal.toLocaleString('vi-VN');
                        currentUser.balance = bal;
                    });
                }).catch(err => {
                    hideLoading();
                    alert('❌ ' + err.message);
                });
            }
        }

        // ===== AUTH STATE =====
        auth.onAuthStateChanged(async (user) => {
            if (isDataLoaded) return;
            
            if (checkQuickLogin()) {
                const success = await autoLoginWithQuickToken();
                if (success) return;
                localStorage.removeItem('quickLoginUid');
                localStorage.removeItem('quickLoginToken');
                localStorage.removeItem('quickLoginPending');
                window.location.replace('Authenticator/login.html');
                return;
            }
            
            if (!user) { 
                window.location.replace('Authenticator/login.html'); 
                return; 
            }
            
            try {
                const blockSnap = await db.ref('users/' + user.uid + '/blocked').once('value');
                if (blockSnap.val() === true) {
                    await auth.signOut();
                    window.location.replace('Authenticator/login.html');
                    return;
                }

                await db.ref('presence/' + user.uid).set(true);
                db.ref('presence/' + user.uid).onDisconnect().set(false);
                
                db.ref('users/' + user.uid).on('value', snap => {
                    const data = snap.val();
                    if (data) {
                        document.getElementById('balanceAmount').textContent = (data.balance || 0).toLocaleString('vi-VN');
                        currentUser = { uid: user.uid, ...data };
                    }
                    if (!isDataLoaded) {
                        isDataLoaded = true;
                        hideLoading();
                    }
                });

                db.ref('notifications').on('value', snap => {
                    const notifs = snap.val();
                    const list = document.getElementById('notifList');
                    const dot = document.getElementById('notifDot');
                    if (notifs) {
                        const keys = Object.keys(notifs).reverse();
                        let html = '',
                            hasUnread = false;
                        keys.forEach(key => {
                            const n = notifs[key];
                            const isUnread = !n.readBy || !n.readBy[user.uid];
                            if (isUnread) hasUnread = true;
                            html += `<div class="notif-item ${isUnread?'unread':''}">${n.message}<div class="time">${new Date(n.timestamp).toLocaleString('vi-VN')}</div></div>`;
                        });
                        list.innerHTML = html;
                        dot.classList.toggle('show', hasUnread && localStorage.getItem('notifEnabled') !== 'false');
                    } else { 
                        list.innerHTML = `<div class="empty">${lang === 'vi' ? 'Chưa có thông báo' : 'No notifications'}</div>`;
                        dot.classList.remove('show'); 
                    }
                });
                
                loadData();
            } catch (error) {
                console.error('Lỗi load dữ liệu:', error);
                hideLoading();
            }
        });

        // ===== MENU FUNCTIONS =====
        function toggleMenu() { 
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('menuOverlay').classList.toggle('active'); 
        }

        function closeMenu() { 
            document.getElementById('sideMenu').classList.remove('active');
            document.getElementById('menuOverlay').classList.remove('active'); 
        }

        function togglePopup(e) { 
            e.stopPropagation();
            document.getElementById('settingsPopup').classList.toggle('active'); 
        }
        document.addEventListener('click', function(e) {
            const popup = document.getElementById('settingsPopup');
            const wrapper = document.querySelector('.settings-wrapper');
            if (!wrapper.contains(e.target)) popup.classList.remove('active');
        });

        function toggleNotif() {
            const popup = document.getElementById('notifPopup');
            popup.classList.toggle('active');
            const user = auth.currentUser;
            if (user && localStorage.getItem('autoView') !== 'false') {
                db.ref('notifications').once('value', snap => {
                    const notifs = snap.val();
                    if (notifs) Object.keys(notifs).forEach(key => db.ref('notifications/' + key + '/readBy/' + user.uid)
                        .set(true));
                });
                document.getElementById('notifDot').classList.remove('show');
            }
        }

        function goHome() { closeMenu();
            window.location.href = 'index.html'; }

        function goHistory() { closeMenu();
            alert(lang === 'vi' ? '📜 Đang phát triển!' : '📜 Coming soon!'); }

        function goTopup() { closeMenu();
            alert(lang === 'vi' ? '💰 Đang phát triển!' : '💰 Coming soon!'); }

        function goSupport() { closeMenu();
            alert(lang === 'vi' ? '🆘 Đang phát triển!' : '🆘 Coming soon!'); }

        function goToProfile() { window.location.href = 'Pop-up/profile.html'; }

        function goToSecurity() { window.location.href = 'Pop-up/security.html'; }

        function goToSettings() { window.location.href = 'Pop-up/settings.html'; }

        function logout() { 
            if (confirm(lang === 'vi' ? 'Đăng xuất?' : 'Logout?')) {
                const user = auth.currentUser;
                if (user) {
                    db.ref('presence/' + user.uid).set(false);
                }
                auth.signOut().then(() => {
                    localStorage.removeItem('quickLoginUid');
                    localStorage.removeItem('quickLoginEmail');
                    localStorage.removeItem('quickLoginToken');
                    localStorage.removeItem('quickLoginPending');
                    window.location.replace('Authenticator/login.html');
                });
            }
        }

        window.addEventListener('storage', function(e) {
            if (e.key === 'lang') { lang = e.newValue || 'vi';
                applyLang(); }
            if (e.key === 'theme' || e.key === 'theme_name') { applyTheme(); }
        });

        showLoading();
        setTimeout(() => {
            if (!isDataLoaded) {
                hideLoading();
            }
        }, 5000);
    </script>
</body>
</html>
