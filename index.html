<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuanZGame.site - Trang Chủ</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js">
    </script>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        :root {
            /* Màu sắc chính */
            --bg-body: #f0f7ff;
            --bg-card: #ffffff;
            --bg-header: #ffffff;
            --text-primary: #1a3a5c;
            --text-secondary: #4a8ab5;
            --text-muted: #8ab3d4;
            --border-color: #e3eef9;
            --shadow: 0 4px 20px rgba(26, 58, 92, 0.08);
            --shadow-popup: 0 12px 40px rgba(0, 0, 0, 0.15);
            --wallet-bg: #f0f7ff;
            --hover-bg: #f0f7ff;
            --gradient-primary: linear-gradient(135deg, #1a3a5c, #4a8ab5);
            --gradient-accent: linear-gradient(135deg, #f5a623, #f7c948);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ===== THEMES ===== */
        .theme-galaxy {
            --bg-body: #0a0a1a;
            --bg-card: #12122a;
            --bg-header: #1a1a3e;
            --text-primary: #c8b8ff;
            --text-secondary: #8a7aff;
            --text-muted: #6a5a9a;
            --border-color: #2a2a5a;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            --shadow-popup: 0 12px 40px rgba(0, 0, 0, 0.6);
            --wallet-bg: #1a1a3e;
            --hover-bg: #2a2a5a;
            --gradient-primary: linear-gradient(135deg, #6a5a9a, #c8b8ff);
            --gradient-accent: linear-gradient(135deg, #8a7aff, #c8b8ff);
        }
        .theme-ocean {
            --bg-body: #0a1628;
            --bg-card: #0f2a4a;
            --bg-header: #0d2847;
            --text-primary: #7fc8ff;
            --text-secondary: #4a9aff;
            --text-muted: #3a6a8a;
            --border-color: #1a3a6a;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            --shadow-popup: 0 12px 40px rgba(0, 0, 0, 0.6);
            --wallet-bg: #0d2847;
            --hover-bg: #1a3a6a;
            --gradient-primary: linear-gradient(135deg, #0d2847, #4a9aff);
            --gradient-accent: linear-gradient(135deg, #4a9aff, #7fc8ff);
        }
        .theme-forest {
            --bg-body: #0a1a0a;
            --bg-card: #0f2a0f;
            --bg-header: #0d2a0d;
            --text-primary: #7fdf7f;
            --text-secondary: #4abf4a;
            --text-muted: #3a7a3a;
            --border-color: #1a4a1a;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            --shadow-popup: 0 12px 40px rgba(0, 0, 0, 0.6);
            --wallet-bg: #0d2a0d;
            --hover-bg: #1a4a1a;
            --gradient-primary: linear-gradient(135deg, #0d2a0d, #4abf4a);
            --gradient-accent: linear-gradient(135deg, #4abf4a, #7fdf7f);
        }
        .theme-sunset {
            --bg-body: #1a0a0a;
            --bg-card: #2a120a;
            --bg-header: #3e1a0a;
            --text-primary: #ffb87f;
            --text-secondary: #ff8a4a;
            --text-muted: #9a6a3a;
            --border-color: #5a2a1a;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            --shadow-popup: 0 12px 40px rgba(0, 0, 0, 0.6);
            --wallet-bg: #3e1a0a;
            --hover-bg: #5a2a1a;
            --gradient-primary: linear-gradient(135deg, #3e1a0a, #ff8a4a);
            --gradient-accent: linear-gradient(135deg, #ff8a4a, #ffb87f);
        }
        .theme-cherry {
            --bg-body: #1a0a12;
            --bg-card: #2a0a16;
            --bg-header: #3e0a1a;
            --text-primary: #ff7fa8;
            --text-secondary: #ff4a7a;
            --text-muted: #9a3a5a;
            --border-color: #5a1a2a;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            --shadow-popup: 0 12px 40px rgba(0, 0, 0, 0.6);
            --wallet-bg: #3e1a0a;
            --hover-bg: #5a1a2a;
            --gradient-primary: linear-gradient(135deg, #3e0a1a, #ff4a7a);
            --gradient-accent: linear-gradient(135deg, #ff4a7a, #ff7fa8);
        }
        .theme-neon {
            --bg-body: #0a0a0a;
            --bg-card: #121212;
            --bg-header: #1a1a1a;
            --text-primary: #00ff88;
            --text-secondary: #00ccff;
            --text-muted: #666;
            --border-color: #333;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            --shadow-popup: 0 12px 40px rgba(0, 0, 0, 0.8);
            --wallet-bg: #1a1a1a;
            --hover-bg: #2a2a2a;
            --gradient-primary: linear-gradient(135deg, #00ccff, #00ff88);
            --gradient-accent: linear-gradient(135deg, #00ff88, #00ccff);
        }
        .theme-lavender {
            --bg-body: #1a0a2a;
            --bg-card: #221a3a;
            --bg-header: #2a1a3e;
            --text-primary: #d4a8ff;
            --text-secondary: #b87aff;
            --text-muted: #7a5a9a;
            --border-color: #3a2a5a;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            --shadow-popup: 0 12px 40px rgba(0, 0, 0, 0.6);
            --wallet-bg: #2a1a3e;
            --hover-bg: #3a2a5a;
            --gradient-primary: linear-gradient(135deg, #2a1a3e, #b87aff);
            --gradient-accent: linear-gradient(135deg, #b87aff, #d4a8ff);
        }
        .theme-mint {
            --bg-body: #0a1a12;
            --bg-card: #0f2a1a;
            --bg-header: #0d2a1a;
            --text-primary: #7fffd4;
            --text-secondary: #4abfa0;
            --text-muted: #3a7a6a;
            --border-color: #1a4a3a;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            --shadow-popup: 0 12px 40px rgba(0, 0, 0, 0.6);
            --wallet-bg: #0d2a1a;
            --hover-bg: #1a4a3a;
            --gradient-primary: linear-gradient(135deg, #0d2a1a, #4abfa0);
            --gradient-accent: linear-gradient(135deg, #4abfa0, #7fffd4);
        }
        .theme-coffee {
            --bg-body: #1a0f0a;
            --bg-card: #221a12;
            --bg-header: #2a1a12;
            --text-primary: #d4b896;
            --text-secondary: #b8987a;
            --text-muted: #7a6a5a;
            --border-color: #3a2a1a;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            --shadow-popup: 0 12px 40px rgba(0, 0, 0, 0.6);
            --wallet-bg: #2a1a12;
            --hover-bg: #3a2a1a;
            --gradient-primary: linear-gradient(135deg, #2a1a12, #b8987a);
            --gradient-accent: linear-gradient(135deg, #b8987a, #d4b896);
        }
        body.dark-mode {
            --bg-body: #1a1a2e;
            --bg-card: #1a1a2e;
            --bg-header: #16213e;
            --text-primary: #e8e8e8;
            --text-secondary: #8fc1e0;
            --text-muted: #6a8a9a;
            --border-color: #2a3a5a;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --shadow-popup: 0 12px 40px rgba(0, 0, 0, 0.5);
            --wallet-bg: #1a2a4a;
            --hover-bg: #1a2a4a;
            --gradient-primary: linear-gradient(135deg, #1a2a4a, #8fc1e0);
            --gradient-accent: linear-gradient(135deg, #8fc1e0, #e8e8e8);
        }

        body {
            background: var(--bg-body);
            min-height: 100vh;
            transition: var(--transition);
        }

        /* ===== HEADER ===== */
        .header {
            background: var(--bg-header);
            padding: 14px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: var(--transition);
            backdrop-filter: blur(12px);
            background: rgba(var(--bg-header-rgb, 255, 255, 255), 0.85);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-primary);
            transition: var(--transition);
            letter-spacing: -0.5px;
        }
        .logo span {
            color: var(--text-secondary);
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .menu-icon {
            cursor: pointer;
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            background: var(--wallet-bg);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }
        .menu-icon:hover {
            background: var(--hover-bg);
            transform: scale(1.02);
        }
        .menu-icon .bar {
            display: block;
            width: 20px;
            height: 2.5px;
            background: var(--text-secondary);
            border-radius: 4px;
            margin: 2.5px 0;
            transition: var(--transition);
        }
        .menu-icon .menu-text {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* ===== HEADER RIGHT ===== */
        .header-right {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .wallet {
            background: var(--wallet-bg);
            padding: 6px 18px 6px 16px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: var(--transition);
            cursor: default;
        }
        .wallet:hover {
            border-color: var(--text-secondary);
            box-shadow: 0 0 0 3px rgba(74, 138, 181, 0.1);
        }
        .wallet .vnd {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .wallet .vnd span {
            font-weight: 800;
        }
        .wallet .usd {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .wallet .usd span {
            color: var(--text-secondary);
            font-weight: 700;
        }
        .wallet-divider {
            width: 1px;
            height: 24px;
            background: var(--border-color);
        }

        .bell-icon {
            width: 40px;
            height: 40px;
            cursor: pointer;
            border-radius: 50%;
            background: var(--wallet-bg);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            position: relative;
            font-size: 18px;
        }
        .bell-icon:hover {
            background: var(--hover-bg);
            transform: scale(1.05);
        }
        .bell-icon .bell-dot {
            width: 10px;
            height: 10px;
            background: #e74c6f;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            right: 3px;
            border: 2px solid var(--bg-header);
            display: none;
            box-shadow: 0 0 12px rgba(231, 76, 111, 0.6);
        }
        .bell-icon .bell-dot.show {
            display: block;
            animation: pulse 1.8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.25);
                opacity: 0.8;
            }
        }

        .dot-menu {
            width: 40px;
            height: 40px;
            cursor: pointer;
            border-radius: 50%;
            background: var(--wallet-bg);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            transition: var(--transition);
            padding: 8px;
        }
        .dot-menu:hover {
            background: var(--hover-bg);
            transform: scale(1.05);
        }
        .dot-menu .dot {
            width: 4.5px;
            height: 4.5px;
            background: var(--text-secondary);
            border-radius: 50%;
            transition: var(--transition);
        }

        /* ===== POPUPS ===== */
        .popup {
            position: absolute;
            top: 52px;
            right: 0;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-popup);
            min-width: 200px;
            padding: 8px 0;
            border: 1px solid var(--border-color);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px) scale(0.96);
            transition: var(--transition);
            z-index: 200;
            transform-origin: top right;
        }
        .popup.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }
        .popup-item {
            padding: 12px 20px;
            color: var(--text-primary);
            font-size: 13.5px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 14px;
            border: none;
            background: none;
            width: 100%;
            font-weight: 500;
            letter-spacing: 0.2px;
        }
        .popup-item:hover {
            background: var(--hover-bg);
            padding-left: 26px;
        }
        .popup-item .icon {
            font-size: 18px;
            width: 28px;
            text-align: center;
        }
        .popup-divider {
            height: 1px;
            background: var(--border-color);
            margin: 6px 16px;
        }
        .popup-item.logout {
            color: #e74c6f;
        }
        .popup-item.logout:hover {
            background: #fde8ed;
        }
        .dark-mode .popup-item.logout:hover {
            background: #2a1a2a;
        }

        .settings-wrapper {
            position: relative;
        }

        /* ===== NOTIFICATION POPUP ===== */
        .notif-popup {
            position: fixed;
            top: 68px;
            right: 20px;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-popup);
            min-width: 320px;
            max-width: 400px;
            max-height: 400px;
            overflow-y: auto;
            padding: 0;
            border: 1px solid var(--border-color);
            z-index: 300;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px) scale(0.96);
            transition: var(--transition);
            transform-origin: top right;
        }
        .notif-popup.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }
        .notif-popup .notif-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--bg-card);
            border-radius: var(--radius-md) var(--radius-md) 0 0;
            z-index: 1;
        }
        .notif-popup .notif-header .close {
            cursor: pointer;
            font-size: 18px;
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: 8px;
            transition: var(--transition);
        }
        .notif-popup .notif-header .close:hover {
            background: var(--hover-bg);
        }
        .notif-popup .notif-item {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 13.5px;
            line-height: 1.5;
            transition: var(--transition);
        }
        .notif-popup .notif-item:last-child {
            border-bottom: none;
        }
        .notif-popup .notif-item .time {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 5px;
            font-weight: 400;
        }
        .notif-popup .notif-item.unread {
            background: var(--wallet-bg);
            border-left: 3px solid #e74c6f;
        }
        .notif-popup .empty {
            padding: 30px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* ===== SIDE MENU ===== */
        .side-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100vh;
            background: var(--bg-card);
            box-shadow: var(--shadow-popup);
            z-index: 300;
            transition: var(--transition);
            padding: 0;
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
        }
        .side-menu.active {
            left: 0;
        }
        .side-menu .menu-header {
            padding: 18px 22px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            background: var(--bg-header);
        }
        .side-menu .menu-header .close {
            cursor: pointer;
            font-size: 22px;
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: 8px;
            transition: var(--transition);
        }
        .side-menu .menu-header .close:hover {
            background: var(--hover-bg);
        }
        .side-menu .menu-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 22px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-primary);
            border: none;
            background: none;
            width: 100%;
            font-size: 14.5px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }
        .side-menu .menu-item:hover {
            background: var(--hover-bg);
            padding-left: 30px;
        }
        .side-menu .menu-item .icon {
            font-size: 20px;
            width: 32px;
            text-align: center;
        }
        .side-menu .menu-divider {
            height: 1px;
            background: var(--border-color);
            margin: 8px 16px;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 299;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            backdrop-filter: blur(4px);
        }
        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* ===== CONTENT ===== */
        .content {
            padding: 50px 24px;
            max-width: 820px;
            margin: 0 auto;
        }

        .welcome-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 48px 40px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            transition: var(--transition);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .welcome-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 0%, var(--text-secondary) 0%, transparent 70%);
            opacity: 0.03;
            pointer-events: none;
        }
        .welcome-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
        }
        .welcome-card h1 {
            color: var(--text-primary);
            font-size: 32px;
            font-weight: 800;
            transition: var(--transition);
            letter-spacing: -0.5px;
        }
        .welcome-card p {
            color: var(--text-muted);
            font-size: 17px;
            margin-top: 10px;
            transition: var(--transition);
            line-height: 1.6;
        }
        .welcome-card #userGreeting {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 18px;
        }

        .admin-badge {
            display: inline-block;
            background: var(--gradient-accent);
            color: #fff;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            margin-top: 10px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(245, 166, 35, 0.3);
        }

        .welcome-card .greeting-icon {
            font-size: 48px;
            margin-bottom: 8px;
            display: block;
        }

        .welcome-card .desc-line {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 14px;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-body);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .header {
                padding: 10px 14px;
                flex-wrap: nowrap;
            }
            .logo {
                font-size: 17px;
            }
            .wallet {
                padding: 4px 12px 4px 10px;
                gap: 8px;
                flex-wrap: nowrap;
            }
            .wallet .vnd {
                font-size: 12px;
            }
            .wallet .usd {
                font-size: 10px;
                display: none;
            }
            .wallet-divider {
                display: none;
            }
            .menu-text {
                display: none;
            }
            .menu-icon {
                padding: 6px 10px;
            }
            .bell-icon,
            .dot-menu {
                width: 34px;
                height: 34px;
                font-size: 15px;
            }
            .content {
                padding: 16px 12px;
            }
            .welcome-card {
                padding: 28px 18px;
            }
            .welcome-card h1 {
                font-size: 24px;
            }
            .welcome-card p {
                font-size: 15px;
            }
            .notif-popup {
                right: 8px;
                left: 8px;
                min-width: auto;
                max-width: none;
            }
            .side-menu {
                width: 260px;
                left: -280px;
            }
            .popup {
                min-width: 170px;
                right: -10px;
            }
            .popup-item {
                padding: 10px 16px;
                font-size: 13px;
            }
            .header-right {
                gap: 8px;
            }
        }

        @media (max-width: 480px) {
            .wallet .usd {
                display: none;
            }
            .wallet {
                padding: 4px 10px;
            }
            .logo {
                font-size: 15px;
            }
            .header-left {
                gap: 10px;
            }
            .header-right {
                gap: 6px;
            }
        }
    </style>
</head>
<body>

    <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>
    <div class="side-menu" id="sideMenu">
        <div class="menu-header">
            <span>📋 Menu</span>
            <span class="close" onclick="closeMenu()">✕</span>
        </div>
        <button class="menu-item" onclick="goHome()"><span class="icon">🏠</span><span data-key="home">Trang chủ</span></button>
        <button class="menu-item" onclick="goHistory()"><span class="icon">⏳</span><span data-key="history">Lịch sử</span></button>
        <button class="menu-item" onclick="goTopup()"><span class="icon">💰</span><span data-key="topup">Nạp tiền</span></button>
        <div class="menu-divider"></div>
        <button class="menu-item" onclick="goSupport()"><span class="icon">🆘</span><span data-key="support">Hỗ trợ</span></button>
    </div>

    <header class="header">
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">
                <div>
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </div>
                <span class="menu-text">MENU</span>
            </div>
            <div class="logo">KuanZ<span>Game</span></div>
        </div>
        <div class="header-right">
            <div class="wallet">
                <span class="vnd">💰 <span id="balanceAmount">0</span> VND</span>
                <span class="wallet-divider"></span>
                <span class="usd">💵 <span id="balanceUSD">0.00</span> USD</span>
            </div>
            <div class="bell-icon" onclick="toggleNotif()">
                <div class="bell-dot" id="notifDot"></div>
                🔔
            </div>
            <div class="settings-wrapper">
                <div class="dot-menu" onclick="togglePopup(event)">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
                <div class="popup" id="settingsPopup">
                    <button class="popup-item" onclick="goToProfile()"><span class="icon">👤</span> <span data-key="profile">Thông tin</span></button>
                    <button class="popup-item" onclick="goToSecurity()"><span class="icon">🛡️</span> <span data-key="security">Bảo mật</span></button>
                    <button class="popup-item" onclick="goToSettings()"><span class="icon">⚙️</span> <span data-key="settings">Cài đặt</span></button>
                    <div class="popup-divider"></div>
                    <button class="popup-item logout" onclick="logout()"><span class="icon">🚪</span> <span data-key="logout">Đăng xuất</span></button>
                </div>
            </div>
        </div>
    </header>

    <div class="notif-popup" id="notifPopup">
        <div class="notif-header">
            <span data-key="notif_title">📢 Thông báo</span>
            <span class="close" onclick="toggleNotif()">✕</span>
        </div>
        <div id="notifList"><div class="empty" data-key="notif_empty">Chưa có thông báo</div></div>
    </div>

    <div class="content">
        <div class="welcome-card">
            <span class="greeting-icon">🎮</span>
            <h1 data-key="welcome_title">🏠 Chào mừng bạn!</h1>
            <p id="userGreeting" data-key="welcome_greeting">Đang tải...</p>
            <div id="adminBadgeContainer"></div>
            <p class="desc-line" data-key="welcome_desc">Đây là trang chủ của bạn.</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCPDDRt520fSynXCGrr2aF-KvpnS_ZuIm8",
            authDomain: "shop-c6777.firebaseapp.com",
            databaseURL: "https://shop-c6777-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "shop-c6777",
            storageBucket: "shop-c6777.firebasestorage.app",
            messagingSenderId: "43186563268",
            appId: "1:43186563268:web:0d392ba57039a919670191"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const EXCHANGE_RATE = 25000;

        const translations = {
            vi: { home: 'Trang chủ', history: 'Lịch sử', topup: 'Nạp tiền', support: 'Hỗ trợ', profile: 'Thông tin',
                security: 'Bảo mật', settings: 'Cài đặt', logout: 'Đăng xuất', notif_title: '📢 Thông báo',
                notif_empty: 'Chưa có thông báo', welcome_title: '🏠 Chào mừng bạn!', welcome_greeting: 'Đang tải...',
                welcome_desc: 'Đây là trang chủ của bạn.' },
            en: { home: 'Home', history: 'History', topup: 'Top up', support: 'Support', profile: 'Profile',
                security: 'Security', settings: 'Settings', logout: 'Logout', notif_title: '📢 Notifications',
                notif_empty: 'No notifications', welcome_title: '🏠 Welcome!', welcome_greeting: 'Loading...',
                welcome_desc: 'This is your homepage.' }
        };

        let lang = localStorage.getItem('lang') || 'vi';

        function applyLang() {
            const data = translations[lang] || translations.vi;
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (data[key] !== undefined) el.textContent = data[key];
            });
        }

        function applyTheme() {
            const isDark = localStorage.getItem('theme') === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            const theme = localStorage.getItem('theme_name') || 'default';
            document.body.className = document.body.className.replace(/theme-\w+/g, '');
            if (theme !== 'default') document.body.classList.add('theme-' + theme);
        }
        applyTheme();
        applyLang();

        auth.onAuthStateChanged((user) => {
            if (!user) { window.location.replace('Authenticator/login.html'); return; }
            const name = user.displayName || user.email || 'Người dùng';
            document.getElementById('userGreeting').textContent = (lang === 'vi' ? 'Xin chào, ' : 'Hello, ') + name + '!';
            db.ref('users/' + user.uid).on('value', snap => {
                const data = snap.val();
                if (data) {
                    document.getElementById('balanceAmount').textContent = (data.balance || 0).toLocaleString('vi-VN');
                    document.getElementById('balanceUSD').textContent = ((data.balance || 0) / EXCHANGE_RATE).toFixed(2);
                    document.getElementById('adminBadgeContainer').innerHTML = data.isAdmin ?
                        '<span class="admin-badge">👑 ADMIN</span>' : '';
                }
            });
            db.ref('notifications').on('value', snap => {
                const notifs = snap.val();
                const list = document.getElementById('notifList');
                const dot = document.getElementById('notifDot');
                if (notifs) {
                    const keys = Object.keys(notifs).reverse();
                    let html = '',
                        hasUnread = false;
                    keys.forEach(key => {
                        const n = notifs[key];
                        const isUnread = !n.readBy || !n.readBy[user.uid];
                        if (isUnread) hasUnread = true;
                        html +=
                            `<div class="notif-item ${isUnread?'unread':''}">${n.message}<div class="time">${new Date(n.timestamp).toLocaleString('vi-VN')}</div></div>`;
                    });
                    list.innerHTML = html;
                    dot.classList.toggle('show', hasUnread && localStorage.getItem('notifEnabled') !== 'false');
                } else {
                    list.innerHTML =
                    `<div class="empty">${lang === 'vi' ? 'Chưa có thông báo' : 'No notifications'}</div>`;
                    dot.classList.remove('show');
                }
            });
        });

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('menuOverlay').classList.toggle('active');
        }

        function closeMenu() {
            document.getElementById('sideMenu').classList.remove('active');
            document.getElementById('menuOverlay').classList.remove('active');
        }

        function togglePopup(e) {
            e.stopPropagation();
            document.getElementById('settingsPopup').classList.toggle('active');
        }
        document.addEventListener('click', function(e) {
            const popup = document.getElementById('settingsPopup');
            const wrapper = document.querySelector('.settings-wrapper');
            if (!wrapper.contains(e.target)) popup.classList.remove('active');
        });

        function toggleNotif() {
            const popup = document.getElementById('notifPopup');
            popup.classList.toggle('active');
            const user = auth.currentUser;
            if (user && localStorage.getItem('autoView') !== 'false') {
                db.ref('notifications').once('value', snap => {
                    const notifs = snap.val();
                    if (notifs) Object.keys(notifs).forEach(key => db.ref('notifications/' + key + '/readBy/' + user
                        .uid).set(true));
                });
                document.getElementById('notifDot').classList.remove('show');
            }
        }

        function goHome() { closeMenu();
            window.location.href = 'index.html'; }

        function goHistory() { closeMenu();
            alert(lang === 'vi' ? '📜 Đang phát triển!' : '📜 Coming soon!'); }

        function goTopup() { closeMenu();
            alert(lang === 'vi' ? '💰 Đang phát triển!' : '💰 Coming soon!'); }

        function goSupport() { closeMenu();
            alert(lang === 'vi' ? '🆘 Đang phát triển!' : '🆘 Coming soon!'); }

        function goToProfile() { window.location.href = 'Pop-up/profile.html'; }

        function goToSecurity() { window.location.href = 'Pop-up/security.html'; }

        function goToSettings() { window.location.href = 'Pop-up/settings.html'; }

        function logout() {
            if (confirm(lang === 'vi' ? 'Đăng xuất?' : 'Logout?')) auth.signOut().then(() => window.location.replace(
                'Authenticator/login.html'));
        }

        window.addEventListener('storage', function(e) {
            if (e.key === 'lang') { lang = e.newValue || 'vi';
                applyLang(); }
            if (e.key === 'theme' || e.key === 'theme_name') { applyTheme(); }
        });
    </script>
</body>
</html>
