<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin - KuanZGame.Store</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        :root { 
            --bg-body: #f0f7ff; 
            --bg-card: #fff; 
            --bg-header: #fff; 
            --text-primary: #2c5a7a; 
            --text-secondary: #5a8fb5; 
            --text-muted: #8ab3d4; 
            --border-color: #e3eef9; 
            --shadow: 0 2px 10px rgba(0,0,0,0.05); 
            --shadow-popup: 0 8px 30px rgba(0,0,0,0.15); 
            --wallet-bg: #f0f7ff; 
            --hover-bg: #f0f7ff; 
            --accent: #3b8fd6; 
            --success: #27ae60; 
            --danger: #e74c6f; 
            --warning: #f39c12;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .theme-galaxy { --bg-body: #0a0a1a; --bg-card: #12122a; --bg-header: #1a1a3e; --text-primary: #c8b8ff; --text-secondary: #8a7aff; --text-muted: #6a5a9a; --border-color: #2a2a5a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #1a1a3e; --hover-bg: #2a2a5a; --accent: #8a7aff; }
        .theme-ocean { --bg-body: #0a1628; --bg-card: #0f2a4a; --bg-header: #0d2847; --text-primary: #7fc8ff; --text-secondary: #4a9aff; --text-muted: #3a6a8a; --border-color: #1a3a6a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #0d2847; --hover-bg: #1a3a6a; --accent: #4a9aff; }
        .theme-forest { --bg-body: #0a1a0a; --bg-card: #0f2a0f; --bg-header: #0d2a0d; --text-primary: #7fdf7f; --text-secondary: #4abf4a; --text-muted: #3a7a3a; --border-color: #1a4a1a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #0d2a0d; --hover-bg: #1a4a1a; --accent: #4abf4a; }
        .theme-sunset { --bg-body: #1a0a0a; --bg-card: #2a120a; --bg-header: #3e1a0a; --text-primary: #ffb87f; --text-secondary: #ff8a4a; --text-muted: #9a6a3a; --border-color: #5a2a1a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #3e1a0a; --hover-bg: #5a2a1a; --accent: #ff8a4a; }
        .theme-cherry { --bg-body: #1a0a12; --bg-card: #2a0a16; --bg-header: #3e0a1a; --text-primary: #ff7fa8; --text-secondary: #ff4a7a; --text-muted: #9a3a5a; --border-color: #5a1a2a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #3e1a0a; --hover-bg: #5a1a2a; --accent: #ff4a7a; }
        .theme-neon { --bg-body: #0a0a0a; --bg-card: #121212; --bg-header: #1a1a1a; --text-primary: #00ff88; --text-secondary: #00ccff; --text-muted: #666; --border-color: #333; --shadow: 0 2px 10px rgba(0,0,0,0.6); --shadow-popup: 0 8px 30px rgba(0,0,0,0.8); --wallet-bg: #1a1a1a; --hover-bg: #2a2a2a; --accent: #00ccff; }
        .theme-lavender { --bg-body: #1a0a2a; --bg-card: #221a3a; --bg-header: #2a1a3e; --text-primary: #d4a8ff; --text-secondary: #b87aff; --text-muted: #7a5a9a; --border-color: #3a2a5a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #2a1a3e; --hover-bg: #3a2a5a; --accent: #b87aff; }
        .theme-mint { --bg-body: #0a1a12; --bg-card: #0f2a1a; --bg-header: #0d2a1a; --text-primary: #7fffd4; --text-secondary: #4abfa0; --text-muted: #3a7a6a; --border-color: #1a4a3a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #0d2a1a; --hover-bg: #1a4a3a; --accent: #4abfa0; }
        .theme-coffee { --bg-body: #1a0f0a; --bg-card: #221a12; --bg-header: #2a1a12; --text-primary: #d4b896; --text-secondary: #b8987a; --text-muted: #7a6a5a; --border-color: #3a2a1a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #2a1a12; --hover-bg: #3a2a1a; --accent: #b8987a; }
        body.dark-mode { --bg-body: #1a1a2e; --bg-card: #1a1a2e; --bg-header: #16213e; --text-primary: #e8e8e8; --text-secondary: #8fc1e0; --text-muted: #6a8a9a; --border-color: #2a3a5a; --shadow: 0 2px 10px rgba(0,0,0,0.3); --shadow-popup: 0 8px 30px rgba(0,0,0,0.5); --wallet-bg: #1a2a4a; --hover-bg: #1a2a4a; --accent: #8fc1e0; }
        body { background: var(--bg-body); min-height: 100vh; transition: var(--transition); }
        
        /* ===== HEADER GIỐNG INDEX ===== */
        .header { background: var(--bg-header); padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; transition: var(--transition); backdrop-filter: blur(12px); }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .logo { display: none; }
        .menu-icon { cursor: pointer; padding: 6px 8px; border-radius: 8px; background: var(--wallet-bg); border: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; transition: var(--transition); width: 34px; height: 34px; flex-shrink: 0; }
        .menu-icon:hover { background: var(--hover-bg); transform: scale(1.05); }
        .menu-icon .bar { display: block; width: 18px; height: 2px; background: var(--text-secondary); border-radius: 2px; transition: var(--transition); flex-shrink: 0; }
        .menu-icon:hover .bar { background: var(--text-primary); }
        .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

        .wallet-container { background: var(--wallet-bg); border: 2px solid var(--border-color); border-radius: 10px; padding: 4px 12px 4px 8px; display: flex; align-items: center; gap: 8px; transition: var(--transition); cursor: default; min-height: 36px; }
        .wallet-container:hover { border-color: var(--accent); }
        .wallet-icon-box { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .wallet-icon-box i { color: #fff; font-size: 13px; }
        .wallet-info { display: flex; flex-direction: column; line-height: 1.2; }
        .wallet-label { font-size: 8px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .wallet-balance { font-size: 14px; font-weight: 700; color: var(--text-primary); }
        .wallet-balance span { font-size: 10px; font-weight: 600; color: var(--text-muted); margin-left: 2px; }

        .bell-icon { width: 34px; height: 34px; cursor: pointer; border-radius: 50%; background: var(--wallet-bg); border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; transition: var(--transition); position: relative; font-size: 15px; color: var(--text-secondary); flex-shrink: 0; }
        .bell-icon:hover { background: var(--hover-bg); transform: scale(1.05); color: var(--text-primary); }
        .bell-icon .bell-dot { width: 8px; height: 8px; background: var(--danger); border-radius: 50%; position: absolute; top: 2px; right: 2px; border: 2px solid var(--bg-header); display: none; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }

        .settings-wrapper { position: relative; }
        .dot-menu { width: 34px; height: 34px; cursor: pointer; border-radius: 50%; background: var(--wallet-bg); border: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; transition: var(--transition); padding: 6px; flex-shrink: 0; }
        .dot-menu:hover { background: var(--hover-bg); transform: scale(1.05); }
        .dot-menu .dot { width: 3.5px; height: 3.5px; background: var(--text-secondary); border-radius: 50%; transition: var(--transition); }
        .dot-menu:hover .dot { background: var(--text-primary); }
        .popup { position: absolute; top: 42px; right: 0; background: var(--bg-card); border-radius: 10px; box-shadow: var(--shadow-popup); min-width: 160px; padding: 4px 0; border: 1px solid var(--border-color); opacity: 0; visibility: hidden; transform: translateY(-8px) scale(0.96); transition: var(--transition); z-index: 200; }
        .popup.active { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }
        .popup-item { padding: 8px 16px; color: var(--text-primary); font-size: 12px; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 10px; border: none; background: none; width: 100%; font-weight: 500; }
        .popup-item:hover { background: var(--hover-bg); padding-left: 22px; }
        .popup-divider { height: 1px; background: var(--border-color); margin: 4px 10px; }
        .popup-item.logout { color: var(--danger); }

        .notif-popup { position: fixed; top: 56px; right: 12px; background: var(--bg-card); border-radius: 10px; box-shadow: var(--shadow-popup); min-width: 260px; max-width: 320px; max-height: 300px; overflow-y: auto; padding: 10px 0; border: 1px solid var(--border-color); z-index: 300; opacity: 0; visibility: hidden; transform: translateY(-8px) scale(0.96); transition: var(--transition); }
        .notif-popup.active { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }
        .notif-popup .notif-header { padding: 0 12px 8px; border-bottom: 1px solid var(--border-color); font-weight: 700; color: var(--text-primary); display: flex; justify-content: space-between; font-size: 13px; }
        .notif-popup .notif-header .close { cursor: pointer; transition: var(--transition); }
        .notif-popup .notif-header .close:hover { color: var(--danger); }
        .notif-popup .notif-item { padding: 8px 12px; border-bottom: 1px solid var(--border-color); color: var(--text-primary); font-size: 12px; display: flex; align-items: flex-start; gap: 8px; }
        .notif-popup .notif-item i { margin-top: 2px; color: var(--text-secondary); }
        .notif-popup .notif-item .time { font-size: 9px; color: var(--text-muted); margin-top: 2px; display: block; }
        .notif-popup .notif-item.unread { background: var(--wallet-bg); border-left: 3px solid var(--danger); }
        .notif-popup .notif-item.unread i { color: var(--danger); }
        .notif-popup .empty { padding: 14px; text-align: center; color: var(--text-muted); font-size: 12px; }
        .notif-popup .empty i { font-size: 20px; display: block; margin-bottom: 6px; }

        .side-menu { position: fixed; top: 0; left: -260px; width: 240px; height: 100vh; background: var(--bg-card); box-shadow: var(--shadow-popup); z-index: 300; transition: var(--transition); padding: 14px 0; border-right: 1px solid var(--border-color); overflow-y: auto; }
        .side-menu.active { left: 0; }
        .side-menu .menu-header { padding: 10px 16px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .side-menu .menu-header .close { cursor: pointer; font-size: 18px; color: var(--text-muted); transition: var(--transition); }
        .side-menu .menu-header .close:hover { color: var(--danger); transform: rotate(90deg); }
        .side-menu .menu-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; cursor: pointer; transition: var(--transition); color: var(--text-primary); border: none; background: none; width: 100%; font-size: 13px; font-weight: 500; }
        .side-menu .menu-item:hover { background: var(--hover-bg); padding-left: 22px; }
        .side-menu .menu-item .icon { font-size: 16px; width: 24px; text-align: center; }
        .side-menu .menu-divider { height: 1px; background: var(--border-color); margin: 4px 12px; }
        .menu-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 299; opacity: 0; visibility: hidden; transition: var(--transition); }
        .menu-overlay.active { opacity: 1; visibility: visible; }

        .content { padding: 14px 16px; max-width: 500px; margin: 0 auto; }
        
        .profile-card { background: var(--bg-card); border-radius: 12px; padding: 16px 18px; box-shadow: var(--shadow); border: 1px solid var(--border-color); transition: var(--transition); text-align: center; }
        .profile-card:hover { box-shadow: var(--shadow-popup); }
        .avatar { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--text-secondary)); display: flex; align-items: center; justify-content: center; font-size: 26px; color: #fff; margin: 0 auto 12px; font-weight: 600; flex-shrink: 0; }
        .profile-card h2 { color: var(--text-primary); font-size: 17px; transition: var(--transition); }
        .profile-card .email-sub { color: var(--text-muted); font-size: 12px; margin-bottom: 12px; transition: var(--transition); }
        .info-item { padding: 6px 0; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; color: var(--text-primary); font-size: 13px; transition: var(--transition); }
        .info-item .label { color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 6px; font-size: 12px; }
        .info-item .value { word-break: break-all; font-weight: 500; font-size: 13px; }
        .balance-box { margin-top: 12px; padding: 12px 14px; background: var(--wallet-bg); border-radius: 8px; border: 1px solid var(--border-color); transition: var(--transition); }
        .balance-box:hover { border-color: var(--accent); }
        .balance-box .blabel { color: var(--text-muted); font-size: 11px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .balance-box .bamount { color: var(--text-primary); font-size: 18px; font-weight: 700; }
        .admin-badge { display: inline-block; background: linear-gradient(135deg, #f5a623, #f7c948); color: #fff; padding: 2px 12px; border-radius: 16px; font-size: 11px; font-weight: 700; margin-top: 4px; }
        .btn { padding: 8px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: var(--transition); border: none; width: 100%; margin-top: 6px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-security { background: linear-gradient(135deg, #2c5a7a, #1a3a5a); color: #fff; }
        .btn-security:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(44,90,122,0.3); }
        .btn-back { background: transparent; color: var(--text-secondary); border: 2px solid var(--border-color); }
        .btn-back:hover { background: var(--hover-bg); border-color: var(--text-secondary); }

        .token-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color); }
        .token-section .token-label { color: var(--text-muted); font-size: 11px; font-weight: 500; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
        .token-box { background: var(--wallet-bg); border: 2px solid var(--border-color); border-radius: 8px; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; gap: 8px; transition: var(--transition); }
        .token-box:hover { border-color: var(--accent); }
        .token-box .token-key { font-family: 'Courier New', monospace; font-size: 12px; font-weight: 600; color: var(--text-primary); letter-spacing: 1px; word-break: break-all; }
        .token-box .copy-btn { padding: 3px 10px; background: var(--text-secondary); color: #fff; border: none; border-radius: 4px; font-size: 10px; font-weight: 600; cursor: pointer; transition: var(--transition); flex-shrink: 0; display: flex; align-items: center; gap: 4px; }
        .token-box .copy-btn:hover { transform: scale(1.05); opacity: 0.9; }
        .token-box .copy-btn.copied { background: var(--success); }
        .token-actions { display: flex; gap: 6px; margin-top: 6px; }
        .token-actions button { flex: 1; padding: 6px; border: none; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 4px; }
        .token-actions .btn-reset { background: var(--warning); color: #fff; }
        .token-actions .btn-reset:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(243,156,18,0.3); }
        .token-actions .btn-reset:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .token-status { font-size: 10px; color: var(--text-muted); margin-top: 3px; display: flex; align-items: center; gap: 4px; }

        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-body); z-index: 999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; transition: 0.4s; }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; display: none !important; }
        .loading-spinner { width: 36px; height: 36px; border: 4px solid var(--border-color); border-radius: 50%; border-top-color: var(--accent); animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--text-primary); font-size: 13px; font-weight: 500; }

        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 6px 16px; background: var(--bg-card); color: var(--text-primary); border-radius: 8px; box-shadow: var(--shadow-popup); border: 1px solid var(--border-color); z-index: 999; opacity: 0; transition: 0.4s; font-weight: 500; font-size: 11px; pointer-events: none; }
        .toast.show { opacity: 1; }
        .toast.success { border-color: var(--success); color: var(--success); }
        .toast.error { border-color: var(--danger); color: var(--danger); }

        @media (max-width: 600px) { 
            .header { padding: 6px 10px; } 
            .content { padding: 8px 10px; } 
            .profile-card { padding: 12px 14px; } 
            .wallet-container { padding: 3px 8px 3px 6px; min-height: 30px; }
            .wallet-icon-box { width: 22px; height: 22px; }
            .wallet-icon-box i { font-size: 10px; }
            .wallet-balance { font-size: 11px; }
            .wallet-label { font-size: 7px; }
            .menu-icon { width: 28px; height: 28px; padding: 4px 6px; }
            .menu-icon .bar { width: 14px; height: 2px; }
            .bell-icon { width: 28px; height: 28px; font-size: 13px; }
            .dot-menu { width: 28px; height: 28px; }
            .notif-popup { right: 6px; left: 6px; min-width: auto; }
            .token-box { flex-direction: column; align-items: stretch; } 
            .token-box .copy-btn { margin-top: 4px; } 
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">⏳ Đang tải dữ liệu...</div>
    </div>

    <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>
    <div class="side-menu" id="sideMenu">
        <div class="menu-header"><span style="font-weight:700;color:var(--text-primary);"><i class="fas fa-bars"></i> Menu</span><span class="close" onclick="closeMenu()"><i class="fas fa-times"></i></span></div>
        <button class="menu-item" onclick="goHome()"><span class="icon"><i class="fas fa-home"></i></span>Trang chủ</button>
        <button class="menu-item" onclick="goHistory()"><span class="icon"><i class="fas fa-history"></i></span>Lịch sử</button>
        <button class="menu-item" onclick="goTopup()"><span class="icon"><i class="fas fa-coins"></i></span>Nạp tiền</button>
        <div class="menu-divider"></div>
        <button class="menu-item" onclick="goSupport()"><span class="icon"><i class="fas fa-headset"></i></span>Hỗ trợ</button>
    </div>

    <header class="header">
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <div class="logo"></div>
        </div>
        <div class="header-right">
            <div class="wallet-container">
                <div class="wallet-icon-box"><i class="fas fa-wallet"></i></div>
                <div class="wallet-info">
                    <span class="wallet-label">Số dư</span>
                    <span class="wallet-balance"><span id="balanceAmount">0</span> <span>VND</span></span>
                </div>
            </div>
            <div class="bell-icon" onclick="toggleNotif()"><div class="bell-dot" id="notifDot"></div><i class="fas fa-bell"></i></div>
            <div class="settings-wrapper">
                <div class="dot-menu" onclick="togglePopup(event)">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
                <div class="popup" id="settingsPopup">
                    <button class="popup-item" onclick="goToProfile()"><i class="fas fa-user"></i> Thông tin</button>
                    <button class="popup-item" onclick="goToSecurity()"><i class="fas fa-shield-alt"></i> Bảo mật</button>
                    <button class="popup-item" onclick="goToSettings()"><i class="fas fa-cog"></i> Cài đặt</button>
                    <div class="popup-divider"></div>
                    <button class="popup-item logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
                </div>
            </div>
        </div>
    </header>

    <div class="notif-popup" id="notifPopup">
        <div class="notif-header"><span><i class="fas fa-bullhorn"></i> Thông báo</span><span class="close" onclick="toggleNotif()"><i class="fas fa-times"></i></span></div>
        <div id="notifList"><div class="empty"><i class="far fa-bell-slash"></i> Chưa có thông báo</div></div>
    </div>

    <div class="content">
        <div class="profile-card">
            <div class="avatar" id="avatar">👤</div>
            <h2 id="userName">Người dùng</h2>
            <p class="email-sub" id="userEmail">email@example.com</p>
            <div id="adminBadgeContainer"></div>
            
            <div class="info-item"><span class="label"><i class="fas fa-envelope"></i> Email</span><span class="value" id="displayEmail">---</span></div>
            <div class="info-item"><span class="label"><i class="fas fa-user"></i> Tên</span><span class="value" id="displayName">---</span></div>
            <div class="info-item"><span class="label"><i class="fas fa-id-card"></i> UID</span><span class="value" id="displayUid" style="font-size:11px;font-family:monospace;">---</span></div>
            <div class="info-item"><span class="label"><i class="fas fa-calendar-plus"></i> Ngày tạo</span><span class="value" id="displayCreated">---</span></div>
            
            <div class="balance-box">
                <div class="blabel"><i class="fas fa-coins"></i> Số dư</div>
                <div class="bamount" id="profileBalance">0 VND</div>
            </div>

            <div class="token-section">
                <div class="token-label">
                    <span><i class="fas fa-key"></i> Token đăng nhập nhanh</span>
                    <span style="font-size:9px;color:var(--text-muted);">(Không cần mật khẩu)</span>
                </div>
                <div class="token-box">
                    <span class="token-key" id="tokenDisplay">Chưa có token</span>
                    <button class="copy-btn" id="copyTokenBtn" onclick="copyToken()"><i class="fas fa-copy"></i> Sao chép</button>
                </div>
                <div class="token-status" id="tokenStatus"><i class="fas fa-exclamation-circle"></i> Bạn chưa tạo token. Nhấn "Tạo mới" để tạo!</div>
                <div class="token-actions">
                    <button class="btn-reset" id="resetTokenBtn" onclick="resetToken()"><i class="fas fa-sync"></i> Tạo mới</button>
                </div>
            </div>

            <button class="btn btn-security" onclick="goToSecurity()"><i class="fas fa-shield-alt"></i> Bảo mật</button>
            <button class="btn btn-back" onclick="goHome()"><i class="fas fa-arrow-left"></i> Quay lại</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCPDDRt520fSynXCGrr2aF-KvpnS_ZuIm8",
            authDomain: "shop-c6777.firebaseapp.com",
            databaseURL: "https://shop-c6777-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "shop-c6777",
            storageBucket: "shop-c6777.firebasestorage.app",
            messagingSenderId: "43186563268",
            appId: "1:43186563268:web:0d392ba57039a919670191"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUser = null;
        let isDataLoaded = false;

        function showToast(msg, type = '') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast ' + type;
            el.classList.add('show');
            clearTimeout(el.timeout);
            el.timeout = setTimeout(() => el.classList.remove('show'), 2500);
        }

        function applyTheme() {
            const isDark = localStorage.getItem('theme') === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            const theme = localStorage.getItem('theme_name') || 'default';
            document.body.className = document.body.className.replace(/theme-\w+/g, '');
            if (theme !== 'default') document.body.classList.add('theme-' + theme);
        }
        applyTheme();

        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.add('hidden');
            setTimeout(() => overlay.style.display = 'none', 500);
        }

        function showLoading() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = 'flex';
            overlay.classList.remove('hidden');
        }

        function checkQuickLogin() {
            const quickUid = localStorage.getItem('quickLoginUid');
            const quickToken = localStorage.getItem('quickLoginToken');
            const quickPending = localStorage.getItem('quickLoginPending');
            return !!(quickUid && quickToken && quickPending === 'true');
        }

        async function completeQuickLogin() {
            const quickUid = localStorage.getItem('quickLoginUid');
            if (!quickUid) return false;
            try {
                const snap = await db.ref('users/' + quickUid).once('value');
                const data = snap.val();
                if (data) {
                    const name = data.displayName || data.email || 'U';
                    document.getElementById('avatar').textContent = name.charAt(0).toUpperCase();
                    document.getElementById('userName').textContent = name;
                    document.getElementById('userEmail').textContent = data.email || '';
                    document.getElementById('displayEmail').textContent = data.email || 'Chưa có';
                    document.getElementById('displayName').textContent = data.displayName || 'Chưa cập nhật';
                    document.getElementById('displayUid').textContent = quickUid;
                    document.getElementById('displayCreated').textContent = data.createdAt ? new Date(data.createdAt).toLocaleString('vi-VN') : '---';
                    const balance = data.balance || 0;
                    document.getElementById('balanceAmount').textContent = balance.toLocaleString('vi-VN');
                    document.getElementById('profileBalance').textContent = balance.toLocaleString('vi-VN') + ' VND';
                    document.getElementById('adminBadgeContainer').innerHTML = data.isAdmin ? '<span class="admin-badge"><i class="fas fa-crown"></i> ADMIN</span>' : '';
                    if (data.quickToken) {
                        document.getElementById('tokenDisplay').textContent = data.quickToken;
                        document.getElementById('tokenStatus').innerHTML = '<i class="fas fa-check-circle" style="color:var(--success);"></i> Token đã sẵn sàng!';
                        document.getElementById('tokenStatus').style.color = 'var(--success)';
                    } else {
                        document.getElementById('tokenDisplay').textContent = 'Chưa có token';
                        document.getElementById('tokenStatus').innerHTML = '<i class="fas fa-exclamation-circle"></i> Bạn chưa tạo token. Nhấn "Tạo mới" để tạo!';
                        document.getElementById('tokenStatus').style.color = 'var(--text-muted)';
                    }
                    await db.ref('presence/' + quickUid).set(true);
                    db.ref('presence/' + quickUid).onDisconnect().set(false);
                    db.ref('notifications').on('value', snap => {
                        const notifs = snap.val();
                        const list = document.getElementById('notifList');
                        const dot = document.getElementById('notifDot');
                        if (notifs) {
                            const keys = Object.keys(notifs).reverse();
                            let html = '', hasUnread = false;
                            keys.forEach(key => {
                                const n = notifs[key];
                                const isUnread = !n.readBy || !n.readBy[quickUid];
                                if (isUnread) hasUnread = true;
                                html += `<div class="notif-item ${isUnread?'unread':''}"><i class="fas fa-bell"></i> ${n.message}<span class="time"><i class="far fa-clock"></i> ${new Date(n.timestamp).toLocaleString('vi-VN')}</span></div>`;
                            });
                            list.innerHTML = html;
                            dot.classList.toggle('show', hasUnread && localStorage.getItem('notifEnabled') !== 'false');
                        } else {
                            list.innerHTML = `<div class="empty"><i class="far fa-bell-slash"></i> Chưa có thông báo</div>`;
                            dot.classList.remove('show');
                        }
                    });
                    isDataLoaded = true;
                    hideLoading();
                    return true;
                }
                return false;
            } catch (error) {
                console.error('Lỗi complete quick login:', error);
                return false;
            }
        }

        function generateUniqueToken() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let token = '';
            for (let i = 0; i < 16; i++) token += chars.charAt(Math.floor(Math.random() * chars.length));
            return token + Date.now().toString(36).slice(-4);
        }

        async function resetToken() {
            if (!currentUser) {
                const quickUid = localStorage.getItem('quickLoginUid');
                if (quickUid) currentUser = { uid: quickUid };
                else { showToast('Vui lòng đăng nhập!', 'error'); return; }
            }
            const btn = document.getElementById('resetTokenBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang tạo...';
            try {
                const newToken = generateUniqueToken();
                await db.ref('users/' + currentUser.uid + '/quickToken').set(newToken);
                document.getElementById('tokenDisplay').textContent = newToken;
                document.getElementById('tokenStatus').innerHTML = '<i class="fas fa-check-circle" style="color:var(--success);"></i> Token mới đã được tạo thành công!';
                document.getElementById('tokenStatus').style.color = 'var(--success)';
                showToast('✅ Token mới đã được tạo!', 'success');
            } catch (error) {
                let errorMsg = '❌ Lỗi tạo token! ' + (error.message || '');
                document.getElementById('tokenStatus').innerHTML = '<i class="fas fa-exclamation-circle" style="color:var(--danger);"></i> ' + errorMsg;
                document.getElementById('tokenStatus').style.color = 'var(--danger)';
                showToast(errorMsg, 'error');
            }
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sync"></i> Tạo mới';
        }

        function copyToken() {
            const token = document.getElementById('tokenDisplay').textContent;
            if (token === 'Chưa có token') { showToast('⚠️ Chưa có token để sao chép!', 'error'); return; }
            const btn = document.getElementById('copyTokenBtn');
            if (navigator.clipboard) {
                navigator.clipboard.writeText(token).then(() => {
                    btn.innerHTML = '<i class="fas fa-check"></i> Đã sao chép!';
                    btn.classList.add('copied');
                    setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy"></i> Sao chép'; btn.classList.remove('copied'); }, 2000);
                    showToast('✅ Đã sao chép token!', 'success');
                });
            } else {
                const textarea = document.createElement('textarea');
                textarea.value = token;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btn.innerHTML = '<i class="fas fa-check"></i> Đã sao chép!';
                btn.classList.add('copied');
                setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy"></i> Sao chép'; btn.classList.remove('copied'); }, 2000);
                showToast('✅ Đã sao chép token!', 'success');
            }
        }

        auth.onAuthStateChanged(async (user) => {
            if (isDataLoaded) return;
            if (checkQuickLogin()) {
                const success = await completeQuickLogin();
                if (success) return;
                localStorage.removeItem('quickLoginUid');
                localStorage.removeItem('quickLoginToken');
                localStorage.removeItem('quickLoginPending');
                window.location.replace('../Authenticator/login.html');
                return;
            }
            if (!user) { window.location.replace('../Authenticator/login.html'); return; }
            currentUser = user;
            db.ref('presence/' + user.uid).set(true);
            db.ref('presence/' + user.uid).onDisconnect().set(false);
            const name = user.displayName || user.email || 'U';
            document.getElementById('avatar').textContent = name.charAt(0).toUpperCase();
            document.getElementById('userName').textContent = name;
            document.getElementById('userEmail').textContent = user.email || '';
            document.getElementById('displayEmail').textContent = user.email || 'Chưa có';
            document.getElementById('displayName').textContent = user.displayName || 'Chưa cập nhật';
            document.getElementById('displayUid').textContent = user.uid;
            document.getElementById('displayCreated').textContent = user.metadata.creationTime || '---';
            db.ref('users/' + user.uid).on('value', snap => {
                const data = snap.val();
                if (data) {
                    const balance = data.balance || 0;
                    document.getElementById('balanceAmount').textContent = balance.toLocaleString('vi-VN');
                    document.getElementById('profileBalance').textContent = balance.toLocaleString('vi-VN') + ' VND';
                    document.getElementById('adminBadgeContainer').innerHTML = data.isAdmin ? '<span class="admin-badge"><i class="fas fa-crown"></i> ADMIN</span>' : '';
                    if (data.quickToken) {
                        document.getElementById('tokenDisplay').textContent = data.quickToken;
                        document.getElementById('tokenStatus').innerHTML = '<i class="fas fa-check-circle" style="color:var(--success);"></i> Token đã sẵn sàng!';
                        document.getElementById('tokenStatus').style.color = 'var(--success)';
                    } else {
                        document.getElementById('tokenDisplay').textContent = 'Chưa có token';
                        document.getElementById('tokenStatus').innerHTML = '<i class="fas fa-exclamation-circle"></i> Bạn chưa tạo token. Nhấn "Tạo mới" để tạo!';
                        document.getElementById('tokenStatus').style.color = 'var(--text-muted)';
                    }
                }
                if (!isDataLoaded) { isDataLoaded = true; hideLoading(); }
            });
            db.ref('notifications').on('value', snap => {
                const notifs = snap.val();
                const list = document.getElementById('notifList');
                const dot = document.getElementById('notifDot');
                if (notifs) {
                    const keys = Object.keys(notifs).reverse();
                    let html = '', hasUnread = false;
                    keys.forEach(key => {
                        const n = notifs[key];
                        const isUnread = !n.readBy || !n.readBy[user.uid];
                        if (isUnread) hasUnread = true;
                        html += `<div class="notif-item ${isUnread?'unread':''}"><i class="fas fa-bell"></i> ${n.message}<span class="time"><i class="far fa-clock"></i> ${new Date(n.timestamp).toLocaleString('vi-VN')}</span></div>`;
                    });
                    list.innerHTML = html;
                    dot.classList.toggle('show', hasUnread && localStorage.getItem('notifEnabled') !== 'false');
                } else {
                    list.innerHTML = `<div class="empty"><i class="far fa-bell-slash"></i> Chưa có thông báo</div>`;
                    dot.classList.remove('show');
                }
            });
        });

        // ===== MENU FUNCTIONS =====
        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); document.getElementById('menuOverlay').classList.toggle('active'); }
        function closeMenu() { document.getElementById('sideMenu').classList.remove('active'); document.getElementById('menuOverlay').classList.remove('active'); }
        function togglePopup(e) { e.stopPropagation(); document.getElementById('settingsPopup').classList.toggle('active'); }
        document.addEventListener('click', function(e) {
            const popup = document.getElementById('settingsPopup');
            const wrapper = document.querySelector('.settings-wrapper');
            if (!wrapper.contains(e.target)) popup.classList.remove('active');
        });

        function toggleNotif() {
            const popup = document.getElementById('notifPopup');
            popup.classList.toggle('active');
            const user = auth.currentUser;
            if (user && localStorage.getItem('autoView') !== 'false') {
                db.ref('notifications').once('value', snap => {
                    const notifs = snap.val();
                    if (notifs) Object.keys(notifs).forEach(key => db.ref('notifications/' + key + '/readBy/' + user.uid).set(true));
                });
                document.getElementById('notifDot').classList.remove('show');
            }
        }

        function goHome() { closeMenu(); window.location.href = '../index.html'; }
        function goHistory() { closeMenu(); window.location.href = '../Pages/history.html'; }
        function goTopup() { closeMenu(); showToast('💰 Đang phát triển!', 'error'); }
        function goSupport() { closeMenu(); showToast('🆘 Đang phát triển!', 'error'); }
        function goToProfile() { window.location.href = 'profile.html'; }
        function goToSecurity() { window.location.href = 'security.html'; }
        function goToSettings() { window.location.href = 'settings.html'; }

        function logout() {
            if (confirm('Đăng xuất?')) {
                const user = auth.currentUser;
                if (user) db.ref('presence/' + user.uid).set(false);
                auth.signOut().then(() => {
                    localStorage.removeItem('quickLoginUid');
                    localStorage.removeItem('quickLoginEmail');
                    localStorage.removeItem('quickLoginToken');
                    localStorage.removeItem('quickLoginPending');
                    window.location.replace('../Authenticator/login.html');
                });
            }
        }

        window.addEventListener('storage', function(e) {
            if (e.key === 'theme' || e.key === 'theme_name') { applyTheme(); }
        });

        showLoading();
        setTimeout(() => { if (!isDataLoaded) hideLoading(); }, 3000);
        console.log('✅ Profile page loaded!');
    </script>
</body>
</html>
