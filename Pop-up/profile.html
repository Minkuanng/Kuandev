<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        :root { --bg-body: #f0f7ff; --bg-card: #fff; --bg-header: #fff; --text-primary: #2c5a7a; --text-secondary: #5a8fb5; --text-muted: #8ab3d4; --border-color: #e3eef9; --shadow: 0 2px 10px rgba(0,0,0,0.05); --shadow-popup: 0 8px 30px rgba(0,0,0,0.15); --wallet-bg: #f0f7ff; --hover-bg: #f0f7ff; --accent: #3b8fd6; --success: #27ae60; --danger: #e74c6f; }
        .theme-galaxy { --bg-body: #0a0a1a; --bg-card: #12122a; --bg-header: #1a1a3e; --text-primary: #c8b8ff; --text-secondary: #8a7aff; --text-muted: #6a5a9a; --border-color: #2a2a5a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #1a1a3e; --hover-bg: #2a2a5a; --accent: #8a7aff; }
        .theme-ocean { --bg-body: #0a1628; --bg-card: #0f2a4a; --bg-header: #0d2847; --text-primary: #7fc8ff; --text-secondary: #4a9aff; --text-muted: #3a6a8a; --border-color: #1a3a6a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #0d2847; --hover-bg: #1a3a6a; --accent: #4a9aff; }
        .theme-forest { --bg-body: #0a1a0a; --bg-card: #0f2a0f; --bg-header: #0d2a0d; --text-primary: #7fdf7f; --text-secondary: #4abf4a; --text-muted: #3a7a3a; --border-color: #1a4a1a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #0d2a0d; --hover-bg: #1a4a1a; --accent: #4abf4a; }
        .theme-sunset { --bg-body: #1a0a0a; --bg-card: #2a120a; --bg-header: #3e1a0a; --text-primary: #ffb87f; --text-secondary: #ff8a4a; --text-muted: #9a6a3a; --border-color: #5a2a1a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #3e1a0a; --hover-bg: #5a2a1a; --accent: #ff8a4a; }
        .theme-cherry { --bg-body: #1a0a12; --bg-card: #2a0a16; --bg-header: #3e0a1a; --text-primary: #ff7fa8; --text-secondary: #ff4a7a; --text-muted: #9a3a5a; --border-color: #5a1a2a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #3e1a0a; --hover-bg: #5a1a2a; --accent: #ff4a7a; }
        .theme-neon { --bg-body: #0a0a0a; --bg-card: #121212; --bg-header: #1a1a1a; --text-primary: #00ff88; --text-secondary: #00ccff; --text-muted: #666; --border-color: #333; --shadow: 0 2px 10px rgba(0,0,0,0.6); --shadow-popup: 0 8px 30px rgba(0,0,0,0.8); --wallet-bg: #1a1a1a; --hover-bg: #2a2a2a; --accent: #00ccff; }
        .theme-lavender { --bg-body: #1a0a2a; --bg-card: #221a3a; --bg-header: #2a1a3e; --text-primary: #d4a8ff; --text-secondary: #b87aff; --text-muted: #7a5a9a; --border-color: #3a2a5a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #2a1a3e; --hover-bg: #3a2a5a; --accent: #b87aff; }
        .theme-mint { --bg-body: #0a1a12; --bg-card: #0f2a1a; --bg-header: #0d2a1a; --text-primary: #7fffd4; --text-secondary: #4abfa0; --text-muted: #3a7a6a; --border-color: #1a4a3a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #0d2a1a; --hover-bg: #1a4a3a; --accent: #4abfa0; }
        .theme-coffee { --bg-body: #1a0f0a; --bg-card: #221a12; --bg-header: #2a1a12; --text-primary: #d4b896; --text-secondary: #b8987a; --text-muted: #7a6a5a; --border-color: #3a2a1a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #2a1a12; --hover-bg: #3a2a1a; --accent: #b8987a; }
        body.dark-mode { --bg-body: #1a1a2e; --bg-card: #1a1a2e; --bg-header: #16213e; --text-primary: #e8e8e8; --text-secondary: #8fc1e0; --text-muted: #6a8a9a; --border-color: #2a3a5a; --shadow: 0 2px 10px rgba(0,0,0,0.3); --shadow-popup: 0 8px 30px rgba(0,0,0,0.5); --wallet-bg: #1a2a4a; --hover-bg: #1a2a4a; --accent: #8fc1e0; }
        body { background: var(--bg-body); min-height: 100vh; transition: 0.3s; }
        
        .menu-icon { 
            cursor: pointer; 
            padding: 8px 12px; 
            border-radius: 8px; 
            background: var(--wallet-bg); 
            border: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            gap: 5px; 
            transition: 0.3s; 
            width: 40px;
            height: 40px;
            justify-content: center;
        }
        .menu-icon:hover { background: var(--hover-bg); }
        .menu-icon .bar { 
            display: block; 
            width: 22px; 
            height: 2.5px; 
            background: var(--text-secondary); 
            border-radius: 4px; 
            transition: 0.3s;
        }
        .menu-icon .bar:nth-child(1) { transform: translateY(4px); }
        .menu-icon .bar:nth-child(3) { transform: translateY(-4px); }
        .menu-icon:hover .bar { background: var(--text-primary); }

        .header { background: var(--bg-header); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; transition: 0.3s; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo { font-size: 20px; font-weight: 700; color: var(--text-primary); transition: 0.3s; }
        .logo span { color: var(--text-secondary); }
        .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

        .wallet-container {
            background: var(--wallet-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 6px 16px 6px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            cursor: default;
            min-height: 44px;
        }
        .wallet-container:hover { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,143,214,0.1); }
        .wallet-icon-box { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .wallet-icon-box svg { width: 18px; height: 18px; fill: #fff; }
        .wallet-info { display: flex; flex-direction: column; line-height: 1.3; }
        .wallet-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .wallet-balance { font-size: 15px; font-weight: 700; color: var(--text-primary); }
        .wallet-balance span { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-left: 2px; }

        .bell-icon { width: 32px; height: 32px; cursor: pointer; border-radius: 50%; background: var(--wallet-bg); border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; transition: 0.3s; position: relative; font-size: 16px; }
        .bell-icon:hover { background: var(--hover-bg); }
        .bell-icon .bell-dot { width: 8px; height: 8px; background: #e74c6f; border-radius: 50%; position: absolute; top: 2px; right: 4px; border: 2px solid var(--bg-header); display: none; }
        .bell-icon .bell-dot.show { display: block; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        .dot-menu { width: 36px; height: 36px; cursor: pointer; border-radius: 50%; background: var(--wallet-bg); border: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; transition: 0.3s; padding: 6px; }
        .dot-menu:hover { background: var(--hover-bg); }
        .dot-menu .dot { width: 4px; height: 4px; background: var(--text-secondary); border-radius: 50%; }
        .popup { position: absolute; top: 48px; right: 0; background: var(--bg-card); border-radius: 12px; box-shadow: var(--shadow-popup); min-width: 180px; padding: 6px 0; border: 1px solid var(--border-color); opacity: 0; visibility: hidden; transform: translateY(-10px); transition: 0.3s; z-index: 200; }
        .popup.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .popup-item { padding: 10px 18px; color: var(--text-primary); font-size: 13px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; border: none; background: none; width: 100%; font-weight: 500; }
        .popup-item:hover { background: var(--hover-bg); }
        .popup-divider { height: 1px; background: var(--border-color); margin: 4px 12px; }
        .popup-item.logout { color: #e74c6f; }
        .settings-wrapper { position: relative; }
        .notif-popup { position: fixed; top: 60px; right: 16px; background: var(--bg-card); border-radius: 12px; box-shadow: var(--shadow-popup); min-width: 280px; max-width: 360px; max-height: 350px; overflow-y: auto; padding: 12px 0; border: 1px solid var(--border-color); z-index: 300; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: 0.3s; }
        .notif-popup.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .notif-popup .notif-header { padding: 0 14px 10px; border-bottom: 1px solid var(--border-color); font-weight: 700; color: var(--text-primary); display: flex; justify-content: space-between; font-size: 14px; }
        .notif-popup .notif-header .close { cursor: pointer; }
        .notif-popup .notif-item { padding: 10px 14px; border-bottom: 1px solid var(--border-color); color: var(--text-primary); font-size: 13px; }
        .notif-popup .notif-item .time { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
        .notif-popup .notif-item.unread { background: var(--wallet-bg); border-left: 3px solid #e74c6f; }
        .notif-popup .empty { padding: 16px; text-align: center; color: var(--text-muted); font-size: 13px; }
        .side-menu { position: fixed; top: 0; left: -280px; width: 260px; height: 100vh; background: var(--bg-card); box-shadow: var(--shadow-popup); z-index: 300; transition: 0.3s; padding: 16px 0; border-right: 1px solid var(--border-color); overflow-y: auto; }
        .side-menu.active { left: 0; }
        .side-menu .menu-header { padding: 12px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .side-menu .menu-header .close { cursor: pointer; font-size: 20px; color: var(--text-muted); }
        .side-menu .menu-item { display: flex; align-items: center; gap: 14px; padding: 12px 20px; cursor: pointer; transition: 0.3s; color: var(--text-primary); border: none; background: none; width: 100%; font-size: 14px; font-weight: 500; }
        .side-menu .menu-item:hover { background: var(--hover-bg); padding-left: 26px; }
        .side-menu .menu-item .icon { font-size: 18px; width: 28px; text-align: center; }
        .side-menu .menu-divider { height: 1px; background: var(--border-color); margin: 6px 16px; }
        .menu-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 299; opacity: 0; visibility: hidden; transition: 0.3s; }
        .menu-overlay.active { opacity: 1; visibility: visible; }
        .content { padding: 30px 24px; max-width: 500px; margin: 0 auto; }
        .profile-card { background: var(--bg-card); border-radius: 16px; padding: 30px; box-shadow: var(--shadow); border: 1px solid var(--border-color); transition: 0.3s; text-align: center; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #8fc1e0, #5a8fb5); display: flex; align-items: center; justify-content: center; font-size: 32px; color: #fff; margin: 0 auto 16px; font-weight: 600; }
        .profile-card h2 { color: var(--text-primary); font-size: 22px; transition: 0.3s; }
        .profile-card .email-sub { color: var(--text-muted); font-size: 13px; margin-bottom: 16px; transition: 0.3s; }
        .info-item { padding: 10px 0; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; color: var(--text-primary); font-size: 14px; transition: 0.3s; }
        .info-item .label { color: var(--text-muted); font-weight: 500; }
        .balance-box { margin-top: 16px; padding: 16px; background: var(--wallet-bg); border-radius: 10px; border: 1px solid var(--border-color); transition: 0.3s; }
        .balance-box .blabel { color: var(--text-muted); font-size: 12px; font-weight: 500; }
        .balance-box .bamount { color: var(--text-primary); font-size: 22px; font-weight: 700; }
        .admin-badge { display: inline-block; background: linear-gradient(135deg, #f5a623, #f7c948); color: #fff; padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-top: 4px; }
        .btn { padding: 10px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.3s; border: none; width: 100%; margin-top: 8px; }
        .btn-security { background: linear-gradient(135deg, #2c5a7a, #1a3a5a); color: #fff; }
        .btn-security:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(44,90,122,0.3); }
        .btn-back { background: transparent; color: var(--text-secondary); border: 2px solid var(--border-color); }
        .btn-back:hover { background: var(--hover-bg); border-color: var(--text-secondary); }

        .token-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-color); }
        .token-section .token-label { color: var(--text-muted); font-size: 12px; font-weight: 500; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        .token-box { background: var(--wallet-bg); border: 2px solid var(--border-color); border-radius: 10px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; gap: 12px; transition: 0.3s; }
        .token-box .token-key { font-family: 'Courier New', monospace; font-size: 13px; font-weight: 600; color: var(--text-primary); letter-spacing: 1px; word-break: break-all; }
        .token-box .copy-btn { padding: 4px 14px; background: var(--text-secondary); color: #fff; border: none; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.3s; flex-shrink: 0; }
        .token-box .copy-btn:hover { transform: scale(1.05); opacity: 0.9; }
        .token-box .copy-btn.copied { background: var(--success); }
        .token-actions { display: flex; gap: 8px; margin-top: 8px; }
        .token-actions button { flex: 1; padding: 8px; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .token-actions .btn-reset { background: #f39c12; color: #fff; }
        .token-actions .btn-reset:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(243,156,18,0.3); }
        .token-actions .btn-reset:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .token-status { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-body);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            transition: 0.5s;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border-color);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 500;
        }

        @media (max-width: 600px) { 
            .header { padding: 10px 12px; } 
            .logo { font-size: 16px; } 
            .content { padding: 16px; } 
            .profile-card { padding: 20px; } 
            .notif-popup { right: 8px; left: 8px; min-width: auto; } 
            .wallet-container { padding: 4px 12px 4px 8px; min-height: 38px; } 
            .wallet-icon-box { width: 28px; height: 28px; } 
            .wallet-icon-box svg { width: 15px; height: 15px; } 
            .wallet-balance { font-size: 13px; } 
            .wallet-label { font-size: 9px; } 
            .menu-icon { width: 34px; height: 34px; padding: 6px 8px; } 
            .menu-icon .bar { width: 18px; height: 2px; } 
            .menu-icon .bar:nth-child(1) { transform: translateY(3px); } 
            .menu-icon .bar:nth-child(3) { transform: translateY(-3px); } 
            .token-box { flex-direction: column; align-items: stretch; } 
            .token-box .copy-btn { margin-top: 4px; } 
        }
    </style>
</head>
<body>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">⏳ Đang tải dữ liệu...</div>
    </div>

    <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>
    <div class="side-menu" id="sideMenu">
        <div class="menu-header"><span style="font-weight:700;color:var(--text-primary);">📋 Menu</span><span class="close" onclick="closeMenu()">✕</span></div>
        <button class="menu-item" onclick="goHome()"><span class="icon">🏠</span><span data-key="home">Trang chủ</span></button>
        <button class="menu-item" onclick="goHistory()"><span class="icon">⏳</span><span data-key="history">Lịch sử</span></button>
        <button class="menu-item" onclick="goTopup()"><span class="icon">💰</span><span data-key="topup">Nạp tiền</span></button>
        <div class="menu-divider"></div>
        <button class="menu-item" onclick="goSupport()"><span class="icon">🆘</span><span data-key="support">Hỗ trợ</span></button>
    </div>

    <header class="header">
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <div class="logo"></div>
        </div>
        <div class="header-right">
            <div class="wallet-container">
                <div class="wallet-icon-box">
                    <svg viewBox="0 0 24 24">
                        <path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
                    </svg>
                </div>
                <div class="wallet-info">
                    <span class="wallet-label">Số dư</span>
                    <span class="wallet-balance"><span id="balanceAmount">0</span> <span>VND</span></span>
                </div>
            </div>

            <div class="bell-icon" onclick="toggleNotif()"><div class="bell-dot" id="notifDot"></div>🔔</div>
            <div class="settings-wrapper">
                <div class="dot-menu" onclick="togglePopup(event)"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
                <div class="popup" id="settingsPopup">
                    <button class="popup-item" onclick="goToProfile()">👤 <span data-key="profile">Thông tin</span></button>
                    <button class="popup-item" onclick="goToSecurity()">🛡️ <span data-key="security">Bảo mật</span></button>
                    <button class="popup-item" onclick="goToSettings()">⚙️ <span data-key="settings">Cài đặt</span></button>
                    <div class="popup-divider"></div>
                    <button class="popup-item logout" onclick="logout()">🚪 <span data-key="logout">Đăng xuất</span></button>
                </div>
            </div>
        </div>
    </header>

    <div class="notif-popup" id="notifPopup">
        <div class="notif-header"><span data-key="notif_title">📢 Thông báo</span><span class="close" onclick="toggleNotif()">✕</span></div>
        <div id="notifList"><div class="empty" data-key="notif_empty">Chưa có thông báo</div></div>
    </div>

    <div class="content">
        <div class="profile-card">
            <div class="avatar" id="avatar">👤</div>
            <h2 id="userName">Người dùng</h2>
            <p class="email-sub" id="userEmail">email@example.com</p>
            <div id="adminBadgeContainer"></div>
            <div class="info-item"><span class="label">📧 Email</span><span id="displayEmail">---</span></div>
            <div class="info-item"><span class="label">👤 Tên</span><span id="displayName">---</span></div>
            <div class="info-item"><span class="label">🆔 UID</span><span id="displayUid" style="font-size:12px;">---</span></div>
            <div class="info-item"><span class="label">📅 Ngày tạo</span><span id="displayCreated">---</span></div>
            <div class="balance-box"><div class="blabel">💰 Số dư</div><div class="bamount" id="profileBalance">0 VND</div></div>

            <!-- Token Section -->
            <div class="token-section">
                <div class="token-label">
                    <span>🔑 Token đăng nhập nhanh</span>
                    <span style="font-size:10px;color:var(--text-muted);">(Dùng để đăng nhập không cần mật khẩu)</span>
                </div>
                <div class="token-box">
                    <span class="token-key" id="tokenDisplay">Chưa có token</span>
                    <button class="copy-btn" id="copyTokenBtn" onclick="copyToken()">📋 Sao chép</button>
                </div>
                <div class="token-status" id="tokenStatus">⚠️ Bạn chưa tạo token. Nhấn "Tạo mới" để tạo!</div>
                <div class="token-actions">
                    <button class="btn-reset" id="resetTokenBtn" onclick="resetToken()">🔄 Tạo mới</button>
                </div>
            </div>

            <button class="btn btn-security" onclick="goToSecurity()">🛡️ Bảo mật</button>
            <button class="btn btn-back" onclick="goHome()">🏠 Quay lại</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCPDDRt520fSynXCGrr2aF-KvpnS_ZuIm8",
            authDomain: "shop-c6777.firebaseapp.com",
            databaseURL: "https://shop-c6777-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "shop-c6777",
            storageBucket: "shop-c6777.firebasestorage.app",
            messagingSenderId: "43186563268",
            appId: "1:43186563268:web:0d392ba57039a919670191"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const translations = {
            vi: { 
                home: 'Trang chủ', history: 'Lịch sử', topup: 'Nạp tiền', support: 'Hỗ trợ', 
                profile: 'Thông tin', security: 'Bảo mật', settings: 'Cài đặt', logout: 'Đăng xuất', 
                notif_title: '📢 Thông báo', notif_empty: 'Chưa có thông báo'
            },
            en: { 
                home: 'Home', history: 'History', topup: 'Top up', support: 'Support', 
                profile: 'Profile', security: 'Security', settings: 'Settings', logout: 'Logout', 
                notif_title: '📢 Notifications', notif_empty: 'No notifications'
            }
        };

        let lang = localStorage.getItem('lang') || 'vi';
        let currentUser = null;
        let isDataLoaded = false;

        function applyLang() {
            const data = translations[lang] || translations.vi;
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (data[key] !== undefined) el.textContent = data[key];
            });
        }

        function applyTheme() {
            const isDark = localStorage.getItem('theme') === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            const theme = localStorage.getItem('theme_name') || 'default';
            document.body.className = document.body.className.replace(/theme-\w+/g, '');
            if (theme !== 'default') document.body.classList.add('theme-' + theme);
        }
        applyTheme();
        applyLang();

        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.add('hidden');
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 500);
        }

        function showLoading() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = 'flex';
            overlay.classList.remove('hidden');
        }

        // ===== KIỂM TRA QUICK LOGIN =====
        function checkQuickLogin() {
            const quickUid = localStorage.getItem('quickLoginUid');
            const quickToken = localStorage.getItem('quickLoginToken');
            const quickPending = localStorage.getItem('quickLoginPending');
            return !!(quickUid && quickToken && quickPending === 'true');
        }

        // ===== COMPLETE QUICK LOGIN =====
        async function completeQuickLogin() {
            const quickUid = localStorage.getItem('quickLoginUid');
            if (!quickUid) return false;
            
            try {
                // Lấy dữ liệu user từ database
                const snap = await db.ref('users/' + quickUid).once('value');
                const data = snap.val();
                if (data) {
                    // Cập nhật UI
                    const name = data.displayName || data.email || 'U';
                    document.getElementById('avatar').textContent = name.charAt(0).toUpperCase();
                    document.getElementById('userName').textContent = name;
                    document.getElementById('userEmail').textContent = data.email || '';
                    document.getElementById('displayEmail').textContent = data.email || 'Chưa có';
                    document.getElementById('displayName').textContent = data.displayName || 'Chưa cập nhật';
                    document.getElementById('displayUid').textContent = quickUid;
                    document.getElementById('displayCreated').textContent = data.createdAt ? new Date(data.createdAt).toLocaleString('vi-VN') : '---';
                    
                    const balance = data.balance || 0;
                    document.getElementById('balanceAmount').textContent = balance.toLocaleString('vi-VN');
                    document.getElementById('profileBalance').textContent = balance.toLocaleString('vi-VN') + ' VND';
                    document.getElementById('adminBadgeContainer').innerHTML = data.isAdmin ? '<span class="admin-badge">👑 ADMIN</span>' : '';
                    
                    if (data.quickToken) {
                        document.getElementById('tokenDisplay').textContent = data.quickToken;
                        document.getElementById('tokenStatus').textContent = '✅ Token đã sẵn sàng!';
                        document.getElementById('tokenStatus').style.color = 'var(--success)';
                    } else {
                        document.getElementById('tokenDisplay').textContent = 'Chưa có token';
                        document.getElementById('tokenStatus').textContent = '⚠️ Bạn chưa tạo token. Nhấn "Tạo mới" để tạo!';
                        document.getElementById('tokenStatus').style.color = 'var(--text-muted)';
                    }
                    
                    // Cập nhật presence
                    await db.ref('presence/' + quickUid).set(true);
                    db.ref('presence/' + quickUid).onDisconnect().set(false);
                    
                    isDataLoaded = true;
                    hideLoading();
                    return true;
                }
                return false;
            } catch (error) {
                console.error('Lỗi complete quick login:', error);
                return false;
            }
        }

        // ===== TẠO TOKEN =====
        function generateUniqueToken() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let token = '';
            for (let i = 0; i < 16; i++) {
                token += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            const time = Date.now().toString(36);
            return token + time.slice(-4);
        }

        // ===== RESET TOKEN =====
        async function resetToken() {
            if (!currentUser) {
                // Nếu không có user, thử lấy từ quick login
                const quickUid = localStorage.getItem('quickLoginUid');
                if (quickUid) {
                    currentUser = { uid: quickUid };
                } else {
                    alert('Vui lòng đăng nhập!');
                    return;
                }
            }
            
            const btn = document.getElementById('resetTokenBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Đang tạo...';

            try {
                const newToken = generateUniqueToken();
                await db.ref('users/' + currentUser.uid + '/quickToken').set(newToken);
                
                document.getElementById('tokenDisplay').textContent = newToken;
                document.getElementById('tokenStatus').textContent = '✅ Token mới đã được tạo thành công!';
                document.getElementById('tokenStatus').style.color = 'var(--success)';
                alert('✅ Token mới: ' + newToken);
                
            } catch (error) {
                let errorMsg = '❌ Lỗi tạo token! ';
                if (error.code === 'PERMISSION_DENIED') {
                    errorMsg += 'Vui lòng kiểm tra Firebase Rules (cần bật quyền ghi).';
                } else {
                    errorMsg += error.message;
                }
                document.getElementById('tokenStatus').textContent = errorMsg;
                document.getElementById('tokenStatus').style.color = 'var(--danger)';
                alert(errorMsg);
            }

            btn.disabled = false;
            btn.textContent = '🔄 Tạo mới';
        }

        // ===== COPY TOKEN =====
        function copyToken() {
            const token = document.getElementById('tokenDisplay').textContent;
            if (token === 'Chưa có token') {
                alert('⚠️ Chưa có token để sao chép!');
                return;
            }
            const btn = document.getElementById('copyTokenBtn');
            if (navigator.clipboard) {
                navigator.clipboard.writeText(token).then(() => {
                    btn.textContent = '✅ Đã sao chép!';
                    btn.classList.add('copied');
                    setTimeout(() => { btn.textContent = '📋 Sao chép';
                        btn.classList.remove('copied'); }, 2000);
                });
            } else {
                const textarea = document.createElement('textarea');
                textarea.value = token;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btn.textContent = '✅ Đã sao chép!';
                btn.classList.add('copied');
                setTimeout(() => { btn.textContent = '📋 Sao chép';
                    btn.classList.remove('copied'); }, 2000);
            }
        }

        // ===== AUTH STATE =====
        auth.onAuthStateChanged(async (user) => {
            // Nếu đã load data rồi thì không làm gì
            if (isDataLoaded) return;
            
            // Kiểm tra quick login pending
            if (checkQuickLogin()) {
                const success = await completeQuickLogin();
                if (success) return;
            }
            
            if (!user) { 
                window.location.replace('../Authenticator/login.html'); 
                return; 
            }
            
            currentUser = user;
            db.ref('presence/' + user.uid).set(true);
            db.ref('presence/' + user.uid).onDisconnect().set(false);

            const name = user.displayName || user.email || 'U';
            document.getElementById('avatar').textContent = name.charAt(0).toUpperCase();
            document.getElementById('userName').textContent = name;
            document.getElementById('userEmail').textContent = user.email || '';
            document.getElementById('displayEmail').textContent = user.email || 'Chưa có';
            document.getElementById('displayName').textContent = user.displayName || 'Chưa cập nhật';
            document.getElementById('displayUid').textContent = user.uid;
            document.getElementById('displayCreated').textContent = user.metadata.creationTime || '---';

            db.ref('users/' + user.uid).on('value', snap => {
                const data = snap.val();
                if (data) {
                    const balance = data.balance || 0;
                    document.getElementById('balanceAmount').textContent = balance.toLocaleString('vi-VN');
                    document.getElementById('profileBalance').textContent = balance.toLocaleString('vi-VN') + ' VND';
                    document.getElementById('adminBadgeContainer').innerHTML = data.isAdmin ? '<span class="admin-badge">👑 ADMIN</span>' : '';
                    
                    if (data.quickToken) {
                        document.getElementById('tokenDisplay').textContent = data.quickToken;
                        document.getElementById('tokenStatus').textContent = '✅ Token đã sẵn sàng!';
                        document.getElementById('tokenStatus').style.color = 'var(--success)';
                    } else {
                        document.getElementById('tokenDisplay').textContent = 'Chưa có token';
                        document.getElementById('tokenStatus').textContent = '⚠️ Bạn chưa tạo token. Nhấn "Tạo mới" để tạo!';
                        document.getElementById('tokenStatus').style.color = 'var(--text-muted)';
                    }
                }
                if (!isDataLoaded) {
                    isDataLoaded = true;
                    hideLoading();
                }
            });

            db.ref('notifications').on('value', snap => {
                const notifs = snap.val();
                const list = document.getElementById('notifList');
                const dot = document.getElementById('notifDot');
                if (notifs) {
                    const keys = Object.keys(notifs).reverse();
                    let html = '',
                        hasUnread = false;
                    keys.forEach(key => {
                        const n = notifs[key];
                        const isUnread = !n.readBy || !n.readBy[user.uid];
                        if (isUnread) hasUnread = true;
                        html += `<div class="notif-item ${isUnread?'unread':''}">${n.message}<div class="time">${new Date(n.timestamp).toLocaleString('vi-VN')}</div></div>`;
                    });
                    list.innerHTML = html;
                    dot.classList.toggle('show', hasUnread && localStorage.getItem('notifEnabled') !== 'false');
                } else { 
                    list.innerHTML = `<div class="empty">${lang === 'vi' ? 'Chưa có thông báo' : 'No notifications'}</div>`;
                    dot.classList.remove('show'); 
                }
            });
        });

        // ===== MENU FUNCTIONS =====
        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('menuOverlay').classList.toggle('active'); }

        function closeMenu() { document.getElementById('sideMenu').classList.remove('active');
            document.getElementById('menuOverlay').classList.remove('active'); }

        function togglePopup(e) { e.stopPropagation();
            document.getElementById('settingsPopup').classList.toggle('active'); }
        document.addEventListener('click', function(e) {
            const popup = document.getElementById('settingsPopup');
            const wrapper = document.querySelector('.settings-wrapper');
            if (!wrapper.contains(e.target)) popup.classList.remove('active');
        });

        function toggleNotif() {
            const popup = document.getElementById('notifPopup');
            popup.classList.toggle('active');
            const user = auth.currentUser;
            if (user && localStorage.getItem('autoView') !== 'false') {
                db.ref('notifications').once('value', snap => {
                    const notifs = snap.val();
                    if (notifs) Object.keys(notifs).forEach(key => db.ref('notifications/' + key + '/readBy/' + user.uid)
                        .set(true));
                });
                document.getElementById('notifDot').classList.remove('show');
            }
        }

        function goHome() { closeMenu();
            window.location.href = '../index.html'; }

        function goHistory() { closeMenu();
            alert(lang === 'vi' ? '📜 Đang phát triển!' : '📜 Coming soon!'); }

        function goTopup() { closeMenu();
            alert(lang === 'vi' ? '💰 Đang phát triển!' : '💰 Coming soon!'); }

        function goSupport() { closeMenu();
            alert(lang === 'vi' ? '🆘 Đang phát triển!' : '🆘 Coming soon!'); }

        function goToProfile() { window.location.href = 'profile.html'; }

        function goToSecurity() { window.location.href = 'security.html'; }

        function goToSettings() { window.location.href = 'settings.html'; }

        function logout() { 
            if (confirm(lang === 'vi' ? 'Đăng xuất?' : 'Logout?')) {
                const user = auth.currentUser;
                if (user) {
                    db.ref('presence/' + user.uid).set(false);
                }
                auth.signOut().then(() => {
                    localStorage.removeItem('quickLoginUid');
                    localStorage.removeItem('quickLoginEmail');
                    localStorage.removeItem('quickLoginToken');
                    localStorage.removeItem('quickLoginPending');
                    window.location.replace('../Authenticator/login.html');
                });
            }
        }

        window.addEventListener('storage', function(e) {
            if (e.key === 'lang') { lang = e.newValue || 'vi';
                applyLang(); }
            if (e.key === 'theme' || e.key === 'theme_name') { applyTheme(); }
        });

        // Hiển thị loading khi trang bắt đầu load
        showLoading();

        // Ẩn loading sau 5s nếu không có gì xảy ra
        setTimeout(() => {
            if (!isDataLoaded) {
                hideLoading();
            }
        }, 5000);
    </script>
</body>
</html>
