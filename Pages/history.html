<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử mua hàng</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        :root { --bg-body: #f0f7ff; --bg-card: #fff; --bg-header: #fff; --text-primary: #2c5a7a; --text-secondary: #5a8fb5; --text-muted: #8ab3d4; --border-color: #e3eef9; --shadow: 0 2px 10px rgba(0,0,0,0.05); --shadow-popup: 0 8px 30px rgba(0,0,0,0.15); --wallet-bg: #f0f7ff; --hover-bg: #f0f7ff; --accent: #3b8fd6; --success: #27ae60; --danger: #e74c6f; --warning: #f39c12; }
        .theme-galaxy { --bg-body: #0a0a1a; --bg-card: #12122a; --bg-header: #1a1a3e; --text-primary: #c8b8ff; --text-secondary: #8a7aff; --text-muted: #6a5a9a; --border-color: #2a2a5a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #1a1a3e; --hover-bg: #2a2a5a; --accent: #8a7aff; }
        .theme-ocean { --bg-body: #0a1628; --bg-card: #0f2a4a; --bg-header: #0d2847; --text-primary: #7fc8ff; --text-secondary: #4a9aff; --text-muted: #3a6a8a; --border-color: #1a3a6a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #0d2847; --hover-bg: #1a3a6a; --accent: #4a9aff; }
        .theme-forest { --bg-body: #0a1a0a; --bg-card: #0f2a0f; --bg-header: #0d2a0d; --text-primary: #7fdf7f; --text-secondary: #4abf4a; --text-muted: #3a7a3a; --border-color: #1a4a1a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #0d2a0d; --hover-bg: #1a4a1a; --accent: #4abf4a; }
        .theme-sunset { --bg-body: #1a0a0a; --bg-card: #2a120a; --bg-header: #3e1a0a; --text-primary: #ffb87f; --text-secondary: #ff8a4a; --text-muted: #9a6a3a; --border-color: #5a2a1a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #3e1a0a; --hover-bg: #5a2a1a; --accent: #ff8a4a; }
        .theme-cherry { --bg-body: #1a0a12; --bg-card: #2a0a16; --bg-header: #3e0a1a; --text-primary: #ff7fa8; --text-secondary: #ff4a7a; --text-muted: #9a3a5a; --border-color: #5a1a2a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #3e1a0a; --hover-bg: #5a1a2a; --accent: #ff4a7a; }
        .theme-neon { --bg-body: #0a0a0a; --bg-card: #121212; --bg-header: #1a1a1a; --text-primary: #00ff88; --text-secondary: #00ccff; --text-muted: #666; --border-color: #333; --shadow: 0 2px 10px rgba(0,0,0,0.6); --shadow-popup: 0 8px 30px rgba(0,0,0,0.8); --wallet-bg: #1a1a1a; --hover-bg: #2a2a2a; --accent: #00ccff; }
        .theme-lavender { --bg-body: #1a0a2a; --bg-card: #221a3a; --bg-header: #2a1a3e; --text-primary: #d4a8ff; --text-secondary: #b87aff; --text-muted: #7a5a9a; --border-color: #3a2a5a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #2a1a3e; --hover-bg: #3a2a5a; --accent: #b87aff; }
        .theme-mint { --bg-body: #0a1a12; --bg-card: #0f2a1a; --bg-header: #0d2a1a; --text-primary: #7fffd4; --text-secondary: #4abfa0; --text-muted: #3a7a6a; --border-color: #1a4a3a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #0d2a1a; --hover-bg: #1a4a3a; --accent: #4abfa0; }
        .theme-coffee { --bg-body: #1a0f0a; --bg-card: #221a12; --bg-header: #2a1a12; --text-primary: #d4b896; --text-secondary: #b8987a; --text-muted: #7a6a5a; --border-color: #3a2a1a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #2a1a12; --hover-bg: #3a2a1a; --accent: #b8987a; }
        body.dark-mode { --bg-body: #1a1a2e; --bg-card: #1a1a2e; --bg-header: #16213e; --text-primary: #e8e8e8; --text-secondary: #8fc1e0; --text-muted: #6a8a9a; --border-color: #2a3a5a; --shadow: 0 2px 10px rgba(0,0,0,0.3); --shadow-popup: 0 8px 30px rgba(0,0,0,0.5); --wallet-bg: #1a2a4a; --hover-bg: #1a2a4a; --accent: #8fc1e0; }
        body { background: var(--bg-body); min-height: 100vh; transition: 0.3s; }
        
        .menu-icon { cursor: pointer; padding: 8px 12px; border-radius: 8px; background: var(--wallet-bg); border: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; gap: 5px; transition: 0.3s; width: 40px; height: 40px; justify-content: center; }
        .menu-icon:hover { background: var(--hover-bg); }
        .menu-icon .bar { display: block; width: 22px; height: 2.5px; background: var(--text-secondary); border-radius: 4px; transition: 0.3s; }
        .menu-icon .bar:nth-child(1) { transform: translateY(4px); }
        .menu-icon .bar:nth-child(3) { transform: translateY(-4px); }
        .menu-icon:hover .bar { background: var(--text-primary); }

        .header { background: var(--bg-header); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; transition: 0.3s; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo { font-size: 20px; font-weight: 700; color: var(--text-primary); transition: 0.3s; }
        .logo span { color: var(--text-secondary); }
        .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

        .wallet-container { background: var(--wallet-bg); border: 2px solid var(--border-color); border-radius: 12px; padding: 6px 16px 6px 12px; display: flex; align-items: center; gap: 10px; transition: 0.3s; cursor: default; min-height: 44px; }
        .wallet-container:hover { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,143,214,0.1); }
        .wallet-icon-box { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .wallet-icon-box svg { width: 18px; height: 18px; fill: #fff; }
        .wallet-info { display: flex; flex-direction: column; line-height: 1.3; }
        .wallet-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .wallet-balance { font-size: 15px; font-weight: 700; color: var(--text-primary); }
        .wallet-balance span { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-left: 2px; }

        .bell-icon { width: 32px; height: 32px; cursor: pointer; border-radius: 50%; background: var(--wallet-bg); border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; transition: 0.3s; position: relative; font-size: 16px; }
        .bell-icon:hover { background: var(--hover-bg); }
        .bell-icon .bell-dot { width: 8px; height: 8px; background: #e74c6f; border-radius: 50%; position: absolute; top: 2px; right: 4px; border: 2px solid var(--bg-header); display: none; }
        .bell-icon .bell-dot.show { display: block; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        .dot-menu { width: 36px; height: 36px; cursor: pointer; border-radius: 50%; background: var(--wallet-bg); border: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; transition: 0.3s; padding: 6px; }
        .dot-menu:hover { background: var(--hover-bg); }
        .dot-menu .dot { width: 4px; height: 4px; background: var(--text-secondary); border-radius: 50%; }
        .popup { position: absolute; top: 48px; right: 0; background: var(--bg-card); border-radius: 12px; box-shadow: var(--shadow-popup); min-width: 180px; padding: 6px 0; border: 1px solid var(--border-color); opacity: 0; visibility: hidden; transform: translateY(-10px); transition: 0.3s; z-index: 200; }
        .popup.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .popup-item { padding: 10px 18px; color: var(--text-primary); font-size: 13px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; border: none; background: none; width: 100%; font-weight: 500; }
        .popup-item:hover { background: var(--hover-bg); }
        .popup-divider { height: 1px; background: var(--border-color); margin: 4px 12px; }
        .popup-item.logout { color: #e74c6f; }
        .settings-wrapper { position: relative; }
        .notif-popup { position: fixed; top: 60px; right: 16px; background: var(--bg-card); border-radius: 12px; box-shadow: var(--shadow-popup); min-width: 280px; max-width: 360px; max-height: 350px; overflow-y: auto; padding: 12px 0; border: 1px solid var(--border-color); z-index: 300; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: 0.3s; }
        .notif-popup.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .notif-popup .notif-header { padding: 0 14px 10px; border-bottom: 1px solid var(--border-color); font-weight: 700; color: var(--text-primary); display: flex; justify-content: space-between; font-size: 14px; }
        .notif-popup .notif-header .close { cursor: pointer; }
        .notif-popup .notif-item { padding: 10px 14px; border-bottom: 1px solid var(--border-color); color: var(--text-primary); font-size: 13px; }
        .notif-popup .notif-item .time { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
        .notif-popup .notif-item.unread { background: var(--wallet-bg); border-left: 3px solid #e74c6f; }
        .notif-popup .empty { padding: 16px; text-align: center; color: var(--text-muted); font-size: 13px; }
        .side-menu { position: fixed; top: 0; left: -280px; width: 260px; height: 100vh; background: var(--bg-card); box-shadow: var(--shadow-popup); z-index: 300; transition: 0.3s; padding: 16px 0; border-right: 1px solid var(--border-color); overflow-y: auto; }
        .side-menu.active { left: 0; }
        .side-menu .menu-header { padding: 12px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .side-menu .menu-header .close { cursor: pointer; font-size: 20px; color: var(--text-muted); }
        .side-menu .menu-item { display: flex; align-items: center; gap: 14px; padding: 12px 20px; cursor: pointer; transition: 0.3s; color: var(--text-primary); border: none; background: none; width: 100%; font-size: 14px; font-weight: 500; }
        .side-menu .menu-item:hover { background: var(--hover-bg); padding-left: 26px; }
        .side-menu .menu-item .icon { font-size: 18px; width: 28px; text-align: center; }
        .side-menu .menu-divider { height: 1px; background: var(--border-color); margin: 6px 16px; }
        .menu-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 299; opacity: 0; visibility: hidden; transition: 0.3s; }
        .menu-overlay.active { opacity: 1; visibility: visible; }
        .content { padding: 24px; max-width: 900px; margin: 0 auto; }
        
        .history-card { background: var(--bg-card); border-radius: 16px; padding: 24px; box-shadow: var(--shadow); border: 1px solid var(--border-color); transition: 0.3s; }
        .history-card h1 { color: var(--text-primary); font-size: 22px; margin-bottom: 4px; transition: 0.3s; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .history-card .sub { color: var(--text-muted); font-size: 13px; margin-bottom: 16px; }
        
        .stats-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
        .stat-box { background: var(--wallet-bg); padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border-color); flex: 1; min-width: 100px; }
        .stat-box .num { font-size: 20px; font-weight: 700; color: var(--text-primary); }
        .stat-box .label { font-size: 11px; color: var(--text-muted); }

        .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
        .filter-bar input, .filter-bar select { padding: 8px 14px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 13px; background: var(--bg-card); color: var(--text-primary); transition: 0.3s; flex: 1; min-width: 120px; }
        .filter-bar input:focus, .filter-bar select:focus { outline: none; border-color: var(--accent); }
        .filter-bar .btn-clear { padding: 8px 16px; background: var(--wallet-bg); border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; color: var(--text-muted); font-size: 12px; transition: 0.3s; }
        .filter-bar .btn-clear:hover { background: var(--hover-bg); }

        .order-list { display: flex; flex-direction: column; gap: 12px; }
        .order-item { background: var(--wallet-bg); border-radius: 12px; padding: 16px; border: 1px solid var(--border-color); transition: 0.3s; display: flex; flex-direction: column; gap: 8px; }
        .order-item:hover { border-color: var(--accent); }
        .order-item .order-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 8px; }
        .order-item .order-code { font-weight: 700; color: var(--accent); font-size: 15px; font-family: 'Courier New', monospace; }
        .order-item .order-time { font-size: 12px; color: var(--text-muted); }
        .order-item .order-body { display: flex; gap: 14px; align-items: flex-start; flex-wrap: wrap; }
        .order-item .order-image { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; background: var(--bg-card); display: flex; align-items: center; justify-content: center; font-size: 28px; border: 1px solid var(--border-color); flex-shrink: 0; }
        .order-item .order-image img { width: 100%; height: 100%; border-radius: 10px; object-fit: cover; }
        .order-item .order-details { flex: 1; min-width: 0; }
        .order-item .order-details .name { font-weight: 600; color: var(--text-primary); font-size: 15px; }
        .order-item .order-details .desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .order-item .order-details .note { font-size: 12px; color: var(--text-primary); background: var(--bg-card); padding: 4px 10px; border-radius: 4px; border-left: 3px solid var(--warning); margin-top: 4px; display: inline-block; }
        .order-item .order-details .meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
        .order-item .order-details .meta span { background: var(--bg-card); padding: 2px 10px; border-radius: 10px; }
        .order-item .order-price { font-weight: 700; color: var(--accent); font-size: 18px; white-space: nowrap; }
        .order-item .order-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
        .order-item .order-actions button { padding: 4px 14px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .order-item .order-actions .view { background: var(--accent); color: #fff; }
        .order-item .order-actions .view:hover { opacity: 0.8; }
        .order-item .order-actions .download { background: var(--success); color: #fff; }
        .order-item .order-actions .download:hover { opacity: 0.8; }
        .order-item .order-actions .delete { background: #fef0f2; color: var(--danger); border: 1px solid #fdd5d9; }
        .order-item .order-actions .delete:hover { background: var(--danger); color: #fff; }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
        .empty-state .big-icon { font-size: 48px; display: block; margin-bottom: 12px; }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 500; display: none; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--bg-card); border-radius: 16px; padding: 24px; max-width: 480px; width: 92%; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border-color); animation: modalIn 0.3s ease; }
        @keyframes modalIn { from { transform: scale(0.95) translateY(-20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        .modal h3 { color: var(--text-primary); text-align: center; margin-bottom: 12px; }
        .modal .order-detail-item { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border-color); align-items: center; }
        .modal .order-detail-item .label { color: var(--text-muted); font-weight: 500; min-width: 100px; font-size: 13px; }
        .modal .order-detail-item .value { color: var(--text-primary); font-weight: 600; font-size: 13px; word-break: break-all; }
        .modal .order-detail-item .value.code { font-family: 'Courier New', monospace; color: var(--accent); }
        .modal .close-modal { width: 100%; padding: 10px; background: var(--wallet-bg); border: 1px solid var(--border-color); border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; color: var(--text-muted); transition: 0.3s; margin-top: 12px; }
        .modal .close-modal:hover { background: var(--hover-bg); }

        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-body); z-index: 999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; transition: 0.5s; }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; display: none !important; }
        .loading-spinner { width: 50px; height: 50px; border: 4px solid var(--border-color); border-radius: 50%; border-top-color: var(--accent); animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--text-primary); font-size: 16px; font-weight: 500; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 10px 24px; background: var(--bg-card); color: var(--text-primary); border-radius: 10px; box-shadow: var(--shadow-popup); border: 1px solid var(--border-color); z-index: 999; opacity: 0; transition: 0.5s; font-weight: 500; font-size: 13px; pointer-events: none; }
        .toast.show { opacity: 1; }
        .toast.success { border-color: var(--success); color: var(--success); }
        .toast.error { border-color: var(--danger); color: var(--danger); }

        @media (max-width: 600px) { .header { padding: 10px 12px; } .logo { font-size: 16px; } .content { padding: 12px; } .history-card { padding: 16px; } .notif-popup { right: 8px; left: 8px; min-width: auto; } .wallet-container { padding: 4px 12px 4px 8px; min-height: 38px; } .wallet-icon-box { width: 28px; height: 28px; } .wallet-icon-box svg { width: 15px; height: 15px; } .wallet-balance { font-size: 13px; } .wallet-label { font-size: 9px; } .menu-icon { width: 34px; height: 34px; padding: 6px 8px; } .menu-icon .bar { width: 18px; height: 2px; } .menu-icon .bar:nth-child(1) { transform: translateY(3px); } .menu-icon .bar:nth-child(3) { transform: translateY(-3px); } .order-item .order-header { flex-direction: column; } .order-item .order-price { font-size: 16px; } .modal { padding: 16px; } .order-item .order-body { flex-direction: column; align-items: stretch; } }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">⏳ Đang tải lịch sử...</div>
    </div>

    <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>
    <div class="side-menu" id="sideMenu">
        <div class="menu-header"><span style="font-weight:700;color:var(--text-primary);">📋 Menu</span><span class="close" onclick="closeMenu()">✕</span></div>
        <button class="menu-item" onclick="goHome()"><span class="icon">🏠</span>Trang chủ</button>
        <button class="menu-item" onclick="goHistory()"><span class="icon">⏳</span>Lịch sử</button>
        <button class="menu-item" onclick="goTopup()"><span class="icon">💰</span>Nạp tiền</button>
        <div class="menu-divider"></div>
        <button class="menu-item" onclick="goSupport()"><span class="icon">🆘</span>Hỗ trợ</button>
    </div>

    <header class="header">
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <div class="logo"></div>
        </div>
        <div class="header-right">
            <div class="wallet-container">
                <div class="wallet-icon-box">
                    <svg viewBox="0 0 24 24">
                        <path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
                    </svg>
                </div>
                <div class="wallet-info">
                    <span class="wallet-label">Số dư</span>
                    <span class="wallet-balance"><span id="balanceAmount">0</span> <span>VND</span></span>
                </div>
            </div>

            <div class="bell-icon" onclick="toggleNotif()"><div class="bell-dot" id="notifDot"></div>🔔</div>
            <div class="settings-wrapper">
                <div class="dot-menu" onclick="togglePopup(event)"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
                <div class="popup" id="settingsPopup">
                    <button class="popup-item" onclick="goToProfile()">👤 Thông tin</button>
                    <button class="popup-item" onclick="goToSecurity()">🛡️ Bảo mật</button>
                    <button class="popup-item" onclick="goToSettings()">⚙️ Cài đặt</button>
                    <div class="popup-divider"></div>
                    <button class="popup-item logout" onclick="logout()">🚪 Đăng xuất</button>
                </div>
            </div>
        </div>
    </header>

    <div class="notif-popup" id="notifPopup">
        <div class="notif-header"><span>📢 Thông báo</span><span class="close" onclick="toggleNotif()">✕</span></div>
        <div id="notifList"><div class="empty">Chưa có thông báo</div></div>
    </div>

    <div class="content">
        <div class="history-card">
            <h1>📜 Lịch sử mua hàng</h1>
            <p class="sub">Xem lại các đơn hàng đã mua, tải xuống hoặc xóa</p>

            <div class="stats-row">
                <div class="stat-box"><div class="num" id="totalOrders">0</div><div class="label">📦 Tổng đơn</div></div>
                <div class="stat-box"><div class="num" id="totalSpent">0</div><div class="label">💰 Tổng chi</div></div>
            </div>

            <div class="filter-bar">
                <input type="text" id="searchInput" placeholder="🔍 Tìm theo tên sản phẩm hoặc mã đơn..." oninput="filterOrders()">
                <select id="sortSelect" onchange="filterOrders()">
                    <option value="newest">🕐 Mới nhất</option>
                    <option value="oldest">🕐 Cũ nhất</option>
                    <option value="high">💰 Giá cao → thấp</option>
                    <option value="low">💰 Giá thấp → cao</option>
                </select>
                <button class="btn-clear" onclick="clearFilter()">🔄 Xóa lọc</button>
            </div>

            <div class="order-list" id="orderList">
                <div class="empty-state">
                    <span class="big-icon">📦</span>
                    <p>Chưa có đơn hàng nào</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal xem chi tiết đơn hàng -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <h3>📋 Chi tiết đơn hàng</h3>
            <div id="detailContent"></div>
            <button class="close-modal" onclick="closeDetailModal()">Đóng</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCPDDRt520fSynXCGrr2aF-KvpnS_ZuIm8",
            authDomain: "shop-c6777.firebaseapp.com",
            databaseURL: "https://shop-c6777-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "shop-c6777",
            storageBucket: "shop-c6777.firebasestorage.app",
            messagingSenderId: "43186563268",
            appId: "1:43186563268:web:0d392ba57039a919670191"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let lang = localStorage.getItem('lang') || 'vi';
        let currentUser = null;
        let allOrders = [];
        let isDataLoaded = false;

        function showToast(msg, type = '') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast ' + type;
            el.classList.add('show');
            clearTimeout(el.timeout);
            el.timeout = setTimeout(() => el.classList.remove('show'), 3000);
        }

        function applyTheme() {
            const isDark = localStorage.getItem('theme') === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            const theme = localStorage.getItem('theme_name') || 'default';
            document.body.className = document.body.className.replace(/theme-\w+/g, '');
            if (theme !== 'default') document.body.classList.add('theme-' + theme);
        }
        applyTheme();

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        function showLoading() {
            document.getElementById('loadingOverlay').classList.remove('hidden');
        }

        function checkQuickLogin() {
            const quickUid = localStorage.getItem('quickLoginUid');
            const quickToken = localStorage.getItem('quickLoginToken');
            const quickPending = localStorage.getItem('quickLoginPending');
            return !!(quickUid && quickToken && quickPending === 'true');
        }

        async function completeQuickLogin() {
            const quickUid = localStorage.getItem('quickLoginUid');
            if (!quickUid) return false;
            try {
                await db.ref('presence/' + quickUid).set(true);
                db.ref('presence/' + quickUid).onDisconnect().set(false);
                const snap = await db.ref('users/' + quickUid).once('value');
                const data = snap.val();
                if (data) {
                    document.getElementById('balanceAmount').textContent = (data.balance || 0).toLocaleString('vi-VN');
                    currentUser = { uid: quickUid, ...data };
                    loadHistory(quickUid);
                    loadNotifications(quickUid);
                }
                isDataLoaded = true;
                hideLoading();
                return true;
            } catch (error) {
                console.error('Lỗi quick login:', error);
                return false;
            }
        }

        function loadNotifications(uid) {
            db.ref('notifications').on('value', snap => {
                const notifs = snap.val();
                const list = document.getElementById('notifList');
                const dot = document.getElementById('notifDot');
                if (notifs) {
                    const keys = Object.keys(notifs).reverse();
                    let html = '', hasUnread = false;
                    keys.forEach(key => {
                        const n = notifs[key];
                        const isUnread = !n.readBy || !n.readBy[uid];
                        if (isUnread) hasUnread = true;
                        html += `<div class="notif-item ${isUnread?'unread':''}">${n.message}<div class="time">${new Date(n.timestamp).toLocaleString('vi-VN')}</div></div>`;
                    });
                    list.innerHTML = html;
                    dot.classList.toggle('show', hasUnread && localStorage.getItem('notifEnabled') !== 'false');
                } else {
                    list.innerHTML = `<div class="empty">Chưa có thông báo</div>`;
                    dot.classList.remove('show');
                }
            });
        }

        function loadHistory(uid) {
            db.ref('history/' + uid).on('value', (snapshot) => {
                const data = snapshot.val() || {};
                allOrders = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                renderOrders(allOrders);
                updateStats(allOrders);
            });
        }

        function renderOrders(orders) {
            const container = document.getElementById('orderList');
            
            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="big-icon">📦</span>
                        <p>Chưa có đơn hàng nào</p>
                    </div>
                `;
                return;
            }

            let html = '';
            orders.forEach(order => {
                const image = order.productImage || order.productIcon || '📦';
                const price = (order.price || 0).toLocaleString('vi-VN');
                const time = new Date(order.timestamp).toLocaleString('vi-VN');
                const orderCode = order.orderCode || '#' + order.id.substring(0, 6).toUpperCase();
                const desc = order.productDesc || '';
                const note = order.orderNote || '';
                const voucher = order.voucher || '';
                
                html += `
                    <div class="order-item">
                        <div class="order-header">
                            <div>
                                <div class="order-code">🔑 ${orderCode}</div>
                                <div class="order-time">📅 ${time}</div>
                            </div>
                            <div class="order-price">${price} VND</div>
                        </div>
                        <div class="order-body">
                            <div class="order-image">
                                ${order.productImage ? `<img src="${order.productImage}" onerror="this.style.display='none';this.parentElement.textContent='${order.productIcon || '📦'}'" />` : (order.productIcon || '📦')}
                            </div>
                            <div class="order-details">
                                <div class="name">${order.productName || 'Sản phẩm'}</div>
                                ${desc ? `<div class="desc">📝 ${desc}</div>` : ''}
                                ${note ? `<div class="note">📌 Ghi chú: ${note}</div>` : ''}
                                ${voucher ? `<div class="meta"><span>🎫 Mã: ${voucher}</span></div>` : ''}
                                <div class="meta">
                                    <span>👤 ${order.userName || 'Khách hàng'}</span>
                                    <span>💰 ${price} VND</span>
                                </div>
                            </div>
                        </div>
                        <div class="order-actions">
                            <button class="view" onclick="viewOrderDetail('${order.id}')">👁️ Xem</button>
                            <button class="download" onclick="downloadOrder('${order.id}')">📥 Tải TXT</button>
                            <button class="delete" onclick="deleteOrder('${order.id}')">🗑️ Xóa</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function updateStats(orders) {
            document.getElementById('totalOrders').textContent = orders.length;
            const total = orders.reduce((sum, o) => sum + (o.price || 0), 0);
            document.getElementById('totalSpent').textContent = total.toLocaleString('vi-VN') + ' VND';
        }

        function filterOrders() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const sort = document.getElementById('sortSelect').value;
            
            let filtered = allOrders.filter(order => {
                const name = (order.productName || '').toLowerCase();
                const code = (order.orderCode || '').toLowerCase();
                return name.includes(search) || code.includes(search);
            });
            
            switch(sort) {
                case 'newest': filtered.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0)); break;
                case 'oldest': filtered.sort((a,b) => (a.timestamp || 0) - (b.timestamp || 0)); break;
                case 'high': filtered.sort((a,b) => (b.price || 0) - (a.price || 0)); break;
                case 'low': filtered.sort((a,b) => (a.price || 0) - (b.price || 0)); break;
                default: filtered.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
            }
            
            renderOrders(filtered);
        }

        function clearFilter() {
            document.getElementById('searchInput').value = '';
            document.getElementById('sortSelect').value = 'newest';
            filterOrders();
        }

        // ===== VIEW ORDER DETAIL =====
        function viewOrderDetail(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (!order) {
                showToast('❌ Không tìm thấy đơn hàng!', 'error');
                return;
            }
            
            const container = document.getElementById('detailContent');
            const code = order.orderCode || '#' + orderId.substring(0, 6).toUpperCase();
            const price = (order.price || 0).toLocaleString('vi-VN');
            const originalPrice = (order.originalPrice || order.price || 0).toLocaleString('vi-VN');
            const time = new Date(order.timestamp).toLocaleString('vi-VN');
            const image = order.productImage || order.productIcon || '📦';
            
            container.innerHTML = `
                <div class="order-detail-item"><span class="label">🔑 Mã đơn</span><span class="value code">${code}</span></div>
                <div class="order-detail-item"><span class="label">📦 Sản phẩm</span><span class="value">${order.productName || 'Không tên'}</span></div>
                <div class="order-detail-item"><span class="label">🖼️ Hình ảnh</span><span class="value">
                    ${order.productImage ? `<img src="${order.productImage}" style="max-width:60px;max-height:60px;border-radius:8px;object-fit:cover;" onerror="this.style.display='none'" />` : (order.productIcon || '📦')}
                </span></div>
                <div class="order-detail-item"><span class="label">📝 Mô tả</span><span class="value">${order.productDesc || 'Không có'}</span></div>
                <div class="order-detail-item"><span class="label">📌 Ghi chú</span><span class="value">${order.orderNote || 'Không có'}</span></div>
                <div class="order-detail-item"><span class="label">💰 Giá gốc</span><span class="value">${originalPrice} VND</span></div>
                <div class="order-detail-item"><span class="label">💰 Giá thanh toán</span><span class="value" style="color:var(--accent);font-size:16px;">${price} VND</span></div>
                ${order.voucher ? `<div class="order-detail-item"><span class="label">🎫 Mã giảm giá</span><span class="value" style="color:var(--success);">${order.voucher}</span></div>` : ''}
                <div class="order-detail-item"><span class="label">👤 Người mua</span><span class="value">${order.userName || 'Khách hàng'}</span></div>
                <div class="order-detail-item"><span class="label">📅 Thời gian</span><span class="value">${time}</span></div>
                <div class="order-detail-item"><span class="label">🆔 User ID</span><span class="value" style="font-size:11px;font-family:monospace;">${order.userId || 'N/A'}</span></div>
            `;
            
            document.getElementById('detailModal').classList.add('active');
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        // ===== DOWNLOAD ORDER AS TXT =====
        function downloadOrder(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (!order) {
                showToast('❌ Không tìm thấy đơn hàng!', 'error');
                return;
            }
            
            const code = order.orderCode || '#' + orderId.substring(0, 6).toUpperCase();
            const price = (order.price || 0).toLocaleString('vi-VN');
            const originalPrice = (order.originalPrice || order.price || 0).toLocaleString('vi-VN');
            const time = new Date(order.timestamp).toLocaleString('vi-VN');
            
            const lines = [
                '='.repeat(50),
                '📜 HÓA ĐƠN MUA HÀNG',
                '='.repeat(50),
                '',
                '🔑 Mã đơn hàng: ' + code,
                '📦 Sản phẩm: ' + (order.productName || 'Không tên'),
                '📝 Mô tả: ' + (order.productDesc || 'Không có'),
                '📌 Ghi chú: ' + (order.orderNote || 'Không có'),
                '💰 Giá gốc: ' + originalPrice + ' VND',
                '💰 Giá thanh toán: ' + price + ' VND',
                order.voucher ? '🎫 Mã giảm giá: ' + order.voucher : '',
                '👤 Người mua: ' + (order.userName || 'Khách hàng'),
                '📅 Thời gian: ' + time,
                '🆔 User ID: ' + (order.userId || 'N/A'),
                '',
                '='.repeat(50),
                '📌 Cảm ơn bạn đã mua hàng!',
                '='.repeat(50)
            ].filter(line => line !== '').join('\n');
            
            const blob = new Blob([lines], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'DonHang_' + code.replace('#', '') + '.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast('✅ Đã tải xuống!', 'success');
        }

        // ===== DELETE ORDER =====
        function deleteOrder(orderId) {
            if (!confirm('🗑️ Xóa đơn hàng này?')) return;
            
            const user = auth.currentUser;
            const uid = user ? user.uid : localStorage.getItem('quickLoginUid');
            if (!uid) {
                showToast('❌ Vui lòng đăng nhập!', 'error');
                return;
            }
            
            db.ref('history/' + uid + '/' + orderId).remove()
                .then(() => {
                    showToast('✅ Đã xóa đơn hàng!', 'success');
                })
                .catch(err => showToast('❌ ' + err.message, 'error'));
        }

        // ===== AUTH =====
        auth.onAuthStateChanged(async (user) => {
            if (checkQuickLogin()) {
                const success = await completeQuickLogin();
                if (success) return;
                localStorage.removeItem('quickLoginUid');
                localStorage.removeItem('quickLoginToken');
                localStorage.removeItem('quickLoginPending');
                window.location.replace('../Authenticator/login.html');
                return;
            }
            
            if (!user) {
                window.location.replace('../Authenticator/login.html');
                return;
            }
            
            currentUser = user;
            
            db.ref('presence/' + user.uid).set(true);
            db.ref('presence/' + user.uid).onDisconnect().set(false);
            
            db.ref('users/' + user.uid + '/balance').on('value', snap => {
                document.getElementById('balanceAmount').textContent = (snap.val() || 0).toLocaleString('vi-VN');
            });
            
            loadHistory(user.uid);
            loadNotifications(user.uid);
            
            if (!isDataLoaded) {
                isDataLoaded = true;
                hideLoading();
            }
        });

        // ===== MENU FUNCTIONS =====
        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('menuOverlay').classList.toggle('active'); }
        function closeMenu() { document.getElementById('sideMenu').classList.remove('active');
            document.getElementById('menuOverlay').classList.remove('active'); }

        function togglePopup(e) { e.stopPropagation();
            document.getElementById('settingsPopup').classList.toggle('active'); }
        document.addEventListener('click', function(e) {
            const popup = document.getElementById('settingsPopup');
            const wrapper = document.querySelector('.settings-wrapper');
            if (!wrapper.contains(e.target)) popup.classList.remove('active');
        });

        function toggleNotif() {
            const popup = document.getElementById('notifPopup');
            popup.classList.toggle('active');
            const user = auth.currentUser;
            const uid = user ? user.uid : localStorage.getItem('quickLoginUid');
            if (uid && localStorage.getItem('autoView') !== 'false') {
                db.ref('notifications').once('value', snap => {
                    const notifs = snap.val();
                    if (notifs) Object.keys(notifs).forEach(key => db.ref('notifications/' + key + '/readBy/' + uid).set(true));
                });
                document.getElementById('notifDot').classList.remove('show');
            }
        }

        // Đường dẫn đến index.html (lùi lại 1 cấp vì đang ở Pages/)
        function goHome() { closeMenu(); window.location.href = '../index.html'; }
        function goHistory() { closeMenu(); window.location.href = 'history.html'; }
        function goTopup() { closeMenu(); alert('💰 Đang phát triển!'); }
        function goSupport() { closeMenu(); alert('🆘 Đang phát triển!'); }
        function goToProfile() { window.location.href = '../Pop-up/profile.html'; }
        function goToSecurity() { window.location.href = '../Pop-up/security.html'; }
        function goToSettings() { window.location.href = '../Pop-up/settings.html'; }

        function logout() {
            if (confirm('Đăng xuất?')) {
                const user = auth.currentUser;
                if (user) {
                    db.ref('presence/' + user.uid).set(false);
                }
                auth.signOut().then(() => {
                    localStorage.removeItem('quickLoginUid');
                    localStorage.removeItem('quickLoginEmail');
                    localStorage.removeItem('quickLoginToken');
                    localStorage.removeItem('quickLoginPending');
                    window.location.replace('../Authenticator/login.html');
                });
            }
        }

        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) closeDetailModal();
        });

        window.addEventListener('storage', function(e) {
            if (e.key === 'theme' || e.key === 'theme_name') { applyTheme(); }
        });

        showLoading();
        setTimeout(() => {
            if (!isDataLoaded) hideLoading();
        }, 5000);
    </script>
</body>
</html>
