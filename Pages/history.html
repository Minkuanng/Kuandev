<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lịch sử mua hàng - KuanZGame.Store</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        :root {
            --bg-body: #f0f7ff;
            --bg-card: #fff;
            --bg-header: #fff;
            --text-primary: #1a3a5a;
            --text-secondary: #4a8ab5;
            --text-muted: #8ab3d4;
            --border-color: #e3eef9;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            --shadow-popup: 0 8px 32px rgba(0, 0, 0, 0.15);
            --wallet-bg: #f0f7ff;
            --hover-bg: #e8f0fa;
            --accent: #3b8fd6;
            --success: #27ae60;
            --danger: #e74c6f;
            --warning: #f39c12;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --radius: 12px;
        }
        .theme-galaxy {
            --bg-body: #0a0a1a;
            --bg-card: #12122a;
            --bg-header: #1a1a3e;
            --text-primary: #c8b8ff;
            --text-secondary: #8a7aff;
            --text-muted: #6a5a9a;
            --border-color: #2a2a5a;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
            --shadow-popup: 0 8px 32px rgba(0, 0, 0, 0.6);
            --wallet-bg: #1a1a3e;
            --hover-bg: #2a2a5a;
            --accent: #8a7aff;
        }
        .theme-ocean {
            --bg-body: #0a1628;
            --bg-card: #0f2a4a;
            --bg-header: #0d2847;
            --text-primary: #7fc8ff;
            --text-secondary: #4a9aff;
            --text-muted: #3a6a8a;
            --border-color: #1a3a6a;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
            --shadow-popup: 0 8px 32px rgba(0, 0, 0, 0.6);
            --wallet-bg: #0d2847;
            --hover-bg: #1a3a6a;
            --accent: #4a9aff;
        }
        .theme-forest {
            --bg-body: #0a1a0a;
            --bg-card: #0f2a0f;
            --bg-header: #0d2a0d;
            --text-primary: #7fdf7f;
            --text-secondary: #4abf4a;
            --text-muted: #3a7a3a;
            --border-color: #1a4a1a;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
            --shadow-popup: 0 8px 32px rgba(0, 0, 0, 0.6);
            --wallet-bg: #0d2a0d;
            --hover-bg: #1a4a1a;
            --accent: #4abf4a;
        }
        .theme-sunset {
            --bg-body: #1a0a0a;
            --bg-card: #2a120a;
            --bg-header: #3e1a0a;
            --text-primary: #ffb87f;
            --text-secondary: #ff8a4a;
            --text-muted: #9a6a3a;
            --border-color: #5a2a1a;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
            --shadow-popup: 0 8px 32px rgba(0, 0, 0, 0.6);
            --wallet-bg: #3e1a0a;
            --hover-bg: #5a2a1a;
            --accent: #ff8a4a;
        }
        .theme-cherry {
            --bg-body: #1a0a12;
            --bg-card: #2a0a16;
            --bg-header: #3e0a1a;
            --text-primary: #ff7fa8;
            --text-secondary: #ff4a7a;
            --text-muted: #9a3a5a;
            --border-color: #5a1a2a;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
            --shadow-popup: 0 8px 32px rgba(0, 0, 0, 0.6);
            --wallet-bg: #3e1a0a;
            --hover-bg: #5a1a2a;
            --accent: #ff4a7a;
        }
        .theme-neon {
            --bg-body: #0a0a0a;
            --bg-card: #121212;
            --bg-header: #1a1a1a;
            --text-primary: #00ff88;
            --text-secondary: #00ccff;
            --text-muted: #666;
            --border-color: #333;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
            --shadow-popup: 0 8px 32px rgba(0, 0, 0, 0.8);
            --wallet-bg: #1a1a1a;
            --hover-bg: #2a2a2a;
            --accent: #00ccff;
        }
        .theme-lavender {
            --bg-body: #1a0a2a;
            --bg-card: #221a3a;
            --bg-header: #2a1a3e;
            --text-primary: #d4a8ff;
            --text-secondary: #b87aff;
            --text-muted: #7a5a9a;
            --border-color: #3a2a5a;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
            --shadow-popup: 0 8px 32px rgba(0, 0, 0, 0.6);
            --wallet-bg: #2a1a3e;
            --hover-bg: #3a2a5a;
            --accent: #b87aff;
        }
        .theme-mint {
            --bg-body: #0a1a12;
            --bg-card: #0f2a1a;
            --bg-header: #0d2a1a;
            --text-primary: #7fffd4;
            --text-secondary: #4abfa0;
            --text-muted: #3a7a6a;
            --border-color: #1a4a3a;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
            --shadow-popup: 0 8px 32px rgba(0, 0, 0, 0.6);
            --wallet-bg: #0d2a1a;
            --hover-bg: #1a4a3a;
            --accent: #4abfa0;
        }
        .theme-coffee {
            --bg-body: #1a0f0a;
            --bg-card: #221a12;
            --bg-header: #2a1a12;
            --text-primary: #d4b896;
            --text-secondary: #b8987a;
            --text-muted: #7a6a5a;
            --border-color: #3a2a1a;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
            --shadow-popup: 0 8px 32px rgba(0, 0, 0, 0.6);
            --wallet-bg: #2a1a12;
            --hover-bg: #3a2a1a;
            --accent: #b8987a;
        }
        body.dark-mode {
            --bg-body: #1a1a2e;
            --bg-card: #1a1a2e;
            --bg-header: #16213e;
            --text-primary: #e8e8e8;
            --text-secondary: #8fc1e0;
            --text-muted: #6a8a9a;
            --border-color: #2a3a5a;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
            --shadow-popup: 0 8px 32px rgba(0, 0, 0, 0.5);
            --wallet-bg: #1a2a4a;
            --hover-bg: #1a2a4a;
            --accent: #8fc1e0;
        }
        body {
            background: var(--bg-body);
            min-height: 100vh;
            transition: var(--transition);
        }

        /* ===== HEADER ===== */
        .header {
            background: var(--bg-header);
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: var(--transition);
            backdrop-filter: blur(12px);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .menu-icon {
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 8px;
            background: var(--wallet-bg);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            transition: var(--transition);
            width: 34px;
            height: 34px;
            flex-shrink: 0;
        }
        .menu-icon:hover {
            background: var(--hover-bg);
            transform: scale(1.05);
        }
        .menu-icon .bar {
            display: block;
            width: 18px;
            height: 2px;
            background: var(--text-secondary);
            border-radius: 2px;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .menu-icon:hover .bar {
            background: var(--text-primary);
        }

        .logo {
            display: none;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .wallet-container {
            background: var(--wallet-bg);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 4px 12px 4px 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            cursor: default;
            min-height: 36px;
        }
        .wallet-container:hover {
            border-color: var(--accent);
        }
        .wallet-icon-box {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .wallet-icon-box i {
            color: #fff;
            font-size: 13px;
        }
        .wallet-info {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }
        .wallet-label {
            font-size: 8px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .wallet-balance {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .wallet-balance span {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            margin-left: 2px;
        }

        .bell-icon {
            width: 34px;
            height: 34px;
            cursor: pointer;
            border-radius: 50%;
            background: var(--wallet-bg);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            position: relative;
            font-size: 15px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }
        .bell-icon:hover {
            background: var(--hover-bg);
            transform: scale(1.05);
            color: var(--text-primary);
        }
        .bell-icon .bell-dot {
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: 50%;
            position: absolute;
            top: 2px;
            right: 2px;
            border: 2px solid var(--bg-header);
            display: none;
            animation: pulse 2s infinite;
        }
        .bell-icon .bell-dot.show {
            display: block;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.3);
            }
        }

        .dot-menu {
            width: 34px;
            height: 34px;
            cursor: pointer;
            border-radius: 50%;
            background: var(--wallet-bg);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            transition: var(--transition);
            padding: 6px;
            flex-shrink: 0;
        }
        .dot-menu:hover {
            background: var(--hover-bg);
            transform: scale(1.05);
        }
        .dot-menu .dot {
            width: 3.5px;
            height: 3.5px;
            background: var(--text-secondary);
            border-radius: 50%;
            transition: var(--transition);
        }
        .dot-menu:hover .dot {
            background: var(--text-primary);
        }

        .popup {
            position: absolute;
            top: 42px;
            right: 0;
            background: var(--bg-card);
            border-radius: 10px;
            box-shadow: var(--shadow-popup);
            min-width: 160px;
            padding: 4px 0;
            border: 1px solid var(--border-color);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px) scale(0.96);
            transition: var(--transition);
            z-index: 200;
        }
        .popup.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }
        .popup-item {
            padding: 8px 16px;
            color: var(--text-primary);
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
            border: none;
            background: none;
            width: 100%;
            font-weight: 500;
        }
        .popup-item:hover {
            background: var(--hover-bg);
            padding-left: 22px;
        }
        .popup-divider {
            height: 1px;
            background: var(--border-color);
            margin: 4px 10px;
        }
        .popup-item.logout {
            color: var(--danger);
        }
        .settings-wrapper {
            position: relative;
        }

        .notif-popup {
            position: fixed;
            top: 56px;
            right: 12px;
            background: var(--bg-card);
            border-radius: 10px;
            box-shadow: var(--shadow-popup);
            min-width: 260px;
            max-width: 320px;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px 0;
            border: 1px solid var(--border-color);
            z-index: 300;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px) scale(0.96);
            transition: var(--transition);
        }
        .notif-popup.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }
        .notif-popup .notif-header {
            padding: 0 12px 8px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
        .notif-popup .notif-header .close {
            cursor: pointer;
            transition: var(--transition);
        }
        .notif-popup .notif-header .close:hover {
            color: var(--danger);
        }
        .notif-popup .notif-item {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 12px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .notif-popup .notif-item i {
            margin-top: 2px;
            color: var(--text-secondary);
        }
        .notif-popup .notif-item .time {
            font-size: 9px;
            color: var(--text-muted);
            margin-top: 2px;
            display: block;
        }
        .notif-popup .notif-item.unread {
            background: var(--wallet-bg);
            border-left: 3px solid var(--danger);
        }
        .notif-popup .notif-item.unread i {
            color: var(--danger);
        }
        .notif-popup .empty {
            padding: 14px;
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
        }
        .notif-popup .empty i {
            font-size: 20px;
            display: block;
            margin-bottom: 6px;
        }

        /* ===== SIDE MENU - KHÔNG CÓ HEADER, LOGO FULL + 3 GẠCH GÓC ===== */
        .side-menu {
            position: fixed;
            top: 0;
            left: -320px;
            width: 300px;
            height: 100vh;
            background: var(--bg-card);
            box-shadow: var(--shadow-popup);
            z-index: 300;
            transition: var(--transition);
            padding: 0;
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            overflow-x: hidden;
        }
        .side-menu.active {
            left: 0;
        }

        /* LOGO FULL - KHÔNG CÓ KHOẢNG CÁCH TRÊN */
        .side-menu .menu-logo-wrap {
            display: block;
            width: 100%;
            padding: 0;
            background: #ffffff;
            position: relative;
            margin-right: -21px;
        }
        .side-menu .menu-logo-wrap img {
            width: calc(100% + 21px);
            height: auto;
            display: block;
            padding: 0;
            background: #ffffff;
            object-fit: contain;
            max-height: none;
            margin-right: -21px;
        }

        /* NÚT 3 GẠCH Ở GÓC TRÊN BÊN PHẢI CỦA SIDE MENU */
        .side-menu .close-menu-btn {
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            transition: var(--transition);
            position: absolute;
            right: 12px;
            top: 12px;
            z-index: 10;
            width: 34px;
            height: 34px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }
        .side-menu .close-menu-btn:hover {
            background: rgba(255, 255, 255, 0.95);
            transform: scale(1.05);
        }
        .side-menu .close-menu-btn .bar {
            display: block;
            width: 16px;
            height: 2px;
            background: var(--text-muted);
            border-radius: 2px;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .side-menu .close-menu-btn:hover .bar {
            background: var(--text-primary);
        }

        /* MENU ITEMS - XUẤT HIỆN BÊN DƯỚI LOGO */
        .side-menu .menu-items {
            padding: 8px 0;
        }
        .side-menu .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-primary);
            border: none;
            background: none;
            width: 100%;
            font-size: 13px;
            font-weight: 500;
        }
        .side-menu .menu-item:hover {
            background: var(--hover-bg);
            padding-left: 22px;
        }
        .side-menu .menu-item .icon {
            font-size: 16px;
            width: 24px;
            text-align: center;
        }
        .side-menu .menu-divider {
            height: 1px;
            background: var(--border-color);
            margin: 4px 12px;
        }
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 299;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }
        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .content {
            padding: 14px 16px;
            max-width: 900px;
            margin: 0 auto;
        }

        .history-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px 22px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }
        .history-card:hover {
            box-shadow: var(--shadow-popup);
        }
        .history-card h1 {
            color: var(--text-primary);
            font-size: 20px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .history-card .sub {
            color: var(--text-muted);
            font-size: 12px;
            margin-bottom: 14px;
        }

        .stats-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .stat-box {
            background: var(--wallet-bg);
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            flex: 1;
            min-width: 80px;
            transition: var(--transition);
        }
        .stat-box:hover {
            border-color: var(--accent);
        }
        .stat-box .num {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .stat-box .label {
            font-size: 10px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 14px;
            align-items: center;
        }
        .filter-bar input,
        .filter-bar select {
            padding: 6px 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 12px;
            background: var(--bg-card);
            color: var(--text-primary);
            transition: var(--transition);
            flex: 1;
            min-width: 100px;
        }
        .filter-bar input:focus,
        .filter-bar select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 143, 214, 0.1);
        }
        .filter-bar .btn-clear {
            padding: 6px 14px;
            background: var(--wallet-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 11px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .filter-bar .btn-clear:hover {
            background: var(--hover-bg);
        }

        /* ===== DELETE BUTTONS ===== */
        .delete-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 14px;
            align-items: center;
        }
        .delete-bar .btn-delete {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .delete-bar .btn-delete.danger {
            background: var(--danger);
            color: #fff;
        }
        .delete-bar .btn-delete.danger:hover {
            opacity: 0.85;
            transform: scale(1.05);
        }
        .delete-bar .btn-delete.outline {
            background: var(--wallet-bg);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }
        .delete-bar .btn-delete.outline:hover {
            background: var(--hover-bg);
            border-color: var(--danger);
            color: var(--danger);
        }
        .delete-bar .btn-delete:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCPDDRt520fSynXCGrr2aF-KvpnS_ZuIm8",
            authDomain: "shop-c6777.firebaseapp.com",
            databaseURL: "https://shop-c6777-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "shop-c6777",
            storageBucket: "shop-c6777.firebasestorage.app",
            messagingSenderId: "43186563268",
            appId: "1:43186563268:web:0d392ba57039a919670191"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let lang = localStorage.getItem('lang') || 'vi';
        let currentUser = null;
        let allOrders = [];
        let isDataLoaded = false;
        let categoriesData = {};
        let selectedOrders = new Set();

        function showToast(msg, type = '') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast ' + type;
            el.classList.add('show');
            clearTimeout(el.timeout);
            el.timeout = setTimeout(() => el.classList.remove('show'), 2500);
        }

        function applyTheme() {
            const isDark = localStorage.getItem('theme') === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            const theme = localStorage.getItem('theme_name') || 'default';
            document.body.className = document.body.className.replace(/theme-\w+/g, '');
            if (theme !== 'default') document.body.classList.add('theme-' + theme);
        }
        applyTheme();

        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) { overlay.classList.add('hidden');
                overlay.style.display = 'none'; }
        }

        function showLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) { overlay.style.display = 'flex';
                overlay.classList.remove('hidden'); }
        }

        function checkQuickLogin() {
            const quickUid = localStorage.getItem('quickLoginUid');
            const quickToken = localStorage.getItem('quickLoginToken');
            const quickPending = localStorage.getItem('quickLoginPending');
            return !!(quickUid && quickToken && quickPending === 'true');
        }

        async function completeQuickLogin() {
            const quickUid = localStorage.getItem('quickLoginUid');
            if (!quickUid) return false;
            try {
                await db.ref('presence/' + quickUid).set(true);
                db.ref('presence/' + quickUid).onDisconnect().set(false);
                const snap = await db.ref('users/' + quickUid).once('value');
                const data = snap.val();
                if (data) {
                    document.getElementById('balanceAmount').textContent = (data.balance || 0).toLocaleString('vi-VN');
                    currentUser = { uid: quickUid, ...data };
                    loadCategories();
                    loadHistory(quickUid);
                    loadNotifications(quickUid);
                }
                isDataLoaded = true;
                hideLoading();
                return true;
            } catch (error) {
                console.error('Lỗi quick login:', error);
                return false;
            }
        }

        function loadCategories() {
            db.ref('categories').on('value', snap => {
                categoriesData = snap.val() || {};
            });
        }

        function loadNotifications(uid) {
            db.ref('notifications').on('value', snap => {
                const notifs = snap.val();
                const list = document.getElementById('notifList');
                const dot = document.getElementById('notifDot');
                if (notifs) {
                    const keys = Object.keys(notifs).reverse();
                    let html = '',
                        hasUnread = false;
                    keys.forEach(key => {
                        const n = notifs[key];
                        const isUnread = !n.readBy || !n.readBy[uid];
                        if (isUnread) hasUnread = true;
                        html +=
                            `<div class="notif-item ${isUnread?'unread':''}"><i class="fas fa-bell"></i> ${n.message}<span class="time"><i class="far fa-clock"></i> ${new Date(n.timestamp).toLocaleString('vi-VN')}</span></div>`;
                    });
                    list.innerHTML = html;
                    dot.classList.toggle('show', hasUnread && localStorage.getItem('notifEnabled') !== 'false');
                } else {
                    list.innerHTML = `<div class="empty"><i class="far fa-bell-slash"></i> Chưa có thông báo</div>`;
                    dot.classList.remove('show');
                }
            });
        }

        function loadHistory(uid) {
            db.ref('history/' + uid).on('value', (snapshot) => {
                const data = snapshot.val() || {};
                allOrders = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                renderOrders(allOrders);
                updateStats(allOrders);
                selectedOrders.clear();
                updateDeleteButton();
            });
        }

        function getCategoryName(catId) {
            return categoriesData[catId]?.name || catId || 'Không có';
        }

        function truncateData(data, maxLen = 64) {
            if (!data) return { display: 'Không có dữ liệu', isTruncated: false, full: '' };
            const str = String(data);
            if (str.length <= maxLen) return { display: str, isTruncated: false, full: str };
            return { display: str.substring(0, maxLen) + '...', isTruncated: true, full: str };
        }

        function renderOrders(orders) {
            const container = document.getElementById('orderList');

            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="big-icon">📦</span>
                        <p>Chưa có đơn hàng nào</p>
                    </div>
                `;
                return;
            }

            let html = '';
            orders.forEach(order => {
                const isChecked = selectedOrders.has(order.id);
                const image = order.productImage || order.productIcon || '📦';
                const price = (order.price || 0).toLocaleString('vi-VN');
                const time = new Date(order.timestamp).toLocaleString('vi-VN');
                const orderCode = order.orderCode || '#' + order.id.substring(0, 6).toUpperCase();
                const desc = order.productDesc || '';
                const quantity = order.quantity || 1;
                const status = order.status || 'success';
                const categoryName = getCategoryName(order.productCategory);
                const statusText = status === 'success' ? 'Thành công' : 'Thất bại';
                const statusClass = status === 'success' ? 'success' : 'failed';
                const orderData = order.orderData || '';
                const truncated = truncateData(orderData, 64);

                html += `
                    <div class="order-item">
                        <input type="checkbox" class="order-checkbox" data-id="${order.id}" ${isChecked ? 'checked' : ''} onchange="toggleOrderSelection('${order.id}')" />
                        <div class="order-header">
                            <div>
                                <div class="order-code"><i class="fas fa-key"></i> ${orderCode}</div>
                                <div class="order-time"><i class="far fa-clock"></i> ${time}</div>
                            </div>
                            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                                <span class="order-status ${statusClass}"><i class="fas ${status === 'success' ? 'fa-check-circle' : 'fa-times-circle'}"></i> ${statusText}</span>
                                <div class="order-price">${price} VND</div>
                            </div>
                        </div>
                        <div class="order-body">
                            <div class="order-image">
                                ${order.productImage ? `<img src="${order.productImage}" onerror="this.style.display='none';this.parentElement.textContent='${order.productIcon || '📦'}'" />` : (order.productIcon || '📦')}
                            </div>
                            <div class="order-details">
                                <div class="name">${order.productName || 'Sản phẩm'}</div>
                                ${desc ? `<div class="desc"><i class="fas fa-info-circle"></i> ${desc}</div>` : ''}
                                <div class="category"><i class="fas fa-tag"></i> ${categoryName}</div>
                                <div class="meta">
                                    <span><i class="fas fa-user"></i> ${order.userName || 'Khách hàng'}</span>
                                    <span><i class="fas fa-boxes"></i> SL: ${quantity}</span>
                                    ${order.voucher ? `<span><i class="fas fa-ticket-alt"></i> ${order.voucher} ${order.discountText || ''}</span>` : ''}
                                </div>
                                <div class="order-data">
                                    <span class="data-preview">${truncated.display}</span>
                                    ${truncated.isTruncated ? `<span class="data-full">${truncated.full}</span><button class="show-more-btn" onclick="toggleFullData(this)">Xem thêm</button>` : ''}
                                </div>
                            </div>
                        </div>
                        <div class="order-actions">
                            <button class="view" onclick="viewOrderDetail('${order.id}')"><i class="fas fa-eye"></i> Xem chi tiết</button>
                            <button class="download" onclick="downloadOrder('${order.id}')"><i class="fas fa-download"></i> Tải TXT</button>
                            <button class="copy-data" onclick="copyOrderData('${order.id}')"><i class="fas fa-copy"></i> Copy</button>
                            <button class="delete-single" onclick="deleteSingleOrder('${order.id}')"><i class="fas fa-trash"></i> Xóa</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function toggleFullData(btn) {
            const parent = btn.closest('.order-data');
            if (parent) {
                parent.classList.toggle('expanded');
                btn.textContent = parent.classList.contains('expanded') ? 'Thu gọn' : 'Xem thêm';
            }
        }

        function updateStats(orders) {
            document.getElementById('totalOrders').textContent = orders.length;
            const total = orders.reduce((sum, o) => sum + (o.price || 0), 0);
            document.getElementById('totalSpent').textContent = total.toLocaleString('vi-VN') + ' VND';
        }

        function filterOrders() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const sort = document.getElementById('sortSelect').value;

            let filtered = allOrders.filter(order => {
                const name = (order.productName || '').toLowerCase();
                const code = (order.orderCode || '').toLowerCase();
                return name.includes(search) || code.includes(search);
            });

            switch (sort) {
                case 'newest':
                    filtered.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                    break;
                case 'oldest':
                    filtered.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                    break;
                case 'high':
                    filtered.sort((a, b) => (b.price || 0) - (a.price || 0));
                    break;
                case 'low':
                    filtered.sort((a, b) => (a.price || 0) - (b.price || 0));
                    break;
                default:
                    filtered.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            }

            renderOrders(filtered);
        }

        function clearFilter() {
            document.getElementById('searchInput').value = '';
            document.getElementById('sortSelect').value = 'newest';
            filterOrders();
        }

        // ===== SELECTION FUNCTIONS =====
        function toggleOrderSelection(orderId) {
            if (selectedOrders.has(orderId)) {
                selectedOrders.delete(orderId);
            } else {
                selectedOrders.add(orderId);
            }
            updateDeleteButton();
            filterOrders();
        }

        function toggleSelectAll() {
            const filtered = getFilteredOrders();
            const allSelected = filtered.every(o => selectedOrders.has(o.id));

            if (allSelected) {
                filtered.forEach(o => selectedOrders.delete(o.id));
            } else {
                filtered.forEach(o => selectedOrders.add(o.id));
            }
            updateDeleteButton();
            filterOrders();
        }

        function getFilteredOrders() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const sort = document.getElementById('sortSelect').value;

            let filtered = allOrders.filter(order => {
                const name = (order.productName || '').toLowerCase();
                const code = (order.orderCode || '').toLowerCase();
                return name.includes(search) || code.includes(search);
            });
            return filtered;
        }

        function updateDeleteButton() {
            const btn = document.getElementById('deleteSelectedBtn');
            const count = selectedOrders.size;
            btn.disabled = count === 0;
            btn.innerHTML = `<i class="fas fa-trash"></i> Xóa đã chọn (${count})`;
        }

        // ===== DELETE FUNCTIONS =====
        function deleteSingleOrder(orderId) {
            if (!confirm('🗑️ Bạn có chắc muốn xóa đơn hàng này?')) return;

            const order = allOrders.find(o => o.id === orderId);
            if (!order) return;

            showLoading();
            db.ref('history/' + currentUser.uid + '/' + orderId).remove()
                .then(() => {
                    showToast('✅ Đã xóa đơn hàng!', 'success');
                    hideLoading();
                })
                .catch(err => {
                    showToast('❌ Lỗi: ' + err.message, 'error');
                    hideLoading();
                });
        }

        function deleteSelectedOrders() {
            if (selectedOrders.size === 0) {
                showToast('⚠️ Chưa chọn đơn hàng nào!', 'error');
                return;
            }

            if (!confirm(`🗑️ Bạn có chắc muốn xóa ${selectedOrders.size} đơn hàng đã chọn?`)) return;

            showLoading();
            const promises = [];
            selectedOrders.forEach(orderId => {
                promises.push(db.ref('history/' + currentUser.uid + '/' + orderId).remove());
            });

            Promise.all(promises)
                .then(() => {
                    selectedOrders.clear();
                    showToast(`✅ Đã xóa đơn hàng!`, 'success');
                    updateDeleteButton();
                    hideLoading();
                })
                .catch(err => {
                    showToast('❌ Lỗi: ' + err.message, 'error');
                    hideLoading();
                });
        }

        function deleteAllOrders() {
            if (allOrders.length === 0) {
                showToast('⚠️ Không có đơn hàng để xóa!', 'error');
                return;
            }

            if (!confirm(`🗑️ Bạn có chắc muốn xóa TẤT CẢ ${allOrders.length} đơn hàng? Hành động này không thể hoàn tác!`)) return;

            showLoading();
            db.ref('history/' + currentUser.uid).remove()
                .then(() => {
                    selectedOrders.clear();
                    showToast('✅ Đã xóa tất cả đơn hàng!', 'success');
                    updateDeleteButton();
                    hideLoading();
                })
                .catch(err => {
                    showToast('❌ Lỗi: ' + err.message, 'error');
                    hideLoading();
                });
        }

        // ===== COPY ORDER DATA =====
        function copyOrderData(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (!order) {
                showToast('❌ Không tìm thấy đơn hàng!', 'error');
                return;
            }

            const data = order.orderData || 'Không có dữ liệu';

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(data)
                    .then(() => showToast('✅ Đã sao chép dữ liệu!', 'success'))
                    .catch(() => fallbackCopy(data));
            } else {
                fallbackCopy(data);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('✅ Đã sao chép dữ liệu!', 'success');
            } catch (err) {
                showToast('❌ Không thể sao chép!', 'error');
            }
            document.body.removeChild(textarea);
        }

        // ===== VIEW ORDER DETAIL =====
        function viewOrderDetail(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (!order) {
                showToast('❌ Không tìm thấy đơn hàng!', 'error');
                return;
            }

            const container = document.getElementById('detailContent');
            const code = order.orderCode || '#' + orderId.substring(0, 6).toUpperCase();
            const price = (order.price || 0).toLocaleString('vi-VN');
            const originalPrice = (order.originalPrice || order.price || 0).toLocaleString('vi-VN');
            const time = new Date(order.timestamp).toLocaleString('vi-VN');
            const categoryName = getCategoryName(order.productCategory);
            const status = order.status || 'success';
            const statusText = status === 'success' ? '✅ Thành công' : '❌ Thất bại';
            const statusClass = status === 'success' ? 'status-success' : 'status-failed';
            const orderData = order.orderData || 'Không có dữ liệu';

            container.innerHTML = `
                <div class="detail-grid">
                    <div class="d-item"><div class="label"><i class="fas fa-key"></i> Mã đơn</div><div class="value" style="font-family:monospace;color:var(--accent);">${code}</div></div>
                    <div class="d-item"><div class="label"><i class="fas fa-box"></i> Sản phẩm</div><div class="value">${order.productName || 'Không tên'}</div></div>
                    <div class="d-item"><div class="label"><i class="fas fa-tag"></i> Loại mục</div><div class="value">${categoryName}</div></div>
                    <div class="d-item"><div class="label"><i class="fas fa-user"></i> Người mua</div><div class="value">${order.userName || 'Khách hàng'}</div></div>
                    <div class="d-item"><div class="label"><i class="fas fa-id-card"></i> Mã người dùng</div><div class="value" style="font-size:11px;font-family:monospace;">${order.userId || 'N/A'}</div></div>
                    <div class="d-item"><div class="label"><i class="fas fa-clock"></i> Thời gian</div><div class="value" style="font-size:11px;">${time}</div></div>
                    <div class="d-item"><div class="label"><i class="fas fa-boxes"></i> Số lượng</div><div class="value">${order.quantity || 1}</div></div>
                    <div class="d-item"><div class="label"><i class="fas fa-coins"></i> Giá</div><div class="value" style="color:var(--accent);">${price} VND</div></div>
                    <div class="d-item"><div class="label"><i class="fas fa-check-circle"></i> Trạng thái</div><div class="value ${statusClass}">${statusText}</div></div>
                    ${order.voucher ? `<div class="d-item full"><div class="label"><i class="fas fa-ticket-alt"></i> Mã giảm giá</div><div class="value" style="color:var(--success);">${order.voucher} ${order.discountText || ''}</div></div>` : ''}
                    ${order.productDesc ? `<div class="d-item full"><div class="label"><i class="fas fa-info-circle"></i> Mô tả</div><div class="value" style="font-weight:400;font-size:12px;">${order.productDesc}</div></div>` : ''}
                    <div class="d-item full"><div class="label"><i class="fas fa-database"></i> Dữ liệu nhận được</div><div class="value"><div class="data-item">${orderData}</div></div></div>
                </div>
            `;

            document.getElementById('detailModal').classList.add('active');
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        // ===== FULL DATA MODAL =====
        function showFullData(data) {
            document.getElementById('fullDataContent').textContent = data || 'Không có dữ liệu';
            document.getElementById('fullDataModal').classList.add('active');
        }

        function closeFullDataModal() {
            document.getElementById('fullDataModal').classList.remove('active');
        }

        // ===== DOWNLOAD ORDER =====
        function downloadOrder(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (!order) {
                showToast('❌ Không tìm thấy đơn hàng!', 'error');
                return;
            }

            const orderData = order.orderData || 'Không có dữ liệu';
            const content = orderData;

            try {
                const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const fileName = 'DuLieu_DonHang_' + (order.orderCode || orderId.substring(0, 6)).replace('#', '') +
                '.txt';
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 5000);
                showToast('✅ Đã tải xuống!', 'success');
            } catch (error) {
                console.error('Lỗi tải file:', error);
                showToast('❌ Lỗi khi tải file!', 'error');
            }
        }

        // ===== AUTH =====
        auth.onAuthStateChanged(async (user) => {
            if (checkQuickLogin()) {
                const success = await completeQuickLogin();
                if (success) return;
                localStorage.removeItem('quickLoginUid');
                localStorage.removeItem('quickLoginToken');
                localStorage.removeItem('quickLoginPending');
                window.location.replace('../Authenticator/login.html');
                return;
            }

            if (!user) {
                window.location.replace('../Authenticator/login.html');
                return;
            }

            currentUser = user;

            db.ref('presence/' + user.uid).set(true);
            db.ref('presence/' + user.uid).onDisconnect().set(false);

            db.ref('users/' + user.uid + '/balance').on('value', snap => {
                document.getElementById('balanceAmount').textContent = (snap.val() || 0).toLocaleString('vi-VN');
            });

            loadCategories();
            loadHistory(user.uid);
            loadNotifications(user.uid);

            if (!isDataLoaded) {
                isDataLoaded = true;
                hideLoading();
            }
        });

        // ===== MENU FUNCTIONS =====
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('menuOverlay').classList.toggle('active');
        }

        function closeMenu() {
            document.getElementById('sideMenu').classList.remove('active');
            document.getElementById('menuOverlay').classList.remove('active');
        }

        function togglePopup(e) {
            e.stopPropagation();
            document.getElementById('settingsPopup').classList.toggle('active');
        }
        document.addEventListener('click', function(e) {
            const popup = document.getElementById('settingsPopup');
            const wrapper = document.querySelector('.settings-wrapper');
            if (!wrapper.contains(e.target)) popup.classList.remove('active');
        });

        function toggleNotif() {
            const popup = document.getElementById('notifPopup');
            popup.classList.toggle('active');
            const user = auth.currentUser;
            const uid = user ? user.uid : localStorage.getItem('quickLoginUid');
            if (uid && localStorage.getItem('autoView') !== 'false') {
                db.ref('notifications').once('value', snap => {
                    const notifs = snap.val();
                    if (notifs) Object.keys(notifs).forEach(key => db.ref('notifications/' + key + '/readBy/' + uid)
                        .set(true));
                });
                document.getElementById('notifDot').classList.remove('show');
            }
        }

        function goHome() { closeMenu();
            window.location.href = '../index.html'; }

        function goHistory() { closeMenu();
            window.location.href = 'history.html'; }

        function goTopup() { closeMenu();
            showToast('💰 Đang phát triển!', 'error'); }

        function goSupport() { closeMenu();
            showToast('🆘 Đang phát triển!', 'error'); }

        function goToProfile() { window.location.href = '../Pop-up/profile.html'; }

        function goToSecurity() { window.location.href = '../Pop-up/security.html'; }

        function goToSettings() { window.location.href = '../Pop-up/settings.html'; }

        function logout() {
            if (confirm('Đăng xuất?')) {
                const user = auth.currentUser;
                if (user) {
                    db.ref('presence/' + user.uid).set(false);
                }
                auth.signOut().then(() => {
                    localStorage.removeItem('quickLoginUid');
                    localStorage.removeItem('quickLoginEmail');
                    localStorage.removeItem('quickLoginToken');
                    localStorage.removeItem('quickLoginPending');
                    window.location.replace('../Authenticator/login.html');
                });
            }
        }

        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) closeDetailModal();
        });

        document.getElementById('fullDataModal').addEventListener('click', function(e) {
            if (e.target === this) closeFullDataModal();
        });

        window.addEventListener('storage', function(e) {
            if (e.key === 'theme' || e.key === 'theme_name') { applyTheme(); }
        });

        showLoading();
        setTimeout(() => {
            if (!isDataLoaded) hideLoading();
        }, 5000);
    </script>
</body>
</html>
