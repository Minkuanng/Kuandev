<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        :root { --bg-body: #f0f7ff; --bg-card: #fff; --bg-header: #fff; --text-primary: #2c5a7a; --text-secondary: #5a8fb5; --text-muted: #8ab3d4; --border-color: #e3eef9; --shadow: 0 2px 10px rgba(0,0,0,0.05); --shadow-popup: 0 8px 30px rgba(0,0,0,0.15); --wallet-bg: #f0f7ff; --hover-bg: #f0f7ff; --danger: #e74c6f; --success: #27ae60; --accent: #3b8fd6; }
        .theme-galaxy { --bg-body: #0a0a1a; --bg-card: #12122a; --bg-header: #1a1a3e; --text-primary: #c8b8ff; --text-secondary: #8a7aff; --text-muted: #6a5a9a; --border-color: #2a2a5a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #1a1a3e; --hover-bg: #2a2a5a; --accent: #8a7aff; }
        .theme-ocean { --bg-body: #0a1628; --bg-card: #0f2a4a; --bg-header: #0d2847; --text-primary: #7fc8ff; --text-secondary: #4a9aff; --text-muted: #3a6a8a; --border-color: #1a3a6a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #0d2847; --hover-bg: #1a3a6a; --accent: #4a9aff; }
        .theme-forest { --bg-body: #0a1a0a; --bg-card: #0f2a0f; --bg-header: #0d2a0d; --text-primary: #7fdf7f; --text-secondary: #4abf4a; --text-muted: #3a7a3a; --border-color: #1a4a1a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #0d2a0d; --hover-bg: #1a4a1a; --accent: #4abf4a; }
        .theme-sunset { --bg-body: #1a0a0a; --bg-card: #2a120a; --bg-header: #3e1a0a; --text-primary: #ffb87f; --text-secondary: #ff8a4a; --text-muted: #9a6a3a; --border-color: #5a2a1a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #3e1a0a; --hover-bg: #5a2a1a; --accent: #ff8a4a; }
        .theme-cherry { --bg-body: #1a0a12; --bg-card: #2a0a16; --bg-header: #3e0a1a; --text-primary: #ff7fa8; --text-secondary: #ff4a7a; --text-muted: #9a3a5a; --border-color: #5a1a2a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #3e1a0a; --hover-bg: #5a1a2a; --accent: #ff4a7a; }
        .theme-neon { --bg-body: #0a0a0a; --bg-card: #121212; --bg-header: #1a1a1a; --text-primary: #00ff88; --text-secondary: #00ccff; --text-muted: #666; --border-color: #333; --shadow: 0 2px 10px rgba(0,0,0,0.6); --shadow-popup: 0 8px 30px rgba(0,0,0,0.8); --wallet-bg: #1a1a1a; --hover-bg: #2a2a2a; --accent: #00ccff; }
        .theme-lavender { --bg-body: #1a0a2a; --bg-card: #221a3a; --bg-header: #2a1a3e; --text-primary: #d4a8ff; --text-secondary: #b87aff; --text-muted: #7a5a9a; --border-color: #3a2a5a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #2a1a3e; --hover-bg: #3a2a5a; --accent: #b87aff; }
        .theme-mint { --bg-body: #0a1a12; --bg-card: #0f2a1a; --bg-header: #0d2a1a; --text-primary: #7fffd4; --text-secondary: #4abfa0; --text-muted: #3a7a6a; --border-color: #1a4a3a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #0d2a1a; --hover-bg: #1a4a3a; --accent: #4abfa0; }
        .theme-coffee { --bg-body: #1a0f0a; --bg-card: #221a12; --bg-header: #2a1a12; --text-primary: #d4b896; --text-secondary: #b8987a; --text-muted: #7a6a5a; --border-color: #3a2a1a; --shadow: 0 2px 10px rgba(0,0,0,0.4); --shadow-popup: 0 8px 30px rgba(0,0,0,0.6); --wallet-bg: #2a1a12; --hover-bg: #3a2a1a; --accent: #b8987a; }
        body.dark-mode { --bg-body: #1a1a2e; --bg-card: #1a1a2e; --bg-header: #16213e; --text-primary: #e8e8e8; --text-secondary: #8fc1e0; --text-muted: #6a8a9a; --border-color: #2a3a5a; --shadow: 0 2px 10px rgba(0,0,0,0.3); --shadow-popup: 0 8px 30px rgba(0,0,0,0.5); --wallet-bg: #1a2a4a; --hover-bg: #1a2a4a; --accent: #8fc1e0; }
        body { background: var(--bg-body); min-height: 100vh; transition: 0.3s; }
        .header { background: var(--bg-header); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; transition: 0.3s; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo { font-size: 20px; font-weight: 700; color: var(--text-primary); transition: 0.3s; }
        .logo span { color: var(--text-secondary); }
        .menu-icon { cursor: pointer; padding: 6px 10px; border-radius: 8px; background: var(--wallet-bg); border: 1px solid var(--border-color); display: flex; align-items: center; gap: 6px; transition: 0.3s; }
        .menu-icon:hover { background: var(--hover-bg); }
        .menu-icon .bar { display: block; width: 20px; height: 2px; background: var(--text-secondary); border-radius: 2px; margin: 2px 0; }
        .menu-icon .menu-text { font-size: 11px; color: var(--text-secondary); font-weight: 600; }
        .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

        .wallet-container {
            background: var(--wallet-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 6px 16px 6px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            cursor: default;
            min-height: 44px;
        }
        .wallet-container:hover { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,143,214,0.1); }
        .wallet-icon-box { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .wallet-icon-box svg { width: 18px; height: 18px; fill: #fff; }
        .wallet-info { display: flex; flex-direction: column; line-height: 1.3; }
        .wallet-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .wallet-balance { font-size: 15px; font-weight: 700; color: var(--text-primary); }
        .wallet-balance span { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-left: 2px; }

        .bell-icon { width: 32px; height: 32px; cursor: pointer; border-radius: 50%; background: var(--wallet-bg); border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; transition: 0.3s; position: relative; font-size: 16px; }
        .bell-icon:hover { background: var(--hover-bg); }
        .bell-icon .bell-dot { width: 8px; height: 8px; background: #e74c6f; border-radius: 50%; position: absolute; top: 2px; right: 4px; border: 2px solid var(--bg-header); display: none; }
        .bell-icon .bell-dot.show { display: block; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        .dot-menu { width: 36px; height: 36px; cursor: pointer; border-radius: 50%; background: var(--wallet-bg); border: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; transition: 0.3s; padding: 6px; }
        .dot-menu:hover { background: var(--hover-bg); }
        .dot-menu .dot { width: 4px; height: 4px; background: var(--text-secondary); border-radius: 50%; }
        .popup { position: absolute; top: 48px; right: 0; background: var(--bg-card); border-radius: 12px; box-shadow: var(--shadow-popup); min-width: 180px; padding: 6px 0; border: 1px solid var(--border-color); opacity: 0; visibility: hidden; transform: translateY(-10px); transition: 0.3s; z-index: 200; }
        .popup.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .popup-item { padding: 10px 18px; color: var(--text-primary); font-size: 13px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; border: none; background: none; width: 100%; font-weight: 500; }
        .popup-item:hover { background: var(--hover-bg); }
        .popup-divider { height: 1px; background: var(--border-color); margin: 4px 12px; }
        .popup-item.logout { color: #e74c6f; }
        .settings-wrapper { position: relative; }
        .notif-popup { position: fixed; top: 60px; right: 16px; background: var(--bg-card); border-radius: 12px; box-shadow: var(--shadow-popup); min-width: 280px; max-width: 360px; max-height: 350px; overflow-y: auto; padding: 12px 0; border: 1px solid var(--border-color); z-index: 300; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: 0.3s; }
        .notif-popup.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .notif-popup .notif-header { padding: 0 14px 10px; border-bottom: 1px solid var(--border-color); font-weight: 700; color: var(--text-primary); display: flex; justify-content: space-between; font-size: 14px; }
        .notif-popup .notif-header .close { cursor: pointer; }
        .notif-popup .notif-item { padding: 10px 14px; border-bottom: 1px solid var(--border-color); color: var(--text-primary); font-size: 13px; }
        .notif-popup .notif-item .time { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
        .notif-popup .notif-item.unread { background: var(--wallet-bg); border-left: 3px solid #e74c6f; }
        .notif-popup .empty { padding: 16px; text-align: center; color: var(--text-muted); font-size: 13px; }
        .side-menu { position: fixed; top: 0; left: -280px; width: 260px; height: 100vh; background: var(--bg-card); box-shadow: var(--shadow-popup); z-index: 300; transition: 0.3s; padding: 16px 0; border-right: 1px solid var(--border-color); overflow-y: auto; }
        .side-menu.active { left: 0; }
        .side-menu .menu-header { padding: 12px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .side-menu .menu-header .close { cursor: pointer; font-size: 20px; color: var(--text-muted); }
        .side-menu .menu-item { display: flex; align-items: center; gap: 14px; padding: 12px 20px; cursor: pointer; transition: 0.3s; color: var(--text-primary); border: none; background: none; width: 100%; font-size: 14px; font-weight: 500; }
        .side-menu .menu-item:hover { background: var(--hover-bg); padding-left: 26px; }
        .side-menu .menu-item .icon { font-size: 18px; width: 28px; text-align: center; }
        .side-menu .menu-divider { height: 1px; background: var(--border-color); margin: 6px 16px; }
        .menu-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 299; opacity: 0; visibility: hidden; transition: 0.3s; }
        .menu-overlay.active { opacity: 1; visibility: visible; }
        .content { padding: 24px; max-width: 1000px; margin: 0 auto; }
        .admin-card { background: var(--bg-card); border-radius: 16px; padding: 24px; box-shadow: var(--shadow); border: 1px solid var(--border-color); transition: 0.3s; }
        .admin-card h1 { color: var(--text-primary); font-size: 22px; transition: 0.3s; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .admin-card .sub { color: var(--text-muted); font-size: 13px; margin-bottom: 16px; }
        .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
        .stats .stat { background: var(--wallet-bg); padding: 12px 18px; border-radius: 10px; border: 1px solid var(--border-color); flex: 1; min-width: 80px; transition: 0.3s; }
        .stats .stat .num { font-size: 22px; font-weight: 700; color: var(--text-primary); }
        .stats .stat .label { font-size: 11px; color: var(--text-muted); }
        .user-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .user-table th { text-align: left; padding: 8px 10px; color: var(--text-muted); font-weight: 600; border-bottom: 2px solid var(--border-color); font-size: 12px; }
        .user-table td { padding: 8px 10px; border-bottom: 1px solid var(--border-color); color: var(--text-primary); }
        .user-table tr:hover td { background: var(--hover-bg); }
        .badge { padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; display: inline-block; }
        .badge.active { background: #d4edda; color: #155724; }
        .badge.inactive { background: #f8d7da; color: #721c24; }
        .badge.blocked { background: #f8d7da; color: #721c24; }
        .badge.admin { background: #fff3cd; color: #856404; }
        .btn-action { padding: 3px 10px; border: none; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.3s; margin: 0 2px; }
        .btn-action.edit { background: var(--wallet-bg); color: var(--text-secondary); border: 1px solid var(--border-color); }
        .btn-action.edit:hover { background: var(--text-secondary); color: #fff; }
        .btn-action.block { background: #fef0f2; color: #e74c6f; border: 1px solid #fdd5d9; }
        .btn-action.block:hover { background: #e74c6f; color: #fff; }
        .btn-action.unblock { background: #d4edda; color: #27ae60; border: 1px solid #c8e6d0; }
        .btn-action.unblock:hover { background: #27ae60; color: #fff; }
        .btn-action.delete { background: #fef0f2; color: #e74c6f; border: 1px solid #fdd5d9; }
        .btn-action.delete:hover { background: #c0392b; color: #fff; }
        .notif-form { margin-top: 16px; padding: 16px; background: var(--wallet-bg); border-radius: 10px; border: 1px solid var(--border-color); display: flex; gap: 10px; flex-wrap: wrap; }
        .notif-form input { flex: 1; padding: 8px 14px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 13px; background: var(--bg-card); color: var(--text-primary); min-width: 150px; transition: 0.3s; }
        .notif-form input:focus { outline: none; border-color: var(--text-secondary); }
        .notif-form .btn-send { padding: 8px 20px; background: linear-gradient(135deg, #8fc1e0, #5a8fb5); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .notif-form .btn-send:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(90,143,181,0.3); }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 500; display: none; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--bg-card); border-radius: 16px; padding: 24px; max-width: 380px; width: 92%; border: 1px solid var(--border-color); max-height: 90vh; overflow-y: auto; }
        .modal h3 { color: var(--text-primary); text-align: center; margin-bottom: 12px; }
        .modal .row { display: flex; gap: 10px; margin-bottom: 8px; align-items: center; }
        .modal .row label { color: var(--text-muted); font-size: 13px; min-width: 60px; }
        .modal .row input { flex: 1; padding: 8px 12px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 13px; background: var(--bg-card); color: var(--text-primary); }
        .modal .row input:focus { outline: none; border-color: var(--text-secondary); }
        .modal .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .modal .actions button { flex: 1; padding: 8px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.3s; min-width: 60px; }
        .modal .actions .add { background: #27ae60; color: #fff; }
        .modal .actions .add:hover { transform: translateY(-2px); }
        .modal .actions .sub { background: #e74c6f; color: #fff; }
        .modal .actions .sub:hover { transform: translateY(-2px); }
        .modal .actions .lock { background: #f39c12; color: #fff; }
        .modal .actions .lock:hover { transform: translateY(-2px); }
        .modal .actions .unlock { background: #3498db; color: #fff; }
        .modal .actions .unlock:hover { transform: translateY(-2px); }
        .modal .actions .delete { background: #c0392b; color: #fff; }
        .modal .actions .delete:hover { transform: translateY(-2px); }
        .modal .actions .cancel { background: var(--wallet-bg); color: var(--text-muted); border: 1px solid var(--border-color); }
        .btn-back { margin-top: 16px; padding: 10px; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; transition: 0.3s; border: 2px solid var(--border-color); background: transparent; color: var(--text-secondary); width: 100%; }
        .btn-back:hover { background: var(--hover-bg); border-color: var(--text-secondary); }
        .loading { text-align: center; padding: 20px; color: var(--text-muted); font-size: 14px; }
        .refresh-btn { background: var(--wallet-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 4px 12px; font-size: 12px; cursor: pointer; color: var(--text-secondary); transition: 0.3s; }
        .refresh-btn:hover { background: var(--hover-bg); }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 10px 24px; background: var(--bg-card); color: var(--text-primary); border-radius: 10px; box-shadow: var(--shadow-popup); border: 1px solid var(--border-color); z-index: 999; opacity: 0; transition: 0.5s; font-weight: 500; font-size: 13px; pointer-events: none; }
        .toast.show { opacity: 1; }
        .toast.error { border-color: #e74c6f; color: #e74c6f; }
        .toast.success { border-color: #27ae60; color: #27ae60; }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
        .status-dot.online { background: #27ae60; }
        .status-dot.offline { background: #e74c6f; }
        .status-dot.blocked { background: #f39c12; }
        @media (max-width: 600px) { .header { padding: 10px 12px; } .logo { font-size: 16px; } .content { padding: 12px; } .admin-card { padding: 16px; } .user-table { font-size: 11px; } .user-table th, .user-table td { padding: 5px 6px; } .menu-text { display: none; } .notif-popup { right: 8px; left: 8px; min-width: auto; } .wallet-container { padding: 4px 12px 4px 8px; min-height: 38px; } .wallet-icon-box { width: 28px; height: 28px; } .wallet-icon-box svg { width: 15px; height: 15px; } .wallet-balance { font-size: 13px; } .wallet-label { font-size: 9px; } }
    </style>
</head>
<body>
    <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>
    <div class="side-menu" id="sideMenu">
        <div class="menu-header"><span style="font-weight:700;color:var(--text-primary);">📋 Menu</span><span class="close" onclick="closeMenu()">✕</span></div>
        <button class="menu-item" onclick="goHome()"><span class="icon">🏠</span><span data-key="home">Trang chủ</span></button>
        <button class="menu-item" onclick="goHistory()"><span class="icon">⏳</span><span data-key="history">Lịch sử</span></button>
        <button class="menu-item" onclick="goTopup()"><span class="icon">💰</span><span data-key="topup">Nạp tiền</span></button>
        <div class="menu-divider"></div>
        <button class="menu-item" onclick="goSupport()"><span class="icon">🆘</span><span data-key="support">Hỗ trợ</span></button>
    </div>

    <header class="header">
        <div class="header-left">
            <div class="menu-icon" onclick="toggleMenu()"><div><span class="bar"></span><span class="bar"></span><span class="bar"></span></div><span class="menu-text">MENU</span></div>
            <div class="logo"></div>
        </div>
        <div class="header-right">
            <div class="wallet-container">
                <div class="wallet-icon-box">
                    <svg viewBox="0 0 24 24">
                        <path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
                    </svg>
                </div>
                <div class="wallet-info">
                    <span class="wallet-label">Số dư</span>
                    <span class="wallet-balance"><span id="balanceAmount">0</span> <span>VND</span></span>
                </div>
            </div>
            <div class="bell-icon" onclick="toggleNotif()"><div class="bell-dot" id="notifDot"></div>🔔</div>
            <div class="settings-wrapper">
                <div class="dot-menu" onclick="togglePopup(event)"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
                <div class="popup" id="settingsPopup">
                    <button class="popup-item" onclick="goToProfile()">👤 <span data-key="profile">Thông tin</span></button>
                    <button class="popup-item" onclick="goToSecurity()">🛡️ <span data-key="security">Bảo mật</span></button>
                    <button class="popup-item" onclick="goToSettings()">⚙️ <span data-key="settings">Cài đặt</span></button>
                    <div class="popup-divider"></div>
                    <button class="popup-item logout" onclick="logout()">🚪 <span data-key="logout">Đăng xuất</span></button>
                </div>
            </div>
        </div>
    </header>

    <div class="notif-popup" id="notifPopup">
        <div class="notif-header"><span data-key="notif_title">📢 Thông báo</span><span class="close" onclick="toggleNotif()">✕</span></div>
        <div id="notifList"><div class="empty" data-key="notif_empty">Chưa có thông báo</div></div>
    </div>

    <div class="content">
        <div class="admin-card">
            <h1>👑 <span data-key="admin_title">Quản trị</span> <button class="refresh-btn" onclick="refreshUsers()">🔄 Làm mới</button></h1>
            <p class="sub" data-key="admin_sub">Quản lý người dùng và hệ thống</p>
            <div id="loadingIndicator" class="loading">⏳ Đang tải dữ liệu...</div>
            <div class="stats" id="stats" style="display:none;">
                <div class="stat"><div class="num" id="totalUsers">0</div><div class="label" data-key="total_users">Tổng người dùng</div></div>
                <div class="stat"><div class="num" id="onlineUsers">0</div><div class="label">🟢 Online</div></div>
                <div class="stat"><div class="num" id="blockedUsers">0</div><div class="label" data-key="blocked_users">Đã khóa</div></div>
                <div class="stat"><div class="num" id="totalBalance">0</div><div class="label" data-key="total_balance">Tổng số dư</div></div>
            </div>
            <div id="tableContainer" style="overflow-x:auto; display:none;">
                <table class="user-table" id="userTable"><thead><tr><th data-key="stt">STT</th><th data-key="name">Tên</th><th data-key="email">Email</th><th data-key="balance">Số dư</th><th data-key="status">Trạng thái</th><th data-key="action">Thao tác</th></tr></thead><tbody id="userTableBody"><tr><td colspan="6" style="text-align:center;color:var(--text-muted);" data-key="no_data">Không có dữ liệu</td></tr></tbody></table>
            </div>
            <div class="notif-form" id="notifForm" style="display:none;">
                <input type="text" id="notifInput" placeholder="Nhập thông báo..." />
                <button class="btn-send" onclick="sendNotification()" data-key="send_btn">📢 Gửi</button>
            </div>
            <button class="btn-back" onclick="goHome()"><span data-key="back">← Quay lại</span></button>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 id="modalTitle" data-key="modal_title">Quản lý user</h3>
            <div class="row"><label data-key="user_label">User:</label><span id="modalUserName" style="color:var(--text-primary);font-weight:600;word-break:break-all;"></span></div>
            <div class="row"><label data-key="uid_label">UID:</label><span id="modalUserUid" style="color:var(--text-muted);font-size:11px;word-break:break-all;"></span></div>
            <div class="row"><label data-key="amount_label">Số tiền:</label><input type="number" id="modalAmount" placeholder="Nhập số tiền..." /></div>
            <div class="actions">
                <button class="add" onclick="modalAction('add')" data-key="add_btn">➕ Cộng</button>
                <button class="sub" onclick="modalAction('sub')" data-key="sub_btn">➖ Trừ</button>
                <button class="lock" onclick="modalAction('lock')" data-key="lock_btn">🔒 Khóa</button>
                <button class="unlock" onclick="modalAction('unlock')" data-key="unlock_btn">🔓 Mở</button>
                <button class="delete" onclick="modalAction('delete')" data-key="delete_btn">🗑️ Xóa</button>
                <button class="cancel" onclick="closeModal()" data-key="close_btn">Đóng</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCPDDRt520fSynXCGrr2aF-KvpnS_ZuIm8",
            authDomain: "shop-c6777.firebaseapp.com",
            databaseURL: "https://shop-c6777-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "shop-c6777",
            storageBucket: "shop-c6777.firebasestorage.app",
            messagingSenderId: "43186563268",
            appId: "1:43186563268:web:0d392ba57039a919670191"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let selectedUid = null;
        let isAdmin = false;
        let lang = localStorage.getItem('lang') || 'vi';
        let loadingUsers = false;

        const translations = {
            vi: {
                home: 'Trang chủ', history: 'Lịch sử', topup: 'Nạp tiền', support: 'Hỗ trợ',
                profile: 'Thông tin', security: 'Bảo mật', settings: 'Cài đặt', logout: 'Đăng xuất',
                notif_title: '📢 Thông báo', notif_empty: 'Chưa có thông báo',
                admin_title: 'Quản trị', admin_sub: 'Quản lý người dùng và hệ thống',
                total_users: 'Tổng người dùng', blocked_users: 'Đã khóa', total_balance: 'Tổng số dư',
                stt: 'STT', name: 'Tên', email: 'Email', balance: 'Số dư', status: 'Trạng thái', action: 'Thao tác',
                no_data: 'Không có dữ liệu', send_btn: '📢 Gửi', back: '← Quay lại',
                modal_title: 'Quản lý user', user_label: 'User:', uid_label: 'UID:', amount_label: 'Số tiền:',
                add_btn: '➕ Cộng', sub_btn: '➖ Trừ', lock_btn: '🔒 Khóa', unlock_btn: '🔓 Mở', 
                delete_btn: '🗑️ Xóa', close_btn: 'Đóng'
            },
            en: {
                home: 'Home', history: 'History', topup: 'Top up', support: 'Support',
                profile: 'Profile', security: 'Security', settings: 'Settings', logout: 'Logout',
                notif_title: '📢 Notifications', notif_empty: 'No notifications',
                admin_title: 'Admin', admin_sub: 'Manage users and system',
                total_users: 'Total users', blocked_users: 'Blocked', total_balance: 'Total balance',
                stt: 'No.', name: 'Name', email: 'Email', balance: 'Balance', status: 'Status', action: 'Action',
                no_data: 'No data', send_btn: '📢 Send', back: '← Back',
                modal_title: 'Manage User', user_label: 'User:', uid_label: 'UID:', amount_label: 'Amount:',
                add_btn: '➕ Add', sub_btn: '➖ Sub', lock_btn: '🔒 Lock', unlock_btn: '🔓 Unlock',
                delete_btn: '🗑️ Delete', close_btn: 'Close'
            }
        };

        function showToast(msg, type = '') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast ' + type;
            el.classList.add('show');
            clearTimeout(el.timeout);
            el.timeout = setTimeout(() => el.classList.remove('show'), 3000);
        }

        function applyLang() {
            const data = translations[lang] || translations.vi;
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (data[key] !== undefined) el.textContent = data[key];
            });
        }

        function applyTheme() {
            const isDark = localStorage.getItem('theme') === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            const theme = localStorage.getItem('theme_name') || 'default';
            document.body.className = document.body.className.replace(/theme-\w+/g, '');
            if (theme !== 'default') document.body.classList.add('theme-' + theme);
        }
        applyTheme();
        applyLang();

        function showLoading(show) {
            document.getElementById('loadingIndicator').style.display = show ? 'block' : 'none';
            document.getElementById('stats').style.display = show ? 'none' : 'flex';
            document.getElementById('tableContainer').style.display = show ? 'none' : 'block';
            document.getElementById('notifForm').style.display = show ? 'none' : 'block';
        }

        function refreshUsers() {
            if (loadingUsers) return;
            showLoading(true);
            setTimeout(() => {
                loadUsers();
                setTimeout(() => showLoading(false), 300);
            }, 200);
        }

        // Hàm kiểm tra user có online không (dựa trên lastLogin)
        function isUserOnline(lastLogin) {
            if (!lastLogin) return false;
            const now = Date.now();
            const diff = now - lastLogin;
            // Online nếu đăng nhập trong vòng 5 phút gần đây
            return diff < 5 * 60 * 1000;
        }

        auth.onAuthStateChanged((user) => {
            if (!user) { window.location.replace('login.html'); return; }
            db.ref('users/' + user.uid).once('value', snap => {
                const data = snap.val();
                if (!data || data.isAdmin !== true) {
                    alert(lang === 'vi' ? '⚠️ Không có quyền truy cập!' : '⚠️ Access denied!');
                    window.location.replace('../index.html');
                    return;
                }
                isAdmin = true;
                showLoading(true);
                loadUsers();
                setTimeout(() => showLoading(false), 300);
            });
            db.ref('users/' + user.uid + '/balance').on('value', snap => {
                document.getElementById('balanceAmount').textContent = (snap.val() || 0).toLocaleString('vi-VN');
            });
            db.ref('notifications').on('value', snap => {
                const notifs = snap.val();
                const list = document.getElementById('notifList');
                const dot = document.getElementById('notifDot');
                if (notifs) {
                    const keys = Object.keys(notifs).reverse();
                    let html = '', hasUnread = false;
                    keys.forEach(key => {
                        const n = notifs[key];
                        const isUnread = !n.readBy || !n.readBy[user.uid];
                        if (isUnread) hasUnread = true;
                        html += `<div class="notif-item ${isUnread?'unread':''}">${n.message}<div class="time">${new Date(n.timestamp).toLocaleString('vi-VN')}</div></div>`;
                    });
                    list.innerHTML = html;
                    dot.classList.toggle('show', hasUnread && localStorage.getItem('notifEnabled') !== 'false');
                } else {
                    list.innerHTML = `<div class="empty">${lang === 'vi' ? 'Chưa có thông báo' : 'No notifications'}</div>`;
                    dot.classList.remove('show');
                }
            });
        });

        function loadUsers() {
            if (loadingUsers) return;
            loadingUsers = true;
            
            db.ref('users').once('value').then(snap => {
                const users = snap.val();
                const tbody = document.getElementById('userTableBody');
                let html = '', total = 0, online = 0, blocked = 0, totalBal = 0;
                
                if (users) {
                    const keys = Object.keys(users);
                    let count = 0;
                    keys.forEach(key => {
                        const u = users[key];
                        count++;
                        total++;
                        const isBlocked = u.blocked === true;
                        const isAdminUser = u.isAdmin === true;
                        const bal = u.balance || 0;
                        totalBal += bal;
                        
                        // Kiểm tra online
                        const lastLogin = u.lastLogin || u.lastLoginTimestamp || null;
                        const lastLoginTime = typeof lastLogin === 'string' ? new Date(lastLogin).getTime() : lastLogin;
                        const online = isUserOnline(lastLoginTime);
                        if (online && !isBlocked && !isAdminUser) online++;
                        
                        if (isBlocked) blocked++;
                        
                        const name = u.displayName || u.email || 'Chưa đặt tên';
                        const email = u.email || 'Không có email';
                        
                        // Xác định trạng thái
                        let statusText, statusClass, statusDot;
                        if (isAdminUser) {
                            statusText = '👑 Admin';
                            statusClass = 'admin';
                            statusDot = '';
                        } else if (isBlocked) {
                            statusText = '🔒 Đã khóa';
                            statusClass = 'blocked';
                            statusDot = '<span class="status-dot blocked"></span>';
                        } else if (online) {
                            statusText = '🟢 Online';
                            statusClass = 'active';
                            statusDot = '<span class="status-dot online"></span>';
                        } else {
                            statusText = '⚪ Offline';
                            statusClass = 'inactive';
                            statusDot = '<span class="status-dot offline"></span>';
                        }
                        
                        const shortName = name.length > 20 ? name.substring(0, 18) + '…' : name;
                        const shortEmail = email.length > 25 ? email.substring(0, 23) + '…' : email;
                        
                        html += `<tr>
                            <td>${count}</td>
                            <td title="${name}">${shortName} ${isAdminUser ? '👑' : ''}</td>
                            <td title="${email}">${shortEmail}</td>
                            <td>${bal.toLocaleString('vi-VN')}</td>
                            <td>${statusDot}<span class="badge ${statusClass}">${statusText}</span></td>
                            <td>
                                ${!isAdminUser ? `
                                <button class="btn-action edit" onclick="openModal('${key}','${name.replace(/'/g,"\\'")}')" title="Quản lý">✏️</button>
                                <button class="btn-action ${isBlocked?'unblock':'block'}" onclick="toggleBlock('${key}',${isBlocked})" title="${isBlocked?'Mở khóa':'Khóa'}">${isBlocked?'🔓':'🔒'}</button>
                                <button class="btn-action delete" onclick="deleteUser('${key}','${name.replace(/'/g,"\\'")}')" title="Xóa">🗑️</button>
                                ` : '<span style="color:var(--text-muted);font-size:11px;">—</span>'}
                            </td>
                        </tr>`;
                    });
                }
                
                if (!html) html = `<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:16px;">${lang === 'vi' ? 'Chưa có người dùng' : 'No users'}</td></tr>`;
                tbody.innerHTML = html;
                document.getElementById('totalUsers').textContent = total;
                document.getElementById('onlineUsers').textContent = online;
                document.getElementById('blockedUsers').textContent = blocked;
                document.getElementById('totalBalance').textContent = totalBal.toLocaleString('vi-VN');
                loadingUsers = false;
            }).catch(err => {
                console.error('❌ Lỗi load users:', err);
                showToast('❌ Lỗi tải dữ liệu: ' + err.message, 'error');
                loadingUsers = false;
            });
        }

        function openModal(uid, name) {
            if (!isAdmin) return;
            selectedUid = uid;
            document.getElementById('modalUserName').textContent = name;
            document.getElementById('modalUserUid').textContent = uid;
            document.getElementById('modalAmount').value = '';
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            selectedUid = null;
        }

        function modalAction(action) {
            if (!selectedUid || !isAdmin) return;
            
            if (action === 'add' || action === 'sub') {
                const amount = parseInt(document.getElementById('modalAmount').value);
                if (!amount || amount <= 0) {
                    showToast('❌ Nhập số tiền hợp lệ!', 'error');
                    return;
                }
                const ref = db.ref('users/' + selectedUid + '/balance');
                ref.transaction(current => {
                    const c = current || 0;
                    return action === 'add' ? c + amount : c - amount;
                }).then(() => {
                    showToast(`✅ ${action==='add'?'Cộng':'Trừ'} ${amount.toLocaleString()} VND thành công!`, 'success');
                    closeModal();
                    refreshUsers();
                }).catch(err => {
                    showToast('❌ ' + err.message, 'error');
                });
            } else if (action === 'lock') {
                if (confirm(lang === 'vi' ? '🔒 Khóa user này?' : '🔒 Lock this user?')) {
                    db.ref('users/' + selectedUid + '/blocked').set(true)
                        .then(() => { showToast('✅ Đã khóa!', 'success'); closeModal(); refreshUsers(); })
                        .catch(err => showToast('❌ ' + err.message, 'error'));
                }
            } else if (action === 'unlock') {
                if (confirm(lang === 'vi' ? '🔓 Mở khóa user này?' : '🔓 Unlock this user?')) {
                    db.ref('users/' + selectedUid + '/blocked').set(false)
                        .then(() => { showToast('✅ Đã mở khóa!', 'success'); closeModal(); refreshUsers(); })
                        .catch(err => showToast('❌ ' + err.message, 'error'));
                }
            } else if (action === 'delete') {
                if (confirm(lang === 'vi' ? '🗑️ Xóa user này? (Không thể hoàn tác!)' : '🗑️ Delete this user? (Cannot undo!)')) {
                    // Xóa cả Authentication và Database
                    const email = document.getElementById('modalUserName').textContent;
                    // Lấy email từ database trước
                    db.ref('users/' + selectedUid + '/email').once('value').then(snap => {
                        const userEmail = snap.val();
                        if (userEmail) {
                            // Xóa trên Authentication
                            auth.signInWithEmailAndPassword(userEmail, 'tempPassword123').catch(() => {});
                            // Tìm và xóa user trên Auth (chỉ admin mới làm được)
                            // Thực tế: chỉ có thể xóa user trên Auth bằng Admin SDK, không thể từ client
                            // Nên ta chỉ xóa trên Database và thông báo
                        }
                        // Xóa trên Database
                        return db.ref('users/' + selectedUid).remove();
                    }).then(() => {
                        showToast('✅ Đã xóa user khỏi Database!', 'success');
                        closeModal();
                        refreshUsers();
                    }).catch(err => {
                        // Vẫn xóa database nếu có lỗi auth
                        db.ref('users/' + selectedUid).remove().then(() => {
                            showToast('✅ Đã xóa user khỏi Database!', 'success');
                            closeModal();
                            refreshUsers();
                        }).catch(e => showToast('❌ ' + e.message, 'error'));
                    });
                }
            }
        }

        function toggleBlock(uid, current) {
            if (!isAdmin) return;
            const newStatus = !current;
            const msg = newStatus ? (lang === 'vi' ? '🔒 Khóa user này?' : '🔒 Lock this user?') : (lang === 'vi' ? '🔓 Mở khóa user này?' : '🔓 Unlock this user?');
            if (confirm(msg)) {
                db.ref('users/' + uid + '/blocked').set(newStatus)
                    .then(() => {
                        showToast(newStatus ? '✅ Đã khóa!' : '✅ Đã mở khóa!', 'success');
                        refreshUsers();
                    })
                    .catch(err => showToast('❌ ' + err.message, 'error'));
            }
        }

        function deleteUser(uid, name) {
            if (!isAdmin) return;
            if (confirm(lang === 'vi' ? `🗑️ Xóa user "${name}"? (Không thể hoàn tác!)` : `🗑️ Delete user "${name}"? (Cannot undo!)`)) {
                db.ref('users/' + uid).remove()
                    .then(() => {
                        showToast('✅ Đã xóa user!', 'success');
                        refreshUsers();
                    })
                    .catch(err => showToast('❌ ' + err.message, 'error'));
            }
        }

        function sendNotification() {
            const msg = document.getElementById('notifInput').value.trim();
            if (!msg) { showToast('❌ Nhập nội dung!', 'error'); return; }
            const btn = document.querySelector('.btn-send');
            btn.disabled = true;
            btn.textContent = lang === 'vi' ? '⏳ Đang gửi...' : '⏳ Sending...';
            db.ref('notifications').push({ message: msg, timestamp: Date.now(), from: 'Admin', readBy: {} })
                .then(() => {
                    showToast('✅ Đã gửi thông báo!', 'success');
                    document.getElementById('notifInput').value = '';
                    btn.disabled = false;
                    btn.textContent = lang === 'vi' ? '📢 Gửi' : '📢 Send';
                })
                .catch(err => {
                    showToast('❌ ' + err.message, 'error');
                    btn.disabled = false;
                    btn.textContent = lang === 'vi' ? '📢 Gửi' : '📢 Send';
                });
        }

        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('menuOverlay').classList.toggle('active'); }
        function closeMenu() { document.getElementById('sideMenu').classList.remove('active');
            document.getElementById('menuOverlay').classList.remove('active'); }

        function togglePopup(e) { e.stopPropagation();
            document.getElementById('settingsPopup').classList.toggle('active'); }
        document.addEventListener('click', function(e) {
            const popup = document.getElementById('settingsPopup');
            const wrapper = document.querySelector('.settings-wrapper');
            if (!wrapper.contains(e.target)) popup.classList.remove('active');
        });

        function toggleNotif() {
            const popup = document.getElementById('notifPopup');
            popup.classList.toggle('active');
            const user = auth.currentUser;
            if (user && localStorage.getItem('autoView') !== 'false') {
                db.ref('notifications').once('value', snap => {
                    const notifs = snap.val();
                    if (notifs) Object.keys(notifs).forEach(key => db.ref('notifications/' + key + '/readBy/' + user.uid).set(true));
                });
                document.getElementById('notifDot').classList.remove('show');
            }
        }

        function goHome() { closeMenu(); window.location.href = '../index.html'; }
        function goHistory() { closeMenu(); alert(lang === 'vi' ? '📜 Đang phát triển!' : '📜 Coming soon!'); }
        function goTopup() { closeMenu(); alert(lang === 'vi' ? '💰 Đang phát triển!' : '💰 Coming soon!'); }
        function goSupport() { closeMenu(); alert(lang === 'vi' ? '🆘 Đang phát triển!' : '🆘 Coming soon!'); }
        function goToProfile() { window.location.href = '../Pop-up/profile.html'; }
        function goToSecurity() { window.location.href = '../Pop-up/security.html'; }
        function goToSettings() { window.location.href = '../Pop-up/settings.html'; }

        function logout() {
            if (confirm(lang === 'vi' ? 'Đăng xuất?' : 'Logout?')) {
                auth.signOut().then(() => window.location.replace('login.html'));
            }
        }

        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        window.addEventListener('storage', function(e) {
            if (e.key === 'lang') { lang = e.newValue || 'vi'; applyLang(); }
            if (e.key === 'theme' || e.key === 'theme_name') { applyTheme(); }
        });

        console.log('✅ Admin panel loaded!');
    </script>
</body>
</html>
