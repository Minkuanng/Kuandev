<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập nhanh</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        :root {
            --bg-body: #f0f7ff;
            --bg-card: rgba(255,255,255,0.95);
            --text-primary: #5a8fb5;
            --text-secondary: #2c5a7a;
            --text-muted: #8ab3d4;
            --border-color: rgba(225,240,255,0.5);
            --input-bg: #f8fcff;
            --input-border: #e3eef9;
            --shadow: 0 10px 40px rgba(176,216,255,0.2);
            --btn-bg: linear-gradient(135deg, #8fc1e0, #7ab0d4);
            --btn-hover: linear-gradient(135deg, #7ab0d4, #6aa3c9);
            --link-color: #007bff;
        }

        .theme-galaxy { --bg-body: #0a0a1a; --bg-card: rgba(18,18,42,0.95); --text-primary: #c8b8ff; --text-secondary: #e8e8e8; --text-muted: #6a5a9a; --border-color: rgba(42,42,90,0.5); --input-bg: #1a1a3e; --input-border: #2a2a5a; --shadow: 0 10px 40px rgba(0,0,0,0.4); --btn-bg: linear-gradient(135deg, #6a5a9a, #8a7aff); --btn-hover: linear-gradient(135deg, #8a7aff, #a89aff); --link-color: #8a7aff; }
        .theme-ocean { --bg-body: #0a1628; --bg-card: rgba(15,42,74,0.95); --text-primary: #7fc8ff; --text-secondary: #e8e8e8; --text-muted: #3a6a8a; --border-color: rgba(26,58,106,0.5); --input-bg: #0d2847; --input-border: #1a3a6a; --shadow: 0 10px 40px rgba(0,0,0,0.4); --btn-bg: linear-gradient(135deg, #3a6a8a, #4a9aff); --btn-hover: linear-gradient(135deg, #4a9aff, #5aaaff); --link-color: #4a9aff; }
        .theme-forest { --bg-body: #0a1a0a; --bg-card: rgba(15,42,15,0.95); --text-primary: #7fdf7f; --text-secondary: #e8e8e8; --text-muted: #3a7a3a; --border-color: rgba(26,74,26,0.5); --input-bg: #0d2a0d; --input-border: #1a4a1a; --shadow: 0 10px 40px rgba(0,0,0,0.4); --btn-bg: linear-gradient(135deg, #3a7a3a, #4abf4a); --btn-hover: linear-gradient(135deg, #4abf4a, #5adf5a); --link-color: #4abf4a; }
        .theme-sunset { --bg-body: #1a0a0a; --bg-card: rgba(42,18,10,0.95); --text-primary: #ffb87f; --text-secondary: #e8e8e8; --text-muted: #9a6a3a; --border-color: rgba(90,42,26,0.5); --input-bg: #3e1a0a; --input-border: #5a2a1a; --shadow: 0 10px 40px rgba(0,0,0,0.4); --btn-bg: linear-gradient(135deg, #9a6a3a, #ff8a4a); --btn-hover: linear-gradient(135deg, #ff8a4a, #ff9a5a); --link-color: #ff8a4a; }
        .theme-cherry { --bg-body: #1a0a12; --bg-card: rgba(42,10,22,0.95); --text-primary: #ff7fa8; --text-secondary: #e8e8e8; --text-muted: #9a3a5a; --border-color: rgba(90,26,42,0.5); --input-bg: #3e0a1a; --input-border: #5a1a2a; --shadow: 0 10px 40px rgba(0,0,0,0.4); --btn-bg: linear-gradient(135deg, #9a3a5a, #ff4a7a); --btn-hover: linear-gradient(135deg, #ff4a7a, #ff5a8a); --link-color: #ff4a7a; }
        .theme-neon { --bg-body: #0a0a0a; --bg-card: rgba(18,18,18,0.95); --text-primary: #00ff88; --text-secondary: #e8e8e8; --text-muted: #666666; --border-color: rgba(51,51,51,0.5); --input-bg: #1a1a1a; --input-border: #333333; --shadow: 0 10px 40px rgba(0,0,0,0.6); --btn-bg: linear-gradient(135deg, #00cc66, #00ff88); --btn-hover: linear-gradient(135deg, #00ff88, #00ccff); --link-color: #00ff88; }
        .theme-lavender { --bg-body: #1a0a2a; --bg-card: rgba(34,26,58,0.95); --text-primary: #d4a8ff; --text-secondary: #e8e8e8; --text-muted: #7a5a9a; --border-color: rgba(58,42,90,0.5); --input-bg: #2a1a3e; --input-border: #3a2a5a; --shadow: 0 10px 40px rgba(0,0,0,0.4); --btn-bg: linear-gradient(135deg, #7a5a9a, #b87aff); --btn-hover: linear-gradient(135deg, #b87aff, #d4a8ff); --link-color: #b87aff; }
        .theme-mint { --bg-body: #0a1a12; --bg-card: rgba(15,42,26,0.95); --text-primary: #7fffd4; --text-secondary: #e8e8e8; --text-muted: #3a7a6a; --border-color: rgba(26,74,58,0.5); --input-bg: #0d2a1a; --input-border: #1a4a3a; --shadow: 0 10px 40px rgba(0,0,0,0.4); --btn-bg: linear-gradient(135deg, #3a7a6a, #4abfa0); --btn-hover: linear-gradient(135deg, #4abfa0, #7fffd4); --link-color: #4abfa0; }
        .theme-coffee { --bg-body: #1a0f0a; --bg-card: rgba(34,26,18,0.95); --text-primary: #d4b896; --text-secondary: #e8e8e8; --text-muted: #7a6a5a; --border-color: rgba(58,42,26,0.5); --input-bg: #2a1a12; --input-border: #3a2a1a; --shadow: 0 10px 40px rgba(0,0,0,0.4); --btn-bg: linear-gradient(135deg, #7a6a5a, #b8987a); --btn-hover: linear-gradient(135deg, #b8987a, #d4b896); --link-color: #b8987a; }
        body.dark-mode { --bg-body: #1a1a2e; --bg-card: rgba(26,26,46,0.95); --text-primary: #8fc1e0; --text-secondary: #e8e8e8; --text-muted: #6a8a9a; --border-color: rgba(42,58,90,0.5); --input-bg: #1a2a4a; --input-border: #2a3a5a; --shadow: 0 10px 40px rgba(0,0,0,0.4); --btn-bg: linear-gradient(135deg, #3a6a8a, #2a5a7a); --btn-hover: linear-gradient(135deg, #4a7a9a, #3a6a8a); --link-color: #5a9acf; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-body);
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            background: var(--bg-card);
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 440px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        h2 { text-align: center; color: var(--text-primary); font-size: 28px; margin-bottom: 8px; font-weight: 600; transition: color 0.3s; }
        .subtitle { text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 8px; transition: color 0.3s; }
        .subtitle-small { text-align: center; color: var(--text-muted); font-size: 12px; margin-bottom: 28px; transition: color 0.3s; }
        .form-group { margin-bottom: 18px; }
        label { display: block; color: var(--text-muted); font-size: 14px; font-weight: 500; margin-bottom: 6px; transition: color 0.3s; }
        .password-wrapper { position: relative; width: 100%; }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--input-border);
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: var(--input-bg);
            color: var(--text-secondary);
        }

        .password-wrapper input { padding-right: 45px; }
        input:focus { outline: none; border-color: #8fc1e0; box-shadow: 0 0 0 4px rgba(143,193,224,0.15); background: #ffffff; }
        body.dark-mode input:focus { border-color: #5a8fb5; box-shadow: 0 0 0 4px rgba(90,143,181,0.15); background: #1a2a4a; }
        input::placeholder { color: var(--text-muted); }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--btn-bg);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 6px;
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(143,193,224,0.3); background: var(--btn-hover); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: var(--text-muted);
            border: 2px solid var(--input-border);
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
        }

        .btn-secondary:hover { background: var(--input-bg); border-color: #8fc1e0; }

        .links { text-align: center; margin-top: 18px; }
        .links a { color: var(--text-muted); text-decoration: none; font-size: 14px; transition: color 0.3s; font-weight: 500; cursor: pointer; }
        .links a:hover { color: var(--text-primary); text-decoration: underline; }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 18px;
            font-size: 14px;
            display: none;
        }

        .message.error { display: block; background: #fef0f2; color: #c0392b; border: 1px solid #fdd5d9; }
        body.dark-mode .message.error { background: #2a1a1a; color: #e8747a; border: 1px solid #4a2a2a; }
        .message.success { display: block; background: #eaf7ed; color: #27ae60; border: 1px solid #c8e6d0; }
        body.dark-mode .message.success { background: #1a2a1a; color: #7ab87a; border: 1px solid #2a4a2a; }
        .message.info { display: block; background: #e7f3ff; color: #004085; border: 1px solid #b8daff; }
        body.dark-mode .message.info { background: #1a2a3a; color: #7ab8d4; border: 1px solid #2a4a6a; }

        .divider {
            text-align: center;
            margin: 22px 0 20px;
            color: var(--text-muted);
            font-size: 13px;
            position: relative;
            transition: color 0.3s;
        }

        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: var(--input-border);
            transition: background 0.3s;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .token-box {
            background: var(--input-bg);
            border: 2px solid var(--input-border);
            border-radius: 12px;
            padding: 14px 18px;
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
            word-break: break-all;
        }
        .token-box .token-key {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 1px;
        }
        .token-box .copy-btn {
            padding: 6px 16px;
            background: var(--text-secondary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            flex-shrink: 0;
        }
        .token-box .copy-btn:hover { transform: scale(1.05); opacity: 0.9; }
        .token-box .copy-btn.copied { background: #27ae60; }

        .token-info {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .token-list {
            margin-top: 16px;
            max-height: 200px;
            overflow-y: auto;
        }
        .token-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
            color: var(--text-primary);
        }
        .token-item .token-id { font-family: monospace; font-size: 12px; color: var(--text-muted); }
        .token-item .token-delete {
            background: none;
            border: none;
            color: #e74c6f;
            cursor: pointer;
            font-size: 14px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: 0.3s;
        }
        .token-item .token-delete:hover { background: #fef0f2; }

        @media (max-width: 480px) {
            .container { padding: 30px 20px; max-width: 100%; }
            h2 { font-size: 24px; }
            .btn-primary, .btn-secondary { font-size: 15px; padding: 13px; }
            .token-box { flex-direction: column; align-items: stretch; }
            .token-box .copy-btn { margin-top: 6px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>⚡ Đăng nhập nhanh</h2>
        <p class="subtitle">Sử dụng Token để đăng nhập tài khoản</p>
        <p class="subtitle-small">Mỗi tài khoản có một Token riêng. Nhập Token để truy cập ngay!</p>
        <div id="message" class="message"></div>

        <form id="quickLoginForm">
            <div class="form-group">
                <label>🔑 Nhập Token</label>
                <input type="text" id="tokenInput" placeholder="Ví dụ: abc123xyz..." required>
            </div>
            <button type="submit" class="btn-primary" id="loginBtn">🚀 Đăng nhập nhanh</button>
        </form>

        <div class="divider">hoặc</div>

        <!-- Token Management -->
        <div id="tokenSection" style="display:none;">
            <div class="form-group">
                <label>📋 Token của bạn</label>
                <div class="token-box">
                    <span class="token-key" id="currentToken">Chưa có token</span>
                    <button class="copy-btn" id="copyTokenBtn" onclick="copyToken()">📋 Sao chép</button>
                </div>
                <div class="token-info">🔄 <span id="tokenStatus">Chưa tạo token</span></div>
            </div>
            <button class="btn-secondary" onclick="generateToken()">🔄 Tạo/Reset Token</button>

            <div class="token-list" id="tokenHistoryList" style="display:none;">
                <div style="font-size:12px;font-weight:600;color:var(--text-muted);padding:8px 0;">📜 Lịch sử Token</div>
                <div id="tokenHistory"></div>
            </div>
        </div>

        <div class="links">
            <a onclick="window.location.href='login.html'">← Quay lại đăng nhập</a>
            <span style="color:var(--text-muted);margin:0 8px;">|</span>
            <a onclick="window.location.href='signup.html'">📝 Đăng ký</a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCPDDRt520fSynXCGrr2aF-KvpnS_ZuIm8",
            authDomain: "shop-c6777.firebaseapp.com",
            databaseURL: "https://shop-c6777-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "shop-c6777",
            storageBucket: "shop-c6777.firebasestorage.app",
            messagingSenderId: "43186563268",
            appId: "1:43186563268:web:0d392ba57039a919670191"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // ===== KHÔI PHỤC THEME =====
        function applyTheme() {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
            const savedTheme = localStorage.getItem('theme_name') || 'default';
            document.body.classList.remove(
                'theme-galaxy', 'theme-ocean', 'theme-forest', 
                'theme-sunset', 'theme-cherry', 'theme-neon',
                'theme-lavender', 'theme-mint', 'theme-coffee'
            );
            if (savedTheme !== 'default') {
                document.body.classList.add('theme-' + savedTheme);
            }
        }
        applyTheme();

        window.addEventListener('storage', function(e) {
            if (e.key === 'theme' || e.key === 'theme_name') {
                applyTheme();
            }
        });

        // ===== DOM ELEMENTS =====
        const tokenInput = document.getElementById('tokenInput');
        const messageDiv = document.getElementById('message');
        const tokenSection = document.getElementById('tokenSection');
        const currentTokenSpan = document.getElementById('currentToken');
        const tokenStatus = document.getElementById('tokenStatus');
        const tokenHistoryDiv = document.getElementById('tokenHistory');

        let currentUser = null;
        let currentToken = null;

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            setTimeout(() => { messageDiv.style.display = 'none'; }, 5000);
        }

        // ===== TẠO TOKEN NGẪU NHIÊN =====
        function generateRandomToken() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let token = '';
            for (let i = 0; i < 24; i++) {
                token += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return token;
        }

        // ===== LƯU TOKEN VÀO DATABASE =====
        async function saveUserToken(uid, token) {
            try {
                // Lưu token mới
                await db.ref('users/' + uid + '/quickToken').set(token);
                // Lưu vào lịch sử token
                const historyRef = db.ref('users/' + uid + '/tokenHistory');
                const snapshot = await historyRef.once('value');
                let history = snapshot.val() || [];
                if (!Array.isArray(history)) history = [];
                history.push({
                    token: token,
                    createdAt: new Date().toISOString(),
                    used: false
                });
                // Giữ tối đa 10 token
                if (history.length > 10) history = history.slice(-10);
                await historyRef.set(history);
                return true;
            } catch (error) {
                console.error('Lỗi lưu token:', error);
                return false;
            }
        }

        // ===== TẠO TOKEN MỚI =====
        async function generateToken() {
            if (!currentUser) {
                showMessage('⚠️ Vui lòng đăng nhập để tạo token!', 'error');
                return;
            }

            const btn = document.querySelector('.btn-secondary');
            btn.disabled = true;
            btn.textContent = '⏳ Đang tạo...';

            try {
                const newToken = generateRandomToken();
                const success = await saveUserToken(currentUser.uid, newToken);
                if (success) {
                    currentToken = newToken;
                    currentTokenSpan.textContent = newToken;
                    tokenStatus.textContent = '✅ Token đã được tạo thành công!';
                    tokenStatus.style.color = 'var(--success)';
                    showMessage('✅ Token mới đã được tạo!', 'success');
                    loadTokenHistory();
                } else {
                    showMessage('❌ Lỗi tạo token!', 'error');
                }
            } catch (error) {
                showMessage('❌ Lỗi: ' + error.message, 'error');
            }

            btn.disabled = false;
            btn.textContent = '🔄 Tạo/Reset Token';
        }

        // ===== COPY TOKEN =====
        function copyToken() {
            const token = currentTokenSpan.textContent;
            if (token === 'Chưa có token') {
                showMessage('⚠️ Chưa có token để sao chép!', 'error');
                return;
            }
            const btn = document.getElementById('copyTokenBtn');
            if (navigator.clipboard) {
                navigator.clipboard.writeText(token).then(() => {
                    btn.textContent = '✅ Đã sao chép!';
                    btn.classList.add('copied');
                    setTimeout(() => { btn.textContent = '📋 Sao chép';
                        btn.classList.remove('copied'); }, 2000);
                });
            } else {
                const textarea = document.createElement('textarea');
                textarea.value = token;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btn.textContent = '✅ Đã sao chép!';
                btn.classList.add('copied');
                setTimeout(() => { btn.textContent = '📋 Sao chép';
                    btn.classList.remove('copied'); }, 2000);
            }
        }

        // ===== LOAD TOKEN HISTORY =====
        async function loadTokenHistory() {
            if (!currentUser) return;
            try {
                const snapshot = await db.ref('users/' + currentUser.uid + '/tokenHistory').once('value');
                const history = snapshot.val() || [];
                const historyList = document.getElementById('tokenHistory');
                const historyContainer = document.getElementById('tokenHistoryList');
                
                if (Array.isArray(history) && history.length > 0) {
                    historyContainer.style.display = 'block';
                    let html = '';
                    history.slice().reverse().forEach((item, index) => {
                        const isUsed = item.used || false;
                        html += `
                            <div class="token-item">
                                <span class="token-id">${item.token.substring(0, 8)}...${item.token.substring(16)}</span>
                                <span style="font-size:11px;color:${isUsed ? 'var(--text-muted)' : 'var(--success)'}">
                                    ${isUsed ? '✅ Đã dùng' : '🟢 Chưa dùng'}
                                </span>
                            </div>
                        `;
                    });
                    historyList.innerHTML = html;
                } else {
                    historyContainer.style.display = 'none';
                }
            } catch (error) {
                console.error('Lỗi load lịch sử token:', error);
            }
        }

        // ===== LOGIN WITH TOKEN =====
        document.getElementById('quickLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = tokenInput.value.trim();

            if (!token) {
                showMessage('⚠️ Vui lòng nhập Token!', 'error');
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Đang xử lý...';

            try {
                // Tìm user có token này
                const usersSnap = await db.ref('users').once('value');
                const users = usersSnap.val();
                let foundUid = null;
                let foundUser = null;

                if (users) {
                    for (const [uid, data] of Object.entries(users)) {
                        if (data.quickToken === token) {
                            foundUid = uid;
                            foundUser = data;
                            break;
                        }
                    }
                }

                if (!foundUid) {
                    showMessage('❌ Token không hợp lệ hoặc đã hết hạn!', 'error');
                    btn.disabled = false;
                    btn.textContent = '🚀 Đăng nhập nhanh';
                    return;
                }

                // Kiểm tra nếu user bị khóa
                if (foundUser.blocked === true) {
                    showMessage('🚫 Tài khoản này đã bị khóa!', 'error');
                    btn.disabled = false;
                    btn.textContent = '🚀 Đăng nhập nhanh';
                    return;
                }

                // Đăng nhập bằng email/password (cần lấy email và password từ user)
                // Vì không có password, ta sẽ sử dụng phương thức đăng nhập bằng custom token
                // Hoặc dùng phương thức signInWithCustomToken (cần admin SDK)
                // Cách đơn giản: lưu session và chuyển hướng
                // Ở đây ta sẽ dùng phương thức lưu vào localStorage và chuyển hướng

                // Đánh dấu token đã được sử dụng (nếu cần)
                // await db.ref('users/' + foundUid + '/tokenHistory').once('value', snap => {
                //     const history = snap.val() || [];
                //     if (Array.isArray(history)) {
                //         const idx = history.findIndex(h => h.token === token);
                //         if (idx !== -1) {
                //             history[idx].used = true;
                //             db.ref('users/' + foundUid + '/tokenHistory').set(history);
                //         }
                //     }
                // });

                // Lưu thông tin đăng nhập vào session
                localStorage.setItem('quickLoginUid', foundUid);
                localStorage.setItem('quickLoginEmail', foundUser.email || '');
                
                // Cập nhật lastLogin
                await db.ref('users/' + foundUid + '/lastLogin').set(Date.now());
                
                // Update presence online
                await db.ref('presence/' + foundUid).set(true);
                db.ref('presence/' + foundUid).onDisconnect().set(false);

                showMessage('✅ Đăng nhập thành công! Đang chuyển hướng...', 'success');
                setTimeout(() => {
                    window.location.href = '../index.html';
                }, 1500);

            } catch (error) {
                showMessage('❌ Lỗi: ' + error.message, 'error');
            }

            btn.disabled = false;
            btn.textContent = '🚀 Đăng nhập nhanh';
        });

        // ===== KIỂM TRA USER ĐĂNG NHẬP =====
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                tokenSection.style.display = 'block';
                
                // Lấy token hiện tại
                const snap = await db.ref('users/' + user.uid + '/quickToken').once('value');
                const token = snap.val();
                if (token) {
                    currentToken = token;
                    currentTokenSpan.textContent = token;
                    tokenStatus.textContent = '✅ Token đã có sẵn!';
                    tokenStatus.style.color = 'var(--success)';
                } else {
                    currentTokenSpan.textContent = 'Chưa có token';
                    tokenStatus.textContent = '⚠️ Bạn chưa tạo token. Nhấn "Tạo/Reset Token" để tạo!';
                    tokenStatus.style.color = 'var(--text-muted)';
                }
                loadTokenHistory();
            } else {
                tokenSection.style.display = 'none';
                // Kiểm tra quick login từ localStorage
                const quickUid = localStorage.getItem('quickLoginUid');
                if (quickUid) {
                    // Đã có session quick login, chuyển hướng
                    window.location.href = '../index.html';
                }
            }
        });

        // ===== KIỂM TRA NHANH NẾU CÓ TOKEN TRONG URL =====
        const urlParams = new URLSearchParams(window.location.search);
        const tokenParam = urlParams.get('token');
        if (tokenParam) {
            tokenInput.value = tokenParam;
            document.getElementById('quickLoginForm').dispatchEvent(new Event('submit'));
        }

        tokenInput.focus();
        console.log('✅ Quick Login loaded!');
    </script>
</body>
</html>
