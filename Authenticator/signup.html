<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        :root {
            --bg-body: #f0f7ff;
            --bg-card: rgba(255,255,255,0.95);
            --text-primary: #5a8fb5;
            --text-secondary: #2c5a7a;
            --text-muted: #8ab3d4;
            --border-color: rgba(225,240,255,0.5);
            --input-bg: #f8fcff;
            --input-border: #e3eef9;
            --shadow: 0 10px 40px rgba(176,216,255,0.2);
            --btn-bg: linear-gradient(135deg, #8fc1e0, #7ab0d4);
            --btn-hover: linear-gradient(135deg, #7ab0d4, #6aa3c9);
            --link-color: #007bff;
        }

        .theme-galaxy { --bg-body: #0a0a1a; --bg-card: rgba(18,18,42,0.95); --text-primary: #c8b8ff; --text-secondary: #e8e8e8; --text-muted: #6a5a9a; --border-color: rgba(42,42,90,0.5); --input-bg: #1a1a3e; --input-border: #2a2a5a; --shadow: 0 10px 40px rgba(0,0,0,0.4); --btn-bg: linear-gradient(135deg, #6a5a9a, #8a7aff); --btn-hover: linear-gradient(135deg, #8a7aff, #a89aff); --link-color: #8a7aff; }
        .theme-ocean { --bg-body: #0a1628; --bg-card: rgba(15,42,74,0.95); --text-primary: #7fc8ff; --text-secondary: #e8e8e8; --text-muted: #3a6a8a; --border-color: rgba(26,58,106,0.5); --input-bg: #0d2847; --input-border: #1a3a6a; --shadow: 0 10px 40px rgba(0,0,0,0.4); --btn-bg: linear-gradient(135deg, #3a6a8a, #4a9aff); --btn-hover: linear-gradient(135deg, #4a9aff, #5aaaff); --link-color: #4a9aff; }
        .theme-forest { --bg-body: #0a1a0a; --bg-card: rgba(15,42,15,0.95); --text-primary: #7fdf7f; --text-secondary: #e8e8e8; --text-muted: #3a7a3a; --border-color: rgba(26,74,26,0.5); --input-bg: #0d2a0d; --input-border: #1a4a1a; --shadow: 0 10px 40px rgba(0,0,0,0.4); --btn-bg: linear-gradient(135deg, #3a7a3a, #4abf4a); --btn-hover: linear-gradient(135deg, #4abf4a, #5adf5a); --link-color: #4abf4a; }
        .theme-sunset { --bg-body: #1a0a0a; --bg-card: rgba(42,18,10,0.95); --text-primary: #ffb87f; --text-secondary: #e8e8e8; --text-muted: #9a6a3a; --border-color: rgba(90,42,26,0.5); --input-bg: #3e1a0a; --input-border: #5a2a1a; --shadow: 0 10px 40px rgba(0,0,0,0.4); --btn-bg: linear-gradient(135deg, #9a6a3a, #ff8a4a); --btn-hover: linear-gradient(135deg, #ff8a4a, #ff9a5a); --link-color: #ff8a4a; }
        .theme-cherry { --bg-body: #1a0a12; --bg-card: rgba(42,10,22,0.95); --text-primary: #ff7fa8; --text-secondary: #e8e8e8; --text-muted: #9a3a5a; --border-color: rgba(90,26,42,0.5); --input-bg: #3e0a1a; --input-border: #5a1a2a; --shadow: 0 10px 40px rgba(0,0,0,0.4); --btn-bg: linear-gradient(135deg, #9a3a5a, #ff4a7a); --btn-hover: linear-gradient(135deg, #ff4a7a, #ff5a8a); --link-color: #ff4a7a; }
        .theme-neon { --bg-body: #0a0a0a; --bg-card: rgba(18,18,18,0.95); --text-primary: #00ff88; --text-secondary: #e8e8e8; --text-muted: #666666; --border-color: rgba(51,51,51,0.5); --input-bg: #1a1a1a; --input-border: #333333; --shadow: 0 10px 40px rgba(0,0,0,0.6); --btn-bg: linear-gradient(135deg, #00cc66, #00ff88); --btn-hover: linear-gradient(135deg, #00ff88, #00ccff); --link-color: #00ff88; }
        .theme-lavender { --bg-body: #1a0a2a; --bg-card: rgba(34,26,58,0.95); --text-primary: #d4a8ff; --text-secondary: #e8e8e8; --text-muted: #7a5a9a; --border-color: rgba(58,42,90,0.5); --input-bg: #2a1a3e; --input-border: #3a2a5a; --shadow: 0 10px 40px rgba(0,0,0,0.4); --btn-bg: linear-gradient(135deg, #7a5a9a, #b87aff); --btn-hover: linear-gradient(135deg, #b87aff, #d4a8ff); --link-color: #b87aff; }
        .theme-mint { --bg-body: #0a1a12; --bg-card: rgba(15,42,26,0.95); --text-primary: #7fffd4; --text-secondary: #e8e8e8; --text-muted: #3a7a6a; --border-color: rgba(26,74,58,0.5); --input-bg: #0d2a1a; --input-border: #1a4a3a; --shadow: 0 10px 40px rgba(0,0,0,0.4); --btn-bg: linear-gradient(135deg, #3a7a6a, #4abfa0); --btn-hover: linear-gradient(135deg, #4abfa0, #7fffd4); --link-color: #4abfa0; }
        .theme-coffee { --bg-body: #1a0f0a; --bg-card: rgba(34,26,18,0.95); --text-primary: #d4b896; --text-secondary: #e8e8e8; --text-muted: #7a6a5a; --border-color: rgba(58,42,26,0.5); --input-bg: #2a1a12; --input-border: #3a2a1a; --shadow: 0 10px 40px rgba(0,0,0,0.4); --btn-bg: linear-gradient(135deg, #7a6a5a, #b8987a); --btn-hover: linear-gradient(135deg, #b8987a, #d4b896); --link-color: #b8987a; }

        body.dark-mode {
            --bg-body: #1a1a2e;
            --bg-card: rgba(26,26,46,0.95);
            --text-primary: #8fc1e0;
            --text-secondary: #e8e8e8;
            --text-muted: #6a8a9a;
            --border-color: rgba(42,58,90,0.5);
            --input-bg: #1a2a4a;
            --input-border: #2a3a5a;
            --shadow: 0 10px 40px rgba(0,0,0,0.4);
            --btn-bg: linear-gradient(135deg, #3a6a8a, #2a5a7a);
            --btn-hover: linear-gradient(135deg, #4a7a9a, #3a6a8a);
            --link-color: #5a9acf;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-body);
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            background: var(--bg-card);
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 440px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        h2 { text-align: center; color: var(--text-primary); font-size: 28px; margin-bottom: 8px; font-weight: 600; transition: color 0.3s; }
        .subtitle { text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 28px; transition: color 0.3s; }
        .form-group { margin-bottom: 18px; }
        label { display: block; color: var(--text-muted); font-size: 14px; font-weight: 500; margin-bottom: 6px; transition: color 0.3s; }
        .password-wrapper { position: relative; width: 100%; }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--input-border);
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: var(--input-bg);
            color: var(--text-secondary);
        }

        .password-wrapper input { padding-right: 45px; }
        input:focus { outline: none; border-color: #8fc1e0; box-shadow: 0 0 0 4px rgba(143,193,224,0.15); background: #ffffff; }
        body.dark-mode input:focus { border-color: #5a8fb5; box-shadow: 0 0 0 4px rgba(90,143,181,0.15); background: #1a2a4a; }
        input::placeholder { color: var(--text-muted); }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            color: var(--text-muted);
            font-size: 18px;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-password:hover { color: #7aadcc; }
        .toggle-password svg { width: 20px; height: 20px; }

        .password-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; transition: color 0.3s; }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--btn-bg);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 6px;
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(143,193,224,0.3); background: var(--btn-hover); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .btn-google {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            color: var(--text-secondary);
            border: 2px solid var(--input-border);
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:hover { background: var(--bg-card); border-color: #8fc1e0; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(143,193,224,0.15); }
        .btn-google:active { transform: translateY(0); }

        .links { text-align: center; margin-top: 18px; }
        .links a { color: var(--text-muted); text-decoration: none; font-size: 14px; transition: color 0.3s; font-weight: 500; cursor: pointer; }
        .links a:hover { color: var(--text-primary); text-decoration: underline; }
        .links .sep { color: var(--text-muted); margin: 0 8px; }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 18px;
            font-size: 14px;
            display: none;
        }

        .message.error { display: block; background: #fef0f2; color: #c0392b; border: 1px solid #fdd5d9; }
        body.dark-mode .message.error { background: #2a1a1a; color: #e8747a; border: 1px solid #4a2a2a; }
        .message.success { display: block; background: #eaf7ed; color: #27ae60; border: 1px solid #c8e6d0; }
        body.dark-mode .message.success { background: #1a2a1a; color: #7ab87a; border: 1px solid #2a4a2a; }
        .message.info { display: block; background: #e7f3ff; color: #004085; border: 1px solid #b8daff; }
        body.dark-mode .message.info { background: #1a2a3a; color: #7ab8d4; border: 1px solid #2a4a6a; }

        .divider {
            text-align: center;
            margin: 22px 0 20px;
            color: var(--text-muted);
            font-size: 13px;
            position: relative;
            transition: color 0.3s;
        }

        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: var(--input-border);
            transition: background 0.3s;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .terms-section {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
            transition: border-color 0.3s;
        }

        .terms-checkbox {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
            padding: 4px 0;
        }

        .terms-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            min-width: 18px;
            margin-top: 2px;
            accent-color: var(--text-primary);
            cursor: pointer;
            border-radius: 4px;
            border: 2px solid var(--input-border);
            transition: all 0.3s;
        }

        .terms-checkbox input[type="checkbox"]:checked {
            background-color: var(--text-primary);
            border-color: var(--text-primary);
        }

        .terms-checkbox .terms-text {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            transition: color 0.3s;
        }

        .terms-checkbox .terms-text .link {
            color: var(--link-color);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s;
            border-bottom: 1px dashed transparent;
        }

        .terms-checkbox .terms-text .link:hover {
            border-bottom-color: var(--link-color);
        }

        .terms-checkbox .terms-text .link-policy {
            color: var(--link-color);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s;
            border-bottom: 1px dashed transparent;
        }

        .terms-checkbox .terms-text .link-policy:hover {
            border-bottom-color: var(--link-color);
        }

        .terms-error {
            color: #e74c6f;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        .terms-error.show {
            display: block;
        }

        @media (max-width: 480px) {
            .container { padding: 30px 20px; max-width: 100%; }
            h2 { font-size: 24px; }
            .btn-primary, .btn-google { font-size: 15px; padding: 13px; }
            .terms-checkbox .terms-text { font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📝 Đăng Ký</h2>
        <p class="subtitle">Tạo tài khoản mới</p>
        <div id="message" class="message"></div>

        <form id="signupForm">
            <div class="form-group">
                <label>👤 Họ và tên</label>
                <input type="text" id="fullName" placeholder="Ví dụ: Nguyễn Văn A" required>
            </div>
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" id="email" placeholder="Nhập email của bạn" required>
            </div>
            <div class="form-group">
                <label>🔑 Mật khẩu</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Tối thiểu 6 ký tự" required minlength="6">
                    <button type="button" class="toggle-password" id="togglePassword">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
                <div class="password-hint">* Mật khẩu phải có ít nhất 6 ký tự</div>
            </div>

            <div class="terms-section">
                <label class="terms-checkbox">
                    <input type="checkbox" id="termsCheckbox">
                    <span class="terms-text">
                        Tôi đồng ý với 
                        <span class="link" onclick="event.preventDefault(); window.location.href='../Assets/Terms-of-Service.html'">Điều khoản</span>
                        và 
                        <span class="link-policy" onclick="event.preventDefault(); window.location.href='../Assets/Privacy-Policy.html'">Chính sách</span>
                        của chúng tôi
                    </span>
                </label>
                <div class="terms-error" id="termsError">⚠️ Vui lòng đồng ý với Điều khoản và Chính sách để tiếp tục!</div>
            </div>

            <button type="submit" class="btn-primary" id="signupBtn">🚀 Đăng Ký</button>
        </form>

        <div class="divider">hoặc</div>

        <button id="googleSignupBtn" class="btn-google">
            <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z" />
                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z" />
                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z" />
                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z" />
            </svg>
            Đăng ký nhanh với Google
        </button>

        <div class="links">
            <a onclick="window.location.href='login.html'">← Quay lại đăng nhập</a>
            <span class="sep">|</span>
            <a onclick="window.location.href='quick-login.html'">⚡ Đăng nhập nhanh</a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCPDDRt520fSynXCGrr2aF-KvpnS_ZuIm8",
            authDomain: "shop-c6777.firebaseapp.com",
            databaseURL: "https://shop-c6777-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "shop-c6777",
            storageBucket: "shop-c6777.firebasestorage.app",
            messagingSenderId: "43186563268",
            appId: "1:43186563268:web:0d392ba57039a919670191"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function applyTheme() {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
            const savedTheme = localStorage.getItem('theme_name') || 'default';
            document.body.classList.remove(
                'theme-galaxy', 'theme-ocean', 'theme-forest', 
                'theme-sunset', 'theme-cherry', 'theme-neon',
                'theme-lavender', 'theme-mint', 'theme-coffee'
            );
            if (savedTheme !== 'default') {
                document.body.classList.add('theme-' + savedTheme);
            }
        }

        applyTheme();

        window.addEventListener('storage', function(e) {
            if (e.key === 'theme' || e.key === 'theme_name') {
                applyTheme();
            }
        });

        const signupForm = document.getElementById('signupForm');
        const fullNameInput = document.getElementById('fullName');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const messageDiv = document.getElementById('message');
        const googleSignupBtn = document.getElementById('googleSignupBtn');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const termsCheckbox = document.getElementById('termsCheckbox');
        const termsError = document.getElementById('termsError');

        let isPasswordVisible = false;
        togglePasswordBtn.addEventListener('click', () => {
            isPasswordVisible = !isPasswordVisible;
            passwordInput.type = isPasswordVisible ? 'text' : 'password';
            togglePasswordBtn.innerHTML = isPasswordVisible ?
                `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>` :
                `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>`;
        });

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            setTimeout(() => { messageDiv.style.display = 'none'; }, 5000);
        }

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!termsCheckbox.checked) {
                termsError.classList.add('show');
                termsCheckbox.style.borderColor = '#e74c6f';
                setTimeout(() => {
                    termsError.classList.remove('show');
                    termsCheckbox.style.borderColor = '';
                }, 3000);
                return;
            }
            termsError.classList.remove('show');
            
            const fullName = fullNameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!fullName || !email || !password) {
                showMessage('⚠️ Vui lòng nhập đầy đủ thông tin!', 'error');
                return;
            }

            if (fullName.length < 2) {
                showMessage('❌ Họ tên phải có ít nhất 2 ký tự!', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('❌ Mật khẩu phải có ít nhất 6 ký tự!', 'error');
                return;
            }

            const submitBtn = document.getElementById('signupBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Đang xử lý...';

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                await userCredential.user.updateProfile({ displayName: fullName });

                await db.ref('users/' + userCredential.user.uid).set({
                    displayName: fullName,
                    email: email,
                    balance: 0,
                    blocked: false,
                    isAdmin: email === 'qn781159@gmail.com',
                    createdAt: new Date().toISOString()
                });

                showMessage('✅ Đăng ký thành công!', 'success');
                setTimeout(() => {
                    window.location.href = '../index.html';
                }, 1500);
            } catch (error) {
                let errorMessage = '❌ Đăng ký thất bại! ';
                switch (error.code) {
                    case 'auth/email-already-in-use': errorMessage += 'Email đã được sử dụng.'; break;
                    case 'auth/invalid-email': errorMessage += 'Email không hợp lệ.'; break;
                    case 'auth/weak-password': errorMessage += 'Mật khẩu quá yếu.'; break;
                    default: errorMessage += error.message;
                }
                showMessage(errorMessage, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = '🚀 Đăng Ký';
            }
        });

        googleSignupBtn.addEventListener('click', async () => {
            if (!termsCheckbox.checked) {
                termsError.classList.add('show');
                termsCheckbox.style.borderColor = '#e74c6f';
                setTimeout(() => {
                    termsError.classList.remove('show');
                    termsCheckbox.style.borderColor = '';
                }, 3000);
                return;
            }
            termsError.classList.remove('show');
            
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                provider.setCustomParameters({ prompt: 'select_account' });
                const result = await auth.signInWithPopup(provider);
                
                const snapshot = await db.ref('users/' + result.user.uid).once('value');
                if (!snapshot.exists()) {
                    await db.ref('users/' + result.user.uid).set({
                        displayName: result.user.displayName || 'Người dùng',
                        email: result.user.email,
                        balance: 0,
                        blocked: false,
                        isAdmin: result.user.email === 'qn781159@gmail.com',
                        createdAt: new Date().toISOString()
                    });
                }

                showMessage('✅ Đăng ký thành công!', 'success');
                setTimeout(() => {
                    window.location.href = '../index.html';
                }, 1500);
            } catch (error) {
                let errorMessage = '❌ Đăng ký Google thất bại! ';
                if (error.code === 'auth/popup-closed-by-user') {
                    errorMessage += 'Bạn đã đóng cửa sổ đăng nhập.';
                } else {
                    errorMessage += error.message;
                }
                showMessage(errorMessage, 'error');
            }
        });

        fullNameInput.focus();
        
    </script>
</body>
</html>
